services:
  frontend:
    image: ${DOCKER_USERNAME}/secmind-frontend:${APP_VERSION:-latest}
    container_name: secmind-frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api/v1
      - NEXT_PUBLIC_WS_URL=ws://backend:8000/ws
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    image: ${DOCKER_USERNAME}/secmind-backend:${APP_VERSION:-latest}
    container_name: secmind-backend
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - DATABASE_URL=postgresql://secmind:${POSTGRES_PASSWORD}@postgres:5432/secmind
      - SECRET_KEY=${SECRET_KEY}
      - CORS_ORIGINS=http://localhost:${FRONTEND_PORT:-3000},http://frontend:3000
      - APP_VERSION=${APP_VERSION}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: secmind-postgres
    expose:
      - "5432"
    environment:
      POSTGRES_USER: secmind
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: secmind
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secmind"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: secmind-redis
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: