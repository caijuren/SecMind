/* ─── Evidence Tab — 大模型查询的所有日志（不管有无问题，全部展示）─── */
function InvEvidenceTab({ invResult }) {
  if (!invResult) return <EmptyTabPlaceholder/>;
  const [allOpen, setAllOpen] = useStateDetail(false);
  const reactSteps = invResult._react_steps || [];

  // risk_level → 证据卡颜色：高=destructive，中=warning，低=info，无=success（绿色），无日志=neutral
  const riskToTone = {
    high:'destructive', medium:'warning', low:'info', none:'success',
  };

  const evidences = reactSteps.map((rs, i) => {
    // 把日志格式化为可读文本（每条一段，含时间/源IP/用户/动作/状态/消息）
    const logContent = rs.logs && rs.logs.length > 0
      ? rs.logs.map((l, idx) => {
          const fields = [
            ['时间', (l.timestamp||'').slice(0,19)],
            ['源IP', l.source_ip],
            ['用户', l.user],
            ['动作', l.action],
            ['状态', l.status],
          ].filter(([k, v]) => v).map(([k, v]) => `${k}=${v}`).join(' | ');
          const msg = (l.message || '').slice(0, 400);
          return `[#${idx+1}] ${fields}${msg ? '\n      ' + msg : ''}`;
        }).join('\n')
      : '（该原子能力查询条件下未匹配到任何日志）';

    const tone = rs.count > 0
      ? (riskToTone[rs.risk_level] || 'neutral')
      : 'neutral';

    return {
      id:             `EV-${String(i+1).padStart(3,'0')}`,
      type:           'log',
      source:         `[${rs.capability}] ${rs.name}`,
      capability:     rs.capability,
      count:          rs.count || 0,
      timestamp:      Date.now() - (reactSteps.length - i) * 90000,
      relevance:      tone,
      content:        logContent,
      interpretation: rs.ai_interpretation || rs.summary || '',
      query:          rs.query || '',
      risk_level:     rs.risk_level,
    };
  });

  const withLog    = evidences.filter(e => e.count > 0);
  const withoutLog = evidences.filter(e => e.count === 0);

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <span style={{ fontSize:12.5, color:'var(--muted-foreground)' }}>
          共 {evidences.length} 个调查步骤 · {withLog.length} 步有日志（共 {withLog.reduce((a,e)=>a+e.count,0)} 条）· {withoutLog.length} 步未查到
        </span>
        <UI.Button size="sm" onClick={() => setAllOpen(o => !o)}>{allOpen ? '全部收起' : '全部展开'}</UI.Button>
      </div>
      {evidences.length === 0 ? (
        <div style={{ padding:32, textAlign:'center', color:'var(--muted-foreground)', fontSize:13 }}>暂无证据记录</div>
      ) : evidences.map(ev => <EvidenceCard key={ev.id} evidence={ev} defaultOpen={allOpen} />)}
    </div>
  );
}

/* ─── Reasoning Tab — 真正的 ReAct 三段（Reason → Act → Observe）─── */
function InvReasoningTab({ invResult }) {
  if (!invResult) return <EmptyTabPlaceholder/>;
  const reactSteps = invResult._react_steps || [];
  if (reactSteps.length === 0) return <EmptyTabPlaceholder/>;

  // 阶段配色 + 标签
  const phaseMeta = {
    reason:  { label:'推理', tone:'purple', bg:'#faf5ff', bd:'#e9d5ff', accent:'#7c3aed', icon:'Brain' },
    act:     { label:'行动', tone:'neutral', bg:'#f4f4f5', bd:'#e4e4e7', accent:'#0a0a0a', icon:'Activity' },
    observe: { label:'观察', tone:'info',  bg:'#eff6ff', bd:'#bfdbfe', accent:'#0284c7', icon:'Eye' },
  };

  // 风险等级 → 观察节点的强调色
  const riskAccent = { high:'#dc2626', medium:'#d97706', low:'#0284c7', none:'#16a34a' };

  // 把每个步骤展开成 3 个 ReAct 节点：reason → act → observe
  const chain = [];
  reactSteps.forEach((rs, i) => {
    const isReact = i >= (invResult._initial_plan?.length || 0);
    chain.push({
      type: 'reason',
      stepNum: rs.step,
      capability: `[${rs.capability}] ${rs.name}`,
      text: rs.reasoning || `执行 ${rs.name}，验证相关行为`,
      isReact,
    });
    chain.push({
      type: 'act',
      stepNum: rs.step,
      capability: `[${rs.capability}] ${rs.name}`,
      query: rs.query || '*',
      intent: rs.intent,
      isReact,
    });
    chain.push({
      type: 'observe',
      stepNum: rs.step,
      capability: `[${rs.capability}] ${rs.name}`,
      text: rs.observation || (rs.count > 0 ? `共匹配 ${rs.count} 条日志` : '查询返回 0 条记录'),
      count: rs.count,
      conclusion: rs.ai_interpretation,
      key_findings: rs.key_findings || [],
      risk_level: rs.risk_level || 'none',
      isReact,
    });
  });

  return (
    <UI.Card style={{ padding:'18px 20px' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:18, flexWrap:'wrap', gap:8 }}>
        <div>
          <div style={{ fontSize:14, fontWeight:600 }}>AI 推理轨迹 · ReAct 循环</div>
          <div style={{ fontSize:12, color:'var(--muted-foreground)', marginTop:2 }}>
            共 {reactSteps.length} 个原子能力 · {chain.length} 个推理节点（每步含 推理→行动→观察 三段）
          </div>
        </div>
        <div style={{ display:'flex', gap:6 }}>
          <UI.Badge tone="purple">推理</UI.Badge>
          <UI.Badge variant="muted">行动</UI.Badge>
          <UI.Badge tone="info">观察</UI.Badge>
        </div>
      </div>

      <div style={{ position:'relative', paddingLeft:32 }}>
        <div style={{ position:'absolute', left:14, top:8, bottom:8, width:2, background:'var(--border)', borderRadius:1 }} />
        {chain.map((node, idx) => {
          const meta = phaseMeta[node.type];
          // 步骤分隔：每 3 个节点（一个完整的 R→A→O）后空一行
          const showStepHeader = node.type === 'reason';
          return (
            <div key={idx} style={{ position:'relative', marginBottom: idx === chain.length - 1 ? 0 : 14 }}>
              {/* 时间线圆点 */}
              <div style={{
                position:'absolute', left:-25, top:8, width:14, height:14, borderRadius:'50%',
                background: meta.accent, border:'2px solid #fff', boxShadow:`0 0 0 2px ${meta.bd}`,
                zIndex:1,
              }}/>
              {showStepHeader && (
                <div style={{ fontSize:11, color:'var(--muted-foreground)', marginBottom:6, display:'flex', alignItems:'center', gap:6 }}>
                  <span style={{ fontWeight:700, color:'var(--foreground)' }}>步骤 {node.stepNum}</span>
                  <span className="mono" style={{ fontSize:10.5 }}>{node.capability}</span>
                  {node.isReact && <UI.Badge tone="warning" style={{ fontSize:9.5 }}>ReAct 补充</UI.Badge>}
                </div>
              )}
              <div style={{
                padding:'10px 14px',
                background: meta.bg, border:`1px solid ${meta.bd}`, borderRadius:6,
              }}>
                <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:6 }}>
                  <span style={{ fontSize:10.5, fontWeight:700, padding:'2px 7px', borderRadius:3, background:meta.accent, color:'#fff' }}>
                    {meta.label}
                  </span>
                  {node.type === 'observe' && node.count !== undefined && (
                    <span style={{ fontSize:11, color:'var(--muted-foreground)', fontFamily:'monospace' }}>
                      {node.count} 条日志
                    </span>
                  )}
                  {node.type === 'observe' && node.risk_level && node.risk_level !== 'none' && (
                    <span style={{ fontSize:10, fontWeight:700, padding:'1px 6px', borderRadius:3, background: riskAccent[node.risk_level], color:'#fff' }}>
                      {{high:'高危', medium:'中危', low:'低危'}[node.risk_level]}
                    </span>
                  )}
                </div>
                {node.type === 'reason' && (
                  <div style={{ fontSize:12.5, lineHeight:1.6, color:'var(--foreground)' }}>{node.text}</div>
                )}
                {node.type === 'act' && (
                  <div>
                    <div style={{ fontSize:12, color:'var(--muted-foreground)', marginBottom:3 }}>
                      调用 <span className="mono" style={{ color:'var(--foreground)', fontWeight:600 }}>{node.capability}</span>
                    </div>
                    <div style={{ fontSize:11.5, fontFamily:'JetBrains Mono,monospace', color:'var(--foreground)', wordBreak:'break-all', padding:'4px 8px', background:'#fff', border:'1px solid var(--border)', borderRadius:4 }}>
                      query: {node.query}
                    </div>
                  </div>
                )}
                {node.type === 'observe' && (
                  <div>
                    <div style={{ fontSize:12.5, lineHeight:1.6, color:'var(--foreground)' }}>{node.text}</div>
                    {node.conclusion && (
                      <div style={{ marginTop:6, paddingTop:6, borderTop:'1px dashed var(--border)', fontSize:12, color:'var(--muted-foreground)', lineHeight:1.55 }}>
                        <b style={{ color:'var(--foreground)' }}>研判：</b>{node.conclusion}
                      </div>
                    )}
                    {node.key_findings && node.key_findings.length > 0 && (
                      <ul style={{ margin:'6px 0 0', padding:'0 0 0 18px', fontSize:11.5, color:'var(--foreground)', lineHeight:1.55 }}>
                        {node.key_findings.map((kf, j) => <li key={j}>{kf}</li>)}
                      </ul>
                    )}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </UI.Card>
  );
}

/* ─── Impact Tab (from invResult) — original ImpactTab UI style ─── */
function InvImpactTab({ invResult, event }) {
  if (!invResult) return <EmptyTabPlaceholder/>;
  const imp = invResult.impact || {};
  const fin = invResult.final_conclusion || {};

  // Parse affected assets/accounts/systems from invResult text
  const rawAssets = imp.affected_assets || fin.affected_info || '';
  const affectedAccounts = rawAssets.split(/[,，、\n]/).map(s => s.trim()).filter(s => s && (s.includes('@') || s.includes('用户') || s.includes('账号')));
  const affectedDevices = [
    event?.rawData?.objName || event?.rawData?.ip,
    imp.affected_assets && !imp.affected_assets.includes('@') ? imp.affected_assets : null,
  ].filter(Boolean);
  const affectedSystems = [
    event?.sourceSystem || '监控系统',
    event?.rawData?.appName,
  ].filter(Boolean);

  const attackStageDesc = fin.summary || imp.description || '正在评估中';
  // Derive attack stages from threat_path or default
  const allStages = ['初始访问', '触发告警', '影响分析', '持续监控'];
  const currentStage = 1; // 触发告警

  return (
    <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:12 }}>
      <UI.Card style={{ padding:'18px 20px' }}>
        <div style={{ fontSize:14, fontWeight:600, marginBottom:12, display:'inline-flex', alignItems:'center', gap:8 }}>
          <Icons.Key size={15}/> 受影响账号 ({affectedAccounts.length || '—'})
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
          {affectedAccounts.length > 0 ? affectedAccounts.map((a, i) => (
            <div key={i} className="mono" style={{ padding:'8px 10px', fontSize:12.5, background:'var(--muted-2)', borderRadius:6, border:'1px solid var(--border)' }}>{a}</div>
          )) : (
            <div style={{ padding:'8px 0', fontSize:13, color:'var(--muted-foreground)' }}>{rawAssets || '暂无账号信息'}</div>
          )}
        </div>
      </UI.Card>

      <UI.Card style={{ padding:'18px 20px' }}>
        <div style={{ fontSize:14, fontWeight:600, marginBottom:12, display:'inline-flex', alignItems:'center', gap:8 }}>
          <Icons.Monitor size={15}/> 受影响设备 ({affectedDevices.length})
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
          {affectedDevices.length > 0 ? affectedDevices.map((d, i) => (
            <div key={i} className="mono" style={{ padding:'8px 10px', fontSize:12.5, background:'var(--muted-2)', borderRadius:6, border:'1px solid var(--border)' }}>{d}</div>
          )) : (
            <div style={{ fontSize:13, color:'var(--muted-foreground)' }}>暂无设备信息</div>
          )}
        </div>
      </UI.Card>

      <UI.Card style={{ padding:'18px 20px' }}>
        <div style={{ fontSize:14, fontWeight:600, marginBottom:12, display:'inline-flex', alignItems:'center', gap:8 }}>
          <Icons.Cloud size={15}/> 受影响系统 ({affectedSystems.length})
        </div>
        <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>
          {affectedSystems.map((s, i) => (
            <UI.Badge key={i} variant="muted">{s}</UI.Badge>
          ))}
        </div>
      </UI.Card>

      <UI.Card style={{ padding:'18px 20px' }}>
        <div style={{ fontSize:14, fontWeight:600, marginBottom:12, display:'inline-flex', alignItems:'center', gap:8 }}>
          <Icons.Target size={15}/> 攻击阶段评估
        </div>
        <div style={{ fontSize:13.5, lineHeight:1.6 }}>{attackStageDesc}</div>
        <div style={{ display:'flex', alignItems:'center', gap:6, marginTop:14, flexWrap:'wrap' }}>
          {allStages.map((stage, i) => {
            const done = i <= currentStage;
            const current = i === currentStage;
            return (
              <React.Fragment key={i}>
                <div style={{
                  padding:'4px 8px', fontSize:11, borderRadius:4,
                  background: current ? '#fef2f2' : done ? '#0a0a0a' : 'var(--muted)',
                  color: current ? '#b91c1c' : done ? '#fff' : 'var(--muted-foreground)',
                  border: current ? '1px solid #fecaca' : 'none',
                  fontWeight: current ? 600 : 400,
                }}>{stage}</div>
                {i < allStages.length - 1 && <Icons.ChevR size={10} style={{ color:'var(--muted-foreground)' }}/>}
              </React.Fragment>
            );
          })}
        </div>
      </UI.Card>
    </div>
  );
}

/* ─── Disposition Tab (from invResult) — original RemediationTab UI style ─── */
function InvDispositionTab({ invResult, prov }) {
  if (!invResult) return <EmptyTabPlaceholder/>;
  const dis = invResult.disposition || {};

  // Convert string content to action arrays (split by newline)
  const toActions = (text, level, title, sub, tone, icon) => {
    if (!text) return null;
    const lines = text.split('\n').filter(Boolean);
    return { level, title, sub, tone, icon, actions: lines.map((line, i) => ({ id:`${level}-${i}`, title: line.replace(/^[-•·*]\s*/, ''), description:'', level })) };
  };

  const groups = [
    toActions(dis.immediate,     'immediate',  '立即执行', '0 – 30 分钟',      'critical', <Icons.Zap size={14}/>),
    toActions(dis.week_tracking, 'short_term', '短期执行', '30 分钟 – 24 小时', 'high',     <Icons.Clock size={14}/>),
    toActions(dis.long_term,     'long_term',  '长期建议', '策略调整',           'neutral',  <Icons.Target size={14}/>),
  ].filter(Boolean);

  if (groups.length === 0) {
    return <div style={{ padding:32, textAlign:'center', color:'var(--muted-foreground)', fontSize:13 }}>暂无处置建议数据</div>;
  }

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:18 }}>
      {groups.map(g => (
        <div key={g.level}>
          <div style={{ display:'flex', alignItems:'center', marginBottom:10 }}>
            <div style={{ display:'inline-flex', alignItems:'center', gap:8 }}>
              <span style={{
                width:24, height:24, borderRadius:6,
                display:'inline-flex', alignItems:'center', justifyContent:'center',
                background: UI.tonePalette[g.tone]?.bg || 'var(--muted-2)',
                color: UI.tonePalette[g.tone]?.fg || 'var(--foreground)',
                border: `1px solid ${UI.tonePalette[g.tone]?.bd || 'var(--border)'}`,
              }}>{g.icon}</span>
              <div>
                <div style={{ fontSize:14, fontWeight:600 }}>{g.title}</div>
                <div style={{ fontSize:11, color:'var(--muted-foreground)' }}>{g.sub}</div>
              </div>
            </div>
          </div>
          <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
            {g.actions.map(a => <RemediationRow key={a.id} action={a} tone={g.tone} />)}
          </div>
        </div>
      ))}
    </div>
  );
}

<script type="text/babel">
/* Action Graph — 处置流程可视化
   Two views:
   1) overview — 7-column columnar DAG (existing)
   2) threads  — parallel investigation threads, 每行一条调查思路 */

const { useState: useStateAg } = React;

function ActionGraphPage({ eventId, onNavigate }) {
  const event = mockEvents.find(e => e.id === eventId) || mockEvents[0];
  const report = mockReport;
  const [view, setView] = useStateAg('threads');

      </button>

          <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>

            <span className="mono" style={{ fontSize:12, color:'var(--muted-foreground)' }}>{event.id}</span>
          </div>
          <h1 style={{ fontSize:22, fontWeight:600, margin:0, letterSpacing:'-0.01em' }}>调查路径全景</h1>
          <div style={{ fontSize:13, color:'var(--muted-foreground)', marginTop:4, lineHeight:1.55 }}>
            {event.title}
          </div>
        </div>
        <div style={{ display:'flex', gap:8, alignItems:'center' }}>
          <UI.Tabs value={view} onChange={setView} size="sm" items={[
            { value:'threads',  label:'调查线程图', icon:<Icons.Activity size={13}/> },
            { value:'overview', label:'流程总览',   icon:<Icons.Network size={13}/> },
          ]}/>
          <UI.Button leftIcon={<Icons.Download size={13}/>}>导出 SVG</UI.Button>
          <UI.Button leftIcon={<Icons.Share size={13}/>}>分享</UI.Button>
        </div>
      </div>

      {view === 'overview' && <OverviewGraph event={event} report={report} />}
      {view === 'threads'  && <ThreadsGraph  event={event} report={report} />}
    </div>
  );
}

/* ============================================================
   View 1: Overview (original columnar DAG)
   ============================================================ */
function OverviewGraph({ event, report }) {
  const phase1Steps = report.reasoningChain.filter(s => s.phase === 'phase1');
  const phase2Steps = report.reasoningChain.filter(s => s.phase === 'phase2');
  const immediate = report.remediationActions.filter(a => a.level === 'immediate');

  const COL_W = 220, NODE_H = 70, ROW_GAP = 14, PAD_LEFT = 40, PAD_TOP = 60;

  const cols = [
    [{ id:'alert', kind:'alert', title:'告警接入', sub:event.sourceSystem, badge:'输入' }],
    phase1Steps.filter(s => s.action !== 'observe').map(s => ({
      id: s.id, kind:`step-${s.action}`, title: stepTitle(s), sub: s.tool || `阶段一 · ${stepActionLabel(s.action)}`,
      badge: stepActionLabel(s.action),
    })),
    phase1Steps.filter(s => s.action === 'observe' && s.findings).flatMap(s => s.findings.map((f, fi) => ({
      id: `${s.id}-f${fi}`, kind:'finding', title:f, sub:'阶段一发现', badge:'发现',
    }))),
    phase2Steps.filter(s => s.action !== 'observe').map(s => ({
      id: s.id, kind:`step-${s.action}`, title: stepTitle(s), sub: s.tool || `阶段二 · ${stepActionLabel(s.action)}`,
      badge: stepActionLabel(s.action),
    })),
    [
      ...phase2Steps.filter(s => s.findings).flatMap(s => s.findings.map((f, fi) => ({
        id: `${s.id}-f${fi}`, kind:'finding', title:f, sub:'阶段二发现', badge:'发现',
      }))),
      { id:'impact', kind:'impact', title:'影响评估', sub:`${report.impactAssessment.affectedAccounts.length} 账号 · ${report.impactAssessment.affectedDevices.length} 设备`, badge:'评估' },
    ],
    [{ id:'conclusion', kind:'conclusion', title:'确认威胁', sub:'置信度 95%', badge:'结论' }],
    immediate.map(a => ({ id:a.id, kind:'remediation', title:a.title, sub:a.description, badge:'立即' })),
  ];

  const nodes = [];
  const colHeights = cols.map(c => c.length * NODE_H + (c.length - 1) * ROW_GAP);
  const maxColH = Math.max(...colHeights);
  cols.forEach((col, ci) => {
    const colY0 = PAD_TOP + (maxColH - colHeights[ci]) / 2;
    col.forEach((n, ri) => {
      nodes.push({ ...n, col:ci, x: PAD_LEFT + ci * COL_W, y: colY0 + ri * (NODE_H + ROW_GAP) });
    });
  });

  const edges = [];
  for (let ci = 0; ci < cols.length - 1; ci++) {
    const left = nodes.filter(n => n.col === ci);
    const right = nodes.filter(n => n.col === ci + 1);
    if (left.length === right.length && left.length > 1) {
      left.forEach((l, i) => edges.push({ from:l, to:right[i] }));
    } else {
      left.forEach(l => right.forEach(r => edges.push({ from:l, to:r })));
    }
  }

  const svgW = PAD_LEFT * 2 + cols.length * COL_W;
  const svgH = PAD_TOP * 2 + maxColH;
  const [activeNode, setActiveNode] = useStateAg(null);

  return (
    <>
      <div style={{ display:'flex', flexWrap:'wrap', gap:14, fontSize:12, color:'var(--muted-foreground)', padding:'4px 0' }}>
        <Legend dot="#0a0a0a" label="输入"/>
        <Legend dot="#a78bfa" label="推理 (reason)"/>
        <Legend dot="#0a0a0a" outline label="行动 (act)"/>
        <Legend dot="#3b82f6" label="观察 (observe)"/>
        <Legend dot="#22c55e" label="发现"/>
        <Legend dot="#ea580c" label="影响 / 评估"/>
        <Legend dot="#dc2626" label="结论 / 立即处置"/>
      </div>

      <UI.Card style={{ padding:0, overflow:'auto' }}>
        <div style={{ position:'relative', width: svgW, height: svgH, background:'#fff',
          backgroundImage:'radial-gradient(circle, #f4f4f5 1px, transparent 1px)',
          backgroundSize:'24px 24px', backgroundPosition:'8px 8px',
        }}>
          <svg viewBox={`0 0 ${svgW} ${svgH}`} width={svgW} height={svgH} style={{ position:'absolute', inset:0, pointerEvents:'none' }}>
            <defs>
              <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#71717a"/>
              </marker>
              <marker id="arrow-active" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
                <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
              </marker>
            </defs>
            {['告警', '阶段一 · 推理 + 行动', '关键发现', '阶段二 · 推理 + 行动', '影响评估', '结论', '立即处置'].map((title, i) => (
              <text key={i} x={PAD_LEFT + i * COL_W + 90} y={32} textAnchor="middle"
                fontSize="11" fill="#71717a" fontWeight="500" fontFamily="Inter">{title}</text>
            ))}
            {edges.map((e, i) => {
              const x1 = e.from.x + 180;
              const y1 = e.from.y + NODE_H / 2;
              const x2 = e.to.x;
              const y2 = e.to.y + NODE_H / 2;
              const midX = (x1 + x2) / 2;
              const path = `M ${x1} ${y1} C ${midX} ${y1}, ${midX} ${y2}, ${x2} ${y2}`;
              const isActive = activeNode && (activeNode === e.from.id || activeNode === e.to.id);
              return (
                <path key={i} d={path} fill="none"
                  stroke={isActive ? '#22c55e' : '#d4d4d8'}
                  strokeWidth={isActive ? 1.8 : 1.2}
                  strokeDasharray={isActive ? 'none' : '3 3'}
                  markerEnd={isActive ? 'url(#arrow-active)' : 'url(#arrow)'}
                />
              );
            })}
          </svg>
          {nodes.map(n => (
            <GraphNode key={n.id} node={n} active={activeNode === n.id}
              onHover={() => setActiveNode(n.id)} onLeave={() => setActiveNode(null)} />
          ))}
        </div>
      </UI.Card>
    </>
  );
}

function GraphNode({ node, active, onHover, onLeave }) {
  const meta = nodeStyle(node.kind);
  return (
    <div onMouseEnter={onHover} onMouseLeave={onLeave} style={{
      position:'absolute', left:node.x, top:node.y, width:180, height:70,
      background:'#fff', border:`1.5px solid ${active ? '#22c55e' : meta.border}`,
      borderLeft:`3px solid ${meta.accent}`, borderRadius:8, padding:'10px 12px',
      boxShadow: active ? '0 4px 12px -2px rgba(34, 197, 94, 0.25)' : 'var(--shadow-sm)',
      display:'flex', flexDirection:'column', gap:4,
      transition:'box-shadow .15s, border-color .15s', cursor:'pointer',
      zIndex: active ? 2 : 1,
    }}>
      <div style={{ display:'flex', alignItems:'center', gap:6 }}>
        <span style={{
          fontSize:9.5, padding:'1px 5px', borderRadius:3, fontWeight:500,
          background: meta.badgeBg, color: meta.badgeFg, lineHeight:1.3,
        }}>{node.badge}</span>
      </div>
      <div style={{
        fontSize:12, fontWeight:500, lineHeight:1.35,
        overflow:'hidden', display:'-webkit-box', WebkitLineClamp:2, WebkitBoxOrient:'vertical',
      }}>{node.title}</div>
      <div className={node.sub && node.sub.includes('_') ? 'mono' : ''} style={{
        fontSize:10.5, color:'var(--muted-foreground)',
        overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap',
      }}>{node.sub}</div>
    </div>
  );
}

function nodeStyle(kind) {
  switch (kind) {
    case 'alert':       return { accent:'#0a0a0a', border:'#e4e4e7', badgeBg:'#0a0a0a',   badgeFg:'#fff' };
    case 'step-reason': return { accent:'#a78bfa', border:'#e4e4e7', badgeBg:'#f5f3ff', badgeFg:'#6d28d9' };
    case 'step-act':    return { accent:'#0a0a0a', border:'#e4e4e7', badgeBg:'#27272a', badgeFg:'#fff' };
    case 'step-observe':return { accent:'#3b82f6', border:'#e4e4e7', badgeBg:'#eff6ff', badgeFg:'#1d4ed8' };
    case 'finding':     return { accent:'#22c55e', border:'#e4e4e7', badgeBg:'#f0fdf4', badgeFg:'#15803d' };
    case 'impact':      return { accent:'#ea580c', border:'#e4e4e7', badgeBg:'#fff7ed', badgeFg:'#c2410c' };
    case 'conclusion':  return { accent:'#dc2626', border:'#fecaca', badgeBg:'#fef2f2', badgeFg:'#b91c1c' };
    case 'remediation': return { accent:'#dc2626', border:'#fecaca', badgeBg:'#fef2f2', badgeFg:'#b91c1c' };
    default:            return { accent:'#71717a', border:'#e4e4e7', badgeBg:'#f4f4f5', badgeFg:'#52525b' };
  }
}

function stepActionLabel(a) { return a === 'reason' ? '推理' : a === 'act' ? '行动' : '观察'; }
function stepTitle(s) {
  if (s.action === 'reason') return s.reasoning.length > 40 ? s.reasoning.slice(0, 40) + '…' : s.reasoning;
  if (s.action === 'act') return s.tool || s.reasoning;
  return s.reasoning;
}

function Legend({ dot, outline, label }) {
  return (
    <span style={{ display:'inline-flex', alignItems:'center', gap:6 }}>
      <span style={{
        width:10, height:10, borderRadius:2,
        background: outline ? '#fff' : dot,
        border: outline ? `1.5px solid ${dot}` : 'none',
      }}/>
      {label}
    </span>
  );
}

      width:44, height:44, borderRadius:8,
      background:'#fff', border:`1.5px solid ${active ? '#22c55e' : pal.bd}`,
      color: pal.fg, display:'flex', alignItems:'center', justifyContent:'center',
      cursor: onClick ? 'pointer' : 'default',
      boxShadow: emphasis ? `0 4px 12px -2px ${pal.fg}33, var(--shadow-sm)` : active ? `0 4px 12px -2px ${pal.fg}33` : 'var(--shadow-xs)',
      transition:'border-color .15s, box-shadow .15s, transform .15s',
      padding:0, fontFamily:'inherit',
    }}>
      <Icon size={18}/>
    </button>
  );
}

function ThreadPopover({ children, anchor, onClose }) {
  return (
    <div style={{
      position:'absolute',
      left: anchor === 'evidence' ? '50%' : anchor === 'search' ? 56 : 56,
      top: anchor === 'evidence' ? 56 : 56,
      transform: anchor === 'evidence' ? 'translateX(-50%)' : 'none',
      minWidth: anchor === 'evidence' ? 380 : 280,
      background:'#fff', border:'1px solid var(--border)', borderRadius:10,
      padding:14, boxShadow:'var(--shadow-pop)', zIndex:20,
      animation:'popIn .15s ease-out',
    }}>
      <button onClick={onClose} style={{
        position:'absolute', top:8, right:8,
        width:22, height:22, borderRadius:4, border:0,
        background:'transparent', color:'var(--muted-foreground)', cursor:'pointer',
        display:'inline-flex', alignItems:'center', justifyContent:'center',
      }}><Icons.Close size={12}/></button>
      {children}
    </div>

}

function Minimap({ threads }) {
  return (
    <svg viewBox="0 0 100 120" width="100%" height="auto" style={{ display:'block' }}>
      <line x1="20" y1="6" x2="20" y2="112" stroke="#e4e4e7" strokeWidth="1" strokeDasharray="2 2"/>
      <line x1="50" y1="6" x2="50" y2="112" stroke="#e4e4e7" strokeWidth="1" strokeDasharray="2 2"/>
      <line x1="78" y1="6" x2="78" y2="112" stroke="#e4e4e7" strokeWidth="1" strokeDasharray="2 2"/>
      {threads.map((t, i) => {
        const y = 10 + i * 10.5;
        const tone = t.verdict === 'malicious' ? '#dc2626' : t.verdict === 'clean' ? '#22c55e' : '#3b82f6';
        return (
          <g key={t.id}>
            <rect x="16" y={y - 3} width="8" height="6" rx="1" fill="#a78bfa" opacity="0.7"/>
            <rect x="46" y={y - 3} width="8" height="6" rx="1" fill="#0891b2" opacity="0.7"/>
            <rect x="74" y={y - 3} width="8" height="6" rx="1" fill={tone}/>
          </g>
        );
      })}
    </svg>
  );
}

window.ActionGraphPage = ActionGraphPage;

<script type="text/babel">
/* Hunting page — 主动狩猎 */

const { useState: useStateHunt } = React;

function HuntingPage({ onNavigate }) {
  const [tab, setTab] = useStateHunt('tasks');
  const [statusFilter, setStatusFilter] = useStateHunt('all');
  const [modeFilter, setModeFilter] = useStateHunt('all');
  const [search, setSearch] = useStateHunt('');
  const [newOpen, setNewOpen] = useStateHunt(false);

  const filtered = mockHuntTasks.filter(t => {
    if (statusFilter !== 'all' && t.status !== statusFilter) return false;
    if (modeFilter !== 'all' && t.mode !== modeFilter) return false;
    if (search && !(`${t.name} ${t.hypothesis || ''}`.toLowerCase().includes(search.toLowerCase()))) return false;
    return true;
  });

  const running = mockHuntTasks.filter(t => t.status === 'running').length;
  const completed = mockHuntTasks.filter(t => t.status === 'completed').length;
  const findings = mockHuntTasks.reduce((a, t) => a + t.findings.length, 0);

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
      <UI.SectionTitle
        title="主动狩猎"
        subtitle="主动搜索潜在威胁，发现绕过告警规则的隐蔽攻击"
        action={
          <UI.Button variant="primary" leftIcon={<Icons.Plus size={14}/>} onClick={() => setNewOpen(true)}>
            新建狩猎任务
          </UI.Button>
        }
      />

      <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:12 }}>
        <UI.StatCard label="执行中任务" value={running} icon={<Icons.Loader size={15} className="spin"/>} />
        <UI.StatCard label="已完成任务" value={completed} icon={<Icons.Check size={15}/>}/>
        <UI.StatCard label="可疑发现" value={findings} sub="待人工复核" icon={<Icons.Alert size={15}/>} />
        <UI.StatCard label="假设库" value={huntPacks.length} sub="预置狩猎包" icon={<Icons.File size={15}/>} />
      </div>

      <UI.Tabs value={tab} onChange={setTab} items={[
        { value:'tasks', label:'狩猎任务', icon:<Icons.Target size={13}/> },
        { value:'packs', label:'狩猎假设库', icon:<Icons.Zap size={13}/> },
      ]} />

      {tab === 'tasks' && (
        <>
          <UI.Card style={{ padding:'10px 12px' }}>
            <div style={{ display:'flex', gap:8 }}>
              <div style={{ flex:'1 1 240px' }}>
                <UI.Input
                  placeholder="搜索任务名称或假设…"
                  value={search} onChange={e => setSearch(e.target.value)}
                  leftIcon={<Icons.Search size={14}/>}
                />
              </div>
              <UI.Select value={statusFilter} onChange={setStatusFilter} options={[
                { value:'all', label:'全部状态' },
                { value:'running', label:'执行中' },
                { value:'completed', label:'已完成' },
                { value:'pending', label:'等待中' },
                { value:'failed', label:'失败' },
              ]} width={130} />
              <UI.Select value={modeFilter} onChange={setModeFilter} options={[
                { value:'all', label:'全部模式' },
                { value:'auto', label:'自动狩猎' },
                { value:'manual', label:'手动狩猎' },
              ]} width={130} />
              <div style={{ flex:1 }}/>
              <UI.Button leftIcon={<Icons.Refresh size={14}/>}>刷新</UI.Button>
            </div>
          </UI.Card>

          <div style={{ display:'grid', gridTemplateColumns:'repeat(2, 1fr)', gap:12 }}>
            {filtered.map(t => <HuntTaskCard key={t.id} task={t} />)}
          </div>
        </>
      )}

      {tab === 'packs' && (
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:12 }}>
          {huntPacks.map(p => (
            <UI.Card key={p.id} style={{ padding:16, display:'flex', flexDirection:'column', gap:10 }}>
              <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start' }}>
                <div style={{ fontSize:13.5, fontWeight:600 }}>{p.name}</div>
                <UI.Badge variant="muted">{p.frequency}</UI.Badge>
              </div>
              <div style={{ fontSize:12.5, color:'var(--muted-foreground)', lineHeight:1.55, flex:1 }}>{p.description}</div>
              <div style={{ display:'flex', gap:6, alignItems:'center', justifyContent:'space-between' }}>
                <UI.Badge tone="info">{SCENE_CONFIG[p.scene].label}</UI.Badge>
                <UI.Button size="sm" leftIcon={<Icons.Play size={12}/>}>立即执行</UI.Button>
              </div>
            </UI.Card>
          ))}
        </div>
      )}

      <UI.Modal open={newOpen} onClose={() => setNewOpen(false)} title="创建狩猎任务" description="通过自然语言查询、假设验证或 IOC 溯源发起主动威胁狩猎" width={620}
        footer={<>
          <UI.Button onClick={() => setNewOpen(false)}>取消</UI.Button>
          <UI.Button variant="primary" leftIcon={<Icons.Play size={13}/>}>开始狩猎</UI.Button>
        </>}>
        <NewHuntForm />
      </UI.Modal>
    </div>
  );
}

function HuntTaskCard({ task }) {
  const statusMeta = {
    pending:   { tone:'neutral', label:'等待中', icon:<Icons.Clock size={11}/> },
    running:   { tone:'info', label:'执行中', icon:<Icons.Loader size={11} className="spin"/> },
    completed: { tone:'success', label:'已完成', icon:<Icons.Check size={11}/> },
    failed:    { tone:'destructive', label:'失败', icon:<Icons.Close size={11}/> },
  }[task.status];

  const fmt = ts => {
    const d = new Date(ts);
    return `${String(d.getUTCMonth()+1).padStart(2,'0')}/${String(d.getUTCDate()).padStart(2,'0')} ${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}`;
  };

  return (
    <UI.Card style={{ padding:18 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:10 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <UI.Badge variant={task.mode === 'auto' ? 'solid' : 'muted'}>{task.mode === 'auto' ? '自动' : '手动'}</UI.Badge>
          <span style={{ fontSize:14, fontWeight:600 }}>{task.name}</span>
        </div>
        <UI.Badge tone={statusMeta.tone}>{statusMeta.icon} {statusMeta.label}</UI.Badge>
      </div>

      {task.hypothesis && (
        <div style={{ fontSize:12.5, color:'var(--muted-foreground)', marginBottom:10, lineHeight:1.55 }}>
          <span style={{ fontWeight:500, color:'var(--foreground)' }}>假设：</span>{task.hypothesis}
        </div>
      )}

      <div style={{ display:'flex', flexWrap:'wrap', gap:12, fontSize:11, color:'var(--muted-foreground)', marginBottom:12 }}>
        <span style={{ display:'inline-flex', alignItems:'center', gap:4 }}><Icons.Calendar size={11}/> {fmt(task.startedAt)}</span>
        {task.completedAt && <>
          <Icons.ArrowR size={11}/>
          <span className="mono">{fmt(task.completedAt)}</span>
        </>}
        <span style={{ display:'inline-flex', alignItems:'center', gap:4 }}><Icons.User size={11}/> {task.triggeredBy}</span>
      </div>

      {task.findings.length > 0 ? (
        <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
          <div style={{ display:'flex', alignItems:'center', gap:6 }}>
            <Icons.Alert size={13} style={{ color:'var(--warning)' }}/>
            <span style={{ fontSize:12.5, fontWeight:500 }}>发现 {task.findings.length} 条可疑记录</span>
          </div>
          {task.findings.map(f => (
            <div key={f.id} style={{ padding:'10px 12px', background:'var(--muted-2)', border:'1px solid var(--border)', borderRadius:6 }}>
              <UI.Badge tone={f.severity} style={{ marginBottom:6 }}>{PRIORITY_CONFIG[f.severity].label}</UI.Badge>
              <div style={{ fontSize:12.5, lineHeight:1.55, marginBottom:6 }}>{f.description}</div>
              <pre className="mono" style={{
                margin:0, padding:8, background:'#0a0a0a', color:'#d4d4d8',
                fontSize:11, lineHeight:1.5, borderRadius:4, whiteSpace:'pre-wrap',
              }}>{f.evidence}</pre>
              <div style={{ marginTop:8 }}>
                <UI.Button size="sm" leftIcon={<Icons.ArrowR size={11}/>}>转为事件</UI.Button>
              </div>
            </div>
          ))}
        </div>
      ) : task.status === 'completed' ? (
        <div style={{ display:'flex', alignItems:'center', gap:6, fontSize:12.5, color:'var(--muted-foreground)' }}>
          <Icons.Check size={13} style={{ color:'var(--success)' }}/> 未发现可疑活动
        </div>
      ) : task.status === 'running' ? (
        <div style={{ display:'flex', alignItems:'center', gap:6, fontSize:12.5, color:'var(--info)' }}>
          <Icons.Loader size={13} className="spin"/> 正在分析…
        </div>
      ) : null}
    </UI.Card>
  );
}

function NewHuntForm() {
  const [type, setType] = useStateHunt('query');
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
      <UI.Tabs value={type} onChange={setType} items={[
        { value:'query', label:'自然语言', icon:<Icons.Search size={13}/> },
        { value:'hypothesis', label:'假设验证', icon:<Icons.Brain size={13}/> },
        { value:'ioc', label:'IOC 溯源', icon:<Icons.Target size={13}/> },
      ]} />

      {type === 'query' && (
        <>
          <Field label="自然语言查询" hint="AI 将自动转换为结构化查询并执行">
            <UI.Textarea placeholder="例如：过去 7 天里，有没有用户在下班时间（20 点后）访问了财务系统并下载了超过 100MB 的文件？" style={{ minHeight:110 }}/>
          </Field>
          <Field label="时间范围">
            <UI.Select value="7d" onChange={()=>{}} options={[
              { value:'24h', label:'近 24 小时' },
              { value:'7d', label:'近 7 天' },
              { value:'30d', label:'近 30 天' },
              { value:'90d', label:'近 90 天' },
            ]} />
          </Field>
        </>
      )}
      {type === 'hypothesis' && (
        <>
          <Field label="狩猎假设" hint="AI 将自动拆解为多个子查询并验证假设">
            <UI.Textarea placeholder="例如：我怀疑有攻击者通过供应商 VPN 账号在内网横向移动" style={{ minHeight:110 }}/>
          </Field>
          <Field label="关联场景">
            <UI.Select value="" onChange={()=>{}} placeholder="选择场景" options={Object.entries(SCENE_CONFIG).map(([k,v])=>({value:k, label:v.label}))}/>
          </Field>
        </>
      )}
      {type === 'ioc' && (
        <>
          <Field label="IOC 类型">
            <UI.Select value="" onChange={()=>{}} placeholder="选择类型" options={[
              { value:'ip', label:'IP 地址' },
              { value:'domain', label:'域名' },
              { value:'hash', label:'文件 Hash' },
              { value:'account', label:'账号' },
            ]}/>
          </Field>
          <Field label="IOC 值">
            <UI.Input placeholder="例如：185.220.101.34 或 malware.exe 的 SHA256"/>
          </Field>
          <Field label="溯源范围">
            <UI.Select value="all" onChange={()=>{}} options={[
              { value:'all', label:'全部日志类型' },
              { value:'auth', label:'认证日志' },
              { value:'network', label:'网络日志' },
              { value:'endpoint', label:'终端日志' },
            ]}/>
          </Field>
        </>
      )}
    </div>
  );
}

function Field({ label, hint, children }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
      <label style={{ fontSize:12.5, fontWeight:500 }}>{label}</label>
      {children}
      {hint && <div style={{ fontSize:11, color:'var(--muted-foreground)' }}>{hint}</div>}
    </div>
  );
}

window.HuntingPage = HuntingPage;
window.huntHelpers = { Field };

</script>
<script type="text/babel">
/* Knowledge Base — 知识库 */

const { useState: useStateKb } = React;

const KB_TYPE_CONFIG = {

  behavior_baseline:    { label:'行为基线', tone:'purple',  iconKey:'Activity' },

  hunting_rule:         { label:'狩猎规则', tone:'critical',iconKey:'Target'   },

const KB_SOURCE_CONFIG = {
  auto:     { label:'自动学习', tone:'success' },
  feedback: { label:'反馈驱动', tone:'warning' },
  manual:   { label:'人工录入', tone:'neutral' },
};

function KnowledgePage() {
  const [tab, setTab] = useStateKb('list');
  const [search, setSearch] = useStateKb('');
  const [typeFilter, setTypeFilter] = useStateKb('all');
  const [sourceFilter, setSourceFilter] = useStateKb('all');
  const [newOpen, setNewOpen] = useStateKb(false);

  const filtered = mockKnowledgeEntries.filter(e => {
    if (typeFilter !== 'all' && e.type !== typeFilter) return false;

    if (search) {
      const k = search.toLowerCase();
      const match = e.title.toLowerCase().includes(k) || e.content.toLowerCase().includes(k) || e.tags.some(t => t.toLowerCase().includes(k));
      if (!match) return false;
    }
    return true;
  });

  const totalRefs = mockKnowledgeEntries.reduce((s, e) => s + e.referenceCount, 0);

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
      <UI.SectionTitle
        title="知识库"
        subtitle="管理企业环境知识，AI 调查时自动检索注入推理上下文"
        action={
          <div style={{ display:'flex', gap:8 }}>
            <UI.Button leftIcon={<Icons.Upload size={14}/>}>批量导入</UI.Button>
            <UI.Button variant="primary" leftIcon={<Icons.Plus size={14}/>} onClick={() => setNewOpen(true)}>新建知识</UI.Button>

          {Object.entries(KB_TYPE_CONFIG).map(([k, cfg]) => {
            const Icon = Icons[cfg.iconKey];
            const cnt = mockKnowledgeEntries.filter(e => e.type === k).length;

              <KbStatCell key={k} label={cfg.label} value={cnt} icon={<Icon size={14}/>} tone={cfg.tone}/>

      </UI.Card>

      <UI.Card style={{ padding:'10px 12px' }}>
        <div style={{ display:'flex', gap:8 }}>

          </div>
          <UI.Select value={typeFilter} onChange={setTypeFilter} options={[
            { value:'all', label:'全部类型' },
            ...Object.entries(KB_TYPE_CONFIG).map(([k, v]) => ({ value:k, label:v.label })),
          ]} width={140}/>
          <UI.Select value={sourceFilter} onChange={setSourceFilter} options={[

            { value:'list', label:'卡片' },

      </UI.Card>

      {tab === 'list' && (
        <div style={{ display:'grid', gridTemplateColumns:'repeat(3, 1fr)', gap:12 }}>
          {filtered.length === 0 ? (
            <UI.Card style={{ gridColumn:'span 3', padding:48, textAlign:'center' }}>
              <Icons.Search size={20} style={{ opacity:0.4 }}/>
              <div style={{ fontSize:13, color:'var(--muted-foreground)', marginTop:8 }}>未找到匹配的知识</div>
            </UI.Card>
          ) : filtered.map(e => <KnowledgeCard key={e.id} entry={e}/>)}
        </div>
      )}

      {tab === 'graph' && <KnowledgeGraph entries={filtered}/>}

      {/* Footer info */}
      <UI.Card style={{ padding:'16px 18px', background:'var(--muted-2)' }}>
        <div style={{ display:'flex', alignItems:'flex-start', gap:12 }}>
          <div style={{
            width:32, height:32, borderRadius:8,
            background:'#0a0a0a', color:'#fff',
            display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0,
          }}>
            <Icons.Brain size={16}/>
          </div>
          <div>
            <div style={{ fontSize:13.5, fontWeight:600, marginBottom:4 }}>知识库如何工作？</div>
            <div style={{ fontSize:12.5, color:'var(--muted-foreground)', lineHeight:1.6 }}>
              知识库存储关于您企业环境的特定知识 — 实体关系、行为基线、安全策略和历史调查经验。AI 调查事件时，会自动检索相关知识注入推理上下文。
              目前已被调查引擎引用 <span style={{ fontWeight:600, color:'var(--foreground)' }} className="mono">{totalRefs.toLocaleString()}</span> 次。
            </div>
          </div>
        </div>
      </UI.Card>

      <UI.Modal open={newOpen} onClose={() => setNewOpen(false)} title="创建知识条目" description="添加新的知识条目，帮助 AI 更好地理解您的企业环境" width={580}
        footer={<>

          <huntHelpers.Field label="内容">

          </huntHelpers.Field>
        </div>
      </UI.Modal>
    </div>
  );
}

function KbStatCell({ label, value, sub, icon, tone }) {
  return (
    <div style={{ padding:'14px 18px', borderRight:'1px solid var(--border)' }}>
      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div style={{ fontSize:11.5, color:'var(--muted-foreground)' }}>{label}</div>
        {icon && (
          <div style={{
            width:22, height:22, borderRadius:5,
            background: tone ? UI.tonePalette[tone].bg : 'var(--muted)',
            color: tone ? UI.tonePalette[tone].fg : 'var(--muted-foreground)',
            border: tone ? `1px solid ${UI.tonePalette[tone].bd}` : 'none',
            display:'inline-flex', alignItems:'center', justifyContent:'center',

      <div style={{ fontSize:24, fontWeight:600, letterSpacing:'-0.02em', marginTop:4 }}>{value}</div>
      {sub && <div style={{ fontSize:11, color:'var(--muted-foreground)', marginTop:2 }}>{sub}</div>}
    </div>
  );
}

function KnowledgeCard({ entry }) {
  const cfg = KB_TYPE_CONFIG[entry.type];
  const TypeIcon = Icons[cfg.iconKey];
  const src = KB_SOURCE_CONFIG[entry.source];

  return (
    <UI.Card style={{ padding:16, display:'flex', flexDirection:'column' }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:10 }}>
        <div style={{ display:'flex', alignItems:'center', gap:8 }}>
          <div style={{
            width:24, height:24, borderRadius:6,
            background: UI.tonePalette[cfg.tone].bg, color: UI.tonePalette[cfg.tone].fg,
            border: `1px solid ${UI.tonePalette[cfg.tone].bd}`,
            display:'flex', alignItems:'center', justifyContent:'center',
          }}>
            <TypeIcon size={13}/>
          </div>
          <UI.Badge tone={cfg.tone}>{cfg.label}</UI.Badge>
        </div>
        <UI.Button variant="ghost" size="icon-sm"><Icons.More size={14}/></UI.Button>
      </div>

      <div style={{ fontSize:13.5, fontWeight:600, marginBottom:6, lineHeight:1.4 }}>{entry.title}</div>
      <div style={{
        fontSize:12.5, color:'var(--muted-foreground)', lineHeight:1.6,
        display:'-webkit-box', WebkitLineClamp:3, WebkitBoxOrient:'vertical', overflow:'hidden',
        flex:1,
      }}>{entry.content}</div>

      <div style={{ display:'flex', flexWrap:'wrap', gap:4, margin:'12px 0' }}>
        {entry.tags.map(t => (
          <span key={t} style={{
            fontSize:11, padding:'2px 6px', borderRadius:4,
            background:'var(--muted)', color:'var(--muted-foreground)',
            display:'inline-flex', alignItems:'center', gap:2,
          }}><Icons.Hash size={10}/>{t}</span>
        ))}
      </div>

      <div style={{
        display:'flex', justifyContent:'space-between', alignItems:'center',
        paddingTop:10, borderTop:'1px solid var(--border)',
        fontSize:11, color:'var(--muted-foreground)',
      }}>
        <span style={{ display:'inline-flex', alignItems:'center', gap:4 }}>
          <UI.Dot tone={src.tone} size={6}/> {src.label}
        </span>
        <span style={{ display:'inline-flex', alignItems:'center', gap:8 }}>
          <span style={{ display:'inline-flex', alignItems:'center', gap:3 }}><Icons.Eye size={11}/> {entry.referenceCount}</span>
          <span style={{ display:'inline-flex', alignItems:'center', gap:3 }}><Icons.Clock size={11}/> {new Date(entry.updatedAt).toLocaleDateString('zh-CN', { month:'2-digit', day:'2-digit' })}</span>
        </span>
      </div>
    </UI.Card>
  );
}

// Simple knowledge relation graph (purely visual; arranges nodes radially around 'company')
function KnowledgeGraph({ entries }) {
  const nodes = entries.slice(0, 6);
  return (
    <UI.Card style={{ padding:20 }}>
      <div style={{ fontSize:13, color:'var(--muted-foreground)', marginBottom:12 }}>
        实体关系图（示意） · 节点 {nodes.length} 个
      </div>
      <div style={{ position:'relative', height:380, background:'var(--muted-2)', borderRadius:8, overflow:'hidden' }}>
        <svg width="100%" height="100%" viewBox="0 0 800 380">
          {/* connections */}
          {nodes.map((_, i) => {
            const angle = (i / nodes.length) * Math.PI * 2;
            const cx = 400 + Math.cos(angle) * 140;
            const cy = 190 + Math.sin(angle) * 110;
            return <line key={i} x1="400" y1="190" x2={cx} y2={cy} stroke="#d4d4d8" strokeWidth="1" strokeDasharray="3 3"/>;
          })}
          {/* center node */}
          <circle cx="400" cy="190" r="34" fill="#0a0a0a"/>
          <text x="400" y="195" textAnchor="middle" fill="#fff" fontSize="13" fontWeight="600" fontFamily="Inter">企业</text>
          {/* outer nodes */}
          {nodes.map((n, i) => {
            const angle = (i / nodes.length) * Math.PI * 2;
            const cx = 400 + Math.cos(angle) * 140;
            const cy = 190 + Math.sin(angle) * 110;
            const cfg = KB_TYPE_CONFIG[n.type];
            const pal = UI.tonePalette[cfg.tone];
            return (
              <g key={n.id}>
                <circle cx={cx} cy={cy} r="22" fill={pal.bg} stroke={pal.fg} strokeWidth="1.5"/>
                <text x={cx} y={cy + 4} textAnchor="middle" fill={pal.fg} fontSize="11" fontWeight="500" fontFamily="Inter">{cfg.label.slice(0,2)}</text>
                <text x={cx} y={cy + 38} textAnchor="middle" fill="#52525b" fontSize="10" fontFamily="Inter">{n.title.slice(0, 10)}{n.title.length > 10 ? '…' : ''}</text>
              </g>
            );
          })}
        </svg>
      </div>
    </UI.Card>
  );
}

window.KnowledgePage = KnowledgePage;
window.KB_TYPE_CONFIG = KB_TYPE_CONFIG;
window.KB_SOURCE_CONFIG = KB_SOURCE_CONFIG;

</script>
<script type="text/babel">
/* Settings — 设置 v2: 日志数据源, 删除SLA tab, 删除调查参数 */

const { useState: useStateSet } = React;

const SRC_TYPE_CONFIG = {
  webhook: { label:'Webhook',  iconKey:'Webhook' },
  syslog:  { label:'Syslog',   iconKey:'Server' },
  api:     { label:'API',      iconKey:'Cloud' },
  kafka:   { label:'Kafka',    iconKey:'Database' },
  file:    { label:'文件',     iconKey:'HardDrive' },
};

function SettingsPage() {
  const [tab, setTab] = useStateSet('sources');
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
      <UI.SectionTitle title="系统设置" subtitle="管理数据接入、AI 引擎与存储策略" />
      <UI.Tabs value={tab} onChange={setTab} items={[
        { value:'sources', label:'告警数据源',   icon:<Icons.Alert size={13}/> },
        { value:'logs',    label:'日志数据源',   icon:<Icons.Database size={13}/> },
        { value:'ai',      label:'AI 引擎',      icon:<Icons.Brain size={13}/> },
        { value:'users',   label:'用户与权限',   icon:<Icons.User size={13}/> },
        { value:'test',    label:'调查测试',      icon:<Icons.Search size={13}/> },
      ]}/>
      {tab === 'sources' && <AlertSourcesTab/>}
      {tab === 'logs'    && <LogSourcesTab/>}
      {tab === 'ai'      && <AIEngineTab/>}
      {tab === 'users'   && <UsersTab/>}
      {tab === 'test'    && <InvestigationTestTab/>}
    </div>

}

/* ── 告警源表单：必须在 AlertSourcesTab 外部声明，否则每次父级 re-render
   都会被当作"新组件类型"而 unmount/remount，输入框失焦只能输入一个字符 ── */
function SourceFormFields({ f, upd, tr }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
      <huntHelpers.Field label="数据源名称">
        <UI.Input placeholder="例如：Proofpoint TAP" value={f.name||''} onChange={e => upd('name', e.target.value)}/>
      </huntHelpers.Field>
      <huntHelpers.Field label="接入方式">
        <UI.Select value={f.type} onChange={v => upd('type', v)}
          options={Object.entries(SRC_TYPE_CONFIG).map(([k,v])=>({value:k, label:v.label}))}/>
      </huntHelpers.Field>
      <huntHelpers.Field label="场景分类">
        <UI.Select value={f.scene} onChange={v => upd('scene', v)}
          options={Object.entries(SCENE_CONFIG).map(([k,v])=>({value:k, label:v.label}))}/>
      </huntHelpers.Field>
      <huntHelpers.Field label="连接地址">
        <UI.Input placeholder="https://api.example.com/alerts" value={f.url||''} onChange={e => upd('url', e.target.value)}/>
      </huntHelpers.Field>
      <huntHelpers.Field label="认证方式">
        <UI.Select value={f.auth} onChange={v => upd('auth', v)} options={[
          { value:'none',   label:'无需认证' },
          { value:'apikey', label:'API Key' },
          { value:'basic',  label:'Basic Auth' },
          { value:'oauth',  label:'OAuth 2.0' },
        ]}/>
      </huntHelpers.Field>
      {f.auth === 'apikey' && (
        <huntHelpers.Field label="API Key">
          <UI.Input placeholder="输入 API Key" value={f.apiKey||''} onChange={e => upd('apiKey', e.target.value)}/>
        </huntHelpers.Field>
      )}
      {tr && (
        <div style={{ padding:'8px 12px', borderRadius:6, fontSize:12,
          background: tr.ok ? '#f0fdf4' : 'var(--destructive-soft)',
          color: tr.ok ? '#16a34a' : 'var(--destructive)',
          border: `1px solid ${tr.ok ? '#bbf7d0' : '#fca5a5'}`,
        }}>{tr.ok ? '✓ ' : '✗ '}{tr.msg}</div>
      )}
    </div>
  );
}

/* ─── Alert Sources Tab ─── */
function AlertSourcesTab() {
  const [addOpen, setAddOpen] = useStateSet(false);
  const [editSrc, setEditSrc] = useStateSet(null);
  const BLANK = { name:'', type:'webhook', scene:'network', url:'', auth:'none', apiKey:'' };
  const [form, setForm]         = useStateSet({ ...BLANK });
  const [editForm, setEditForm] = useStateSet({});
  const [testing, setTesting]   = useStateSet(false);
  const [testResult, setTestResult] = useStateSet(null);
  const [editTestResult, setEditTestResult] = useStateSet(null);
  const [, forceUpdate] = React.useReducer(x => x+1, 0);
  const updForm     = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const updEditForm = (k, v) => setEditForm(f => ({ ...f, [k]: v }));

  const active      = mockAlertSources.filter(s => s.status === 'active').length;
  const error       = mockAlertSources.filter(s => s.status === 'error').length;
  const totalAlerts = mockAlertSources.reduce((s, e) => s + (e.alertCount || 0), 0);

  const doTest = async (url, setResult) => {
    if (!url) { setResult({ ok:false, msg:'请填写连接地址' }); return; }
    setTesting(true); setResult(null);
    try {
      await fetch(url, { method:'GET', signal: AbortSignal.timeout(5000) });
      setResult({ ok:true, msg:'连接成功' });
    } catch(e) {
      setResult({ ok:false, msg:'连接失败：' + e.message });
    } finally { setTesting(false); }
  };

  const handleAdd = () => {
    if (!form.name || !form.url) { alert('请填写数据源名称和连接地址'); return; }
    const newSrc = {
      id: 'src-' + Date.now(), name: form.name, type: form.type,
      scene: form.scene, url: form.url, auth: form.auth, apiKey: form.apiKey,
      status: 'active', lastSeen: new Date().toISOString(), alertCount: 1,
    };
    mockAlertSources.push(newSrc);
    _saveAlertSources(mockAlertSources);
    forceUpdate();

    // 同步推送一条「数据源已接入」告警到事件列表，证明接入成功
    const evt = {
      id: 'EVT-SRC-' + Date.now(),
      alertId: 'ALR-' + Math.random().toString(36).slice(2,8).toUpperCase(),
      title: `[${newSrc.name}] 数据源已接入 · 等待告警推送`,
      sceneCategory: newSrc.scene || 'network',
      priority: 'low', severity: 'low',
      sourceSystem: newSrc.name,
      triggeredAt: new Date().toISOString(),
      entities: [],
      investigationStatus: 'uninvestigated',
      processStatus: 'pending',
      assignee: null,
      rawData: { _secmind_source_added:true, source: newSrc.name, type: newSrc.type, url: newSrc.url },
    };
    if (window.__eventsStore?.push) {
      window.__eventsStore.push(evt);
    } else {
      // EventsPage 还未挂载 → 走服务端 webhook 通道，事件列表打开时通过 5 秒轮询取回
      fetch(`/webhook/receive?source=${newSrc.id}`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
          _secmind_source_added: true,
          title: evt.title, severity: 'low', source: newSrc.name,
          scene: evt.sceneCategory, timestamp: evt.triggeredAt,
          message: '数据源已接入，等待告警推送',
        }),
      }).catch(()=>{});
    }

    setAddOpen(false); setForm({ ...BLANK }); setTestResult(null);
  };

  const openEdit = (src) => {
    setEditSrc(src);
    setEditForm({ name: src.name, type: src.type, scene: src.scene || 'network',
      url: src.url || '', auth: src.auth || 'none', apiKey: src.apiKey || '' });
    setEditTestResult(null);
  };

  const handleEditSave = () => {
    if (!editForm.name || !editForm.url) { alert('请填写数据源名称和连接地址'); return; }
    Object.assign(editSrc, {
      name: editForm.name, type: editForm.type, scene: editForm.scene,
      url: editForm.url, auth: editForm.auth, apiKey: editForm.apiKey,
    });
    _saveAlertSources(mockAlertSources);
    setEditSrc(null); forceUpdate();
  };

  const handleDelete = (src) => {
    const idx = mockAlertSources.findIndex(s => s.id === src.id);
    if (idx >= 0) mockAlertSources.splice(idx, 1);
    _saveAlertSources(mockAlertSources);
    forceUpdate();
  };


  return (
    <>
      <UI.Card style={{ padding:0, overflow:'hidden' }}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)' }}>
          <SetStat label="数据源总数" value={mockAlertSources.length} />
          <SetStat label="正常连接"   value={active}   tone="success"/>
          <SetStat label="异常连接"   value={error}    tone="destructive"/>
          <SetStat label="累计告警量" value={totalAlerts.toLocaleString()} sub="原始告警条数"/>
        </div>
      </UI.Card>

      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:8 }}>
        <div style={{ fontSize:14, fontWeight:600 }}>告警数据源 · {mockAlertSources.length}</div>
        <div style={{ display:'flex', gap:8 }}>
          <UI.Button leftIcon={<Icons.Refresh size={14}/>} onClick={() => forceUpdate()}>刷新状态</UI.Button>
          <UI.Button variant="brand" leftIcon={<Icons.Plus size={14}/>} onClick={() => setAddOpen(true)}>添加数据源</UI.Button>
        </div>
      </div>

      <UI.Card style={{ padding:0, overflow:'hidden' }}>
        <div style={{
          display:'grid', gridTemplateColumns:'1.5fr 100px 100px 130px 130px 100px',
          gap:12, padding:'10px 16px',
          background:'var(--muted-2)', borderBottom:'1px solid var(--border)',
          fontSize:11, color:'var(--muted-foreground)', fontWeight:500,
          textTransform:'uppercase', letterSpacing:'0.04em',
        }}>
          <span>数据源</span><span>类型</span><span>状态</span><span>最后活动</span><span>告警数量</span>
          <span style={{ textAlign:'right' }}>操作</span>
        </div>
        {mockAlertSources.length === 0 ? (
          <div style={{ padding:'48px 0', textAlign:'center', color:'var(--muted-foreground)' }}>
            <Icons.Database size={28} style={{ marginBottom:10, display:'block', margin:'0 auto 10px' , opacity:0.25 }}/>
            <div style={{ fontSize:13 }}>暂无告警数据源，点击「添加数据源」开始接入</div>
          </div>
        ) : mockAlertSources.map((s, i) => (
          <AlertSourceRow key={s.id} source={s} divider={i < mockAlertSources.length - 1}
            onEdit={() => openEdit(s)} onDelete={() => handleDelete(s)}/>
        ))}
      </UI.Card>

      {/* Add modal */}
      <UI.Modal open={addOpen} onClose={() => { setAddOpen(false); setTestResult(null); }}
        title="添加告警数据源" description="配置新的告警接入源，系统将自动解析和标准化告警数据" width={540}
        footer={<>
          <UI.Button onClick={() => doTest(form.url, setTestResult)} disabled={testing}
            leftIcon={<Icons.Activity size={13}/>}>
            {testing ? '测试中...' : '测试连接'}
          </UI.Button>
          <UI.Button onClick={() => { setAddOpen(false); setTestResult(null); }}>取消</UI.Button>
          <UI.Button variant="brand" leftIcon={<Icons.Plus size={13}/>} onClick={handleAdd}>添加</UI.Button>
        </>}>
        <SourceFormFields f={form} upd={updForm} tr={testResult}/>
      </UI.Modal>

      {/* Edit modal */}
      {editSrc && (
        <UI.Modal open onClose={() => setEditSrc(null)}
          title={`编辑数据源 · ${editSrc.name}`} description="修改告警数据源配置信息" width={540}
          footer={<>
            <UI.Button onClick={() => doTest(editForm.url, setEditTestResult)} disabled={testing}
              leftIcon={<Icons.Activity size={13}/>}>
              {testing ? '测试中...' : '测试连接'}
            </UI.Button>
            <UI.Button onClick={() => setEditSrc(null)}>取消</UI.Button>
            <UI.Button variant="brand" leftIcon={<Icons.Check size={13}/>} onClick={handleEditSave}>保存</UI.Button>
          </>}>
          <SourceFormFields f={editForm} upd={updEditForm} tr={editTestResult}/>
        </UI.Modal>
      )}
    </>
  );
}

function AlertSourceRow({ source, divider, onEdit, onDelete }) {
  const cfg = SRC_TYPE_CONFIG[source.type] || { iconKey:'Database', label: source.type };
  const Icon = Icons[cfg.iconKey] || Icons.Database;
  const statusMeta = {
    active:   { tone:'success',     label:'正常' },
    inactive: { tone:'neutral',     label:'休眠' },
    error:    { tone:'destructive', label:'异常' },
  }[source.status] || { tone:'neutral', label:'未知' };

  const [rowTest, setRowTest] = useStateSet('idle'); // idle | testing | ok | error

  const fmtRel = (t) => {
    if (!t) return '从未';
    const diff = new Date() - new Date(t);
    const min = Math.floor(diff / 60000), hr = Math.floor(diff / 3600000);
    if (min < 1) return '刚刚';
    if (min < 60) return `${min} 分钟前`;
    if (hr < 24) return `${hr} 小时前`;
    return new Date(t).toLocaleDateString('zh-CN');
  };

  const handleTest = async () => {
    setRowTest('testing');

    if (source.type === 'webhook') {
      /* POST a real test payload through the full pipeline:
         browser → server.js /webhook/receive → normalize → queue
         → frontend poll → __eventsStore.push → event list re-render  */
      try {
        const r = await fetch(`/webhook/receive?source=${source.id}`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            _secmind_test: true,
            title:         `[${source.name}] Webhook 测试告警 · 连通性验证`,
            severity:      'medium',
            source:        source.name,
            scene:         source.scene || 'network',
            timestamp:     new Date().toISOString(),
            message:       'SecMind webhook connectivity test — auto-generated to verify the full pipeline.',
          }),
        });
        setRowTest(r.ok ? 'ok' : 'error');
      } catch {
        /* server.js not running — fall back to in-memory inject */
        if (window.__eventsStore?.push) {
          window.__eventsStore.push({
            id: 'EVT-WH-' + Date.now(),
            alertId: 'WH-' + Math.random().toString(36).slice(2, 8).toUpperCase(),
            title: `[${source.name}] Webhook 测试告警 · 连通性验证（离线模式）`,
            sceneCategory: source.scene && SCENE_CONFIG[source.scene] ? source.scene : 'network',
            priority: 'medium', severity: 'medium',
            sourceSystem: source.name,
            triggeredAt: new Date().toISOString(),
            entities: [],
            investigationStatus: 'uninvestigated',
            processStatus: 'pending',
            assignee: null,
            rawData: { _secmind_test: true, _offline: true, source: source.name },
          });
          setRowTest('ok');
        } else {
          setRowTest('error');
        }
      }
    } else {
      if (!source.url) { alert('该数据源未配置连接地址，请先编辑'); setRowTest('idle'); return; }
      try {
        const headers = {};
        if (source.auth === 'apikey' && source.apiKey) headers['Authorization'] = `Bearer ${source.apiKey}`;
        await fetch(source.url, { method: 'GET', headers, signal: AbortSignal.timeout(5000) });
        setRowTest('ok');
      } catch {
        setRowTest('error');
      }
    }
    setTimeout(() => setRowTest('idle'), 3000);
  };

  const [confirmDel, setConfirmDel] = useStateSet(false);

  const testIcon = rowTest === 'testing' ? <Icons.Loader size={13} className="spin"/>
    : rowTest === 'ok'   ? <Icons.Check  size={13} style={{ color:'#16a34a' }}/>
    : rowTest === 'error' ? <Icons.Activity size={13} style={{ color:'#dc2626' }}/>
    : <Icons.Activity size={13}/>;

  const testLabel = source.type === 'webhook' ? '推送测试告警' : '测试连接';

  return (
    <div className="hover-row" style={{
      display:'grid', gridTemplateColumns:'1.5fr 100px 100px 130px 130px 100px',
      gap:12, padding:'12px 16px', alignItems:'center',
      borderBottom: divider ? '1px solid var(--border)' : 'none',
      transition:'background .12s',
    }}>
      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
        <div style={{ width:30, height:30, borderRadius:7, background:'var(--muted)',
          display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
          <Icon size={15}/>
        </div>
        <div>
          <div style={{ fontSize:13, fontWeight:500 }}>{source.name}</div>
          <div className="mono" style={{ fontSize:11, color:'var(--muted-foreground)' }}>
            {source.type === 'webhook'
              ? `POST localhost:3000/webhook/receive?source=${source.id}`
              : source.url || source.id}
          </div>
        </div>
      </div>
      <UI.Badge variant="muted">{cfg.label}</UI.Badge>
      <UI.Badge tone={statusMeta.tone}>
        <UI.Dot tone={statusMeta.tone} size={6} pulse={source.status === 'active'}/> {statusMeta.label}
      </UI.Badge>
      <span style={{ fontSize:12, color:'var(--muted-foreground)' }}>{fmtRel(source.lastSeen)}</span>
      <span className="mono" style={{ fontSize:12.5, fontWeight:500 }}>{(source.alertCount||0).toLocaleString()}</span>
      <div style={{ display:'flex', justifyContent:'flex-end', alignItems:'center', gap:4 }}>
        {confirmDel ? (
          <>
            <span style={{ fontSize:11, color:'var(--destructive)', whiteSpace:'nowrap' }}>确认删除?</span>
            <UI.Button size="sm" onClick={() => { onDelete(); setConfirmDel(false); }}
              style={{ fontSize:11, background:'var(--destructive)', color:'#fff', borderColor:'var(--destructive)', height:26, padding:'0 8px' }}>
              删除
            </UI.Button>
            <UI.Button variant="ghost" size="sm" onClick={() => setConfirmDel(false)}
              style={{ fontSize:11, height:26, padding:'0 8px' }}>
              取消
            </UI.Button>
          </>
        ) : (
          <UI.DropdownMenu
            align="end" minWidth={140}
            trigger={<UI.Button variant="ghost" size="icon-sm"><Icons.More size={14}/></UI.Button>}
            items={[
              { label: testLabel, icon: testIcon, onSelect: handleTest, disabled: rowTest === 'testing' },
              { label: '编辑', icon: <Icons.Edit size={13}/>, onSelect: onEdit },
              '---',
              { label: '删除', icon: <Icons.Trash size={13}/>, tone: 'destructive', onSelect: () => setConfirmDel(true) },
            ]}
          />
        )}
      </div>
    </div>
  );
}

/* ─── Log Platform Presets & Types ─── */
const LOG_TYPE_CONFIG = {
  api:    { iconKey:'Globe',    label:'REST API' },
  syslog: { iconKey:'Server',   label:'Syslog' },
  kafka:  { iconKey:'Activity', label:'Kafka' },
  agent:  { iconKey:'Monitor',  label:'Agent' },
  jdbc:   { iconKey:'Database', label:'JDBC' },
  file:   { iconKey:'File',     label:'日志文件' },
};

/* 主流国内/通用日志平台预设
   auth: aksk | apikey | basic | sasl | none
   connType: api | syslog | kafka | jdbc
*/

    <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
      <huntHelpers.Field label="日志平台">
        <UI.Select value={f.platform} onChange={onPlatformChange} options={LOG_PLATFORM_OPTIONS}/>

function LogUploadCard() {
  const [uploadState, setUploadState] = useStateSet(() => {
    // 恢复上次上传的元数据
    try { return JSON.parse(localStorage.getItem('sm_upload_meta') || 'null') || { status:'idle', count:0, name:'' }; }
    catch { return { status:'idle', count:0, name:'' }; }
  });
  const [dragging, setDragging] = useStateSet(false);
  const fileRef = React.useRef(null);

  const doUpload = async (logs, name) => {
    setUploadState({ status:'uploading', count:0, name });
    try {
      const r = await _uploadLogData(logs, name);
      if (r.ok) {
        const meta = { status:'ok', count: r.count, name };
        setUploadState(meta);
        localStorage.setItem('sm_upload_meta', JSON.stringify(meta));
      } else {
        setUploadState({ status:'error', count:0, name, msg: r.error || '上传失败' });
      }
    } catch(e) {
      setUploadState({ status:'error', count:0, name, msg: e.message });
    }
  };

  const parseLogs = (text, filename) => {
    const cleaned = text.trim();

    // 1. 标准 JSON（数组 或 单个对象）
    try {
      const parsed = JSON.parse(cleaned);
      return Array.isArray(parsed) ? parsed : [parsed];
    } catch {}

    // 2. 没有外层 [] 的逗号分隔对象（最后一项可能也有逗号）
    try {
      const wrapped = '[' + cleaned.replace(/,\s*$/, '') + ']';
      const parsed = JSON.parse(wrapped);
      if (Array.isArray(parsed) && parsed.length > 0) return parsed;
    } catch {}

    // 3. NDJSON / 逐行解析（每行可能带尾部逗号，兼容缺少逗号的换行分隔）
    const lines = cleaned.split('\n');
    const jsonLines = lines
      .map(l => l.trim().replace(/,$/, ''))   // 去掉行尾逗号
      .filter(l => l.startsWith('{') || l.startsWith('['));
    if (jsonLines.length > 0) {
      const parsed = jsonLines
        .map(l => { try { return JSON.parse(l); } catch { return null; } })
        .filter(Boolean)
        .flat();
      if (parsed.length > 0) return parsed;
    }

    // 4. CSV
    const allLines = cleaned.split('\n').filter(Boolean);
    const [header, ...rows] = allLines;
    const keys = header.split(',').map(k => k.trim().replace(/^"|"$/g, ''));
    if (keys.length > 1 && rows.length > 0) {
      return rows.map(row => {
        const vals = row.split(',').map(v => v.trim().replace(/^"|"$/g, ''));
        return Object.fromEntries(keys.map((k, i) => [k, vals[i] || '']));
      });
    }

    // 5. 纯文本，每行作为一条日志
    return allLines.map(l => ({ message: l, '@timestamp': new Date().toISOString() }));
  };

  const handleFile = async (file) => {
    const text = await file.text();
    const logs = parseLogs(text, file.name);
    await doUpload(logs, file.name);
    try { localStorage.setItem('sm_upload_logs', JSON.stringify(logs.slice(0, 2000))); } catch {}
  };

  const handleDrop = (e) => {
    e.preventDefault(); setDragging(false);
    const file = e.dataTransfer.files[0];
    if (file) handleFile(file);
  };

  const handleClear = async () => {
    await _clearUploadedLogs();
    const meta = { status:'idle', count:0, name:'' };
    setUploadState(meta);
    localStorage.removeItem('sm_upload_meta');
  };

  // 页面加载时若有上次上传记录，重新上传到服务端（服务重启会丢失内存）
  React.useEffect(() => {
    if (uploadState.status === 'ok') {
      const saved = localStorage.getItem('sm_upload_logs');
      if (saved) {
        try {
          const logs = JSON.parse(saved);
          if (Array.isArray(logs) && logs.length > 0) _uploadLogData(logs, uploadState.name).catch(()=>{});
        } catch {}
      }
    }
  }, []);

  return (
    <UI.Card style={{ padding:0, overflow:'hidden' }}>
      <div style={{ padding:'14px 20px', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', justifyContent:'space-between' }}>
        <div>
          <div style={{ fontSize:13, fontWeight:600, display:'inline-flex', alignItems:'center', gap:8 }}>
            <Icons.Upload size={14}/> 上传本地日志
          </div>
          <div style={{ fontSize:11.5, color:'var(--muted-foreground)', marginTop:2 }}>
            当无已注册日志源时，AI 调查将自动使用上传的日志作为数据来源
          </div>
        </div>
        {uploadState.status === 'ok' && (
          <UI.Button size="sm" variant="ghost" onClick={handleClear} style={{ color:'var(--destructive)' }}>
            清除日志
          </UI.Button>
        )}
      </div>

      <div style={{ padding:'18px 20px', display:'flex', flexDirection:'column', gap:14 }}>
        {/* Status banner */}
        {uploadState.status === 'ok' && (
          <div style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 14px', borderRadius:8, background:'#f0fdf4', border:'1px solid #bbf7d0' }}>
            <Icons.Check size={14} style={{ color:'#16a34a', flexShrink:0 }}/>
            <div>
              <div style={{ fontSize:13, fontWeight:500, color:'#15803d' }}>已加载 {uploadState.count} 条日志</div>
              <div style={{ fontSize:11.5, color:'#166534' }}>来源文件：{uploadState.name}</div>
            </div>
            <UI.Badge tone="success" style={{ marginLeft:'auto' }}>调查可用</UI.Badge>
          </div>
        )}
        {uploadState.status === 'error' && (
          <div style={{ padding:'10px 14px', borderRadius:8, background:'var(--destructive-soft)', border:'1px solid var(--destructive)', fontSize:12.5, color:'var(--destructive)' }}>
            解析失败：{uploadState.msg}
          </div>
        )}

        {/* Drop zone */}
        <div
          onDragOver={e => { e.preventDefault(); setDragging(true); }}
          onDragLeave={() => setDragging(false)}
          onDrop={handleDrop}
          onClick={() => fileRef.current?.click()}
          style={{
