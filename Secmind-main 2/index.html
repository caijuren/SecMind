/* ─── Log Sources Tab ─── */
function LogSourcesTab() {
  const [addOpen, setAddOpen] = useStateSet(false);
  const [editSrc, setEditSrc] = useStateSet(null);
  const BLANK = {
    name:'', platform:'aliyun-sls', type:'api', url:'', auth:'aksk',
    apiKey:'', username:'', password:'',
    accessKeyId:'', accessKeySecret:'',
    region:'', project:'', logstore:'', topicId:'',
    logGroupId:'', logStreamId:'', index:'', topic:'',
    filePath:'',
  };
  const [form, setForm]         = useStateSet({ ...BLANK });
  const [editForm, setEditForm] = useStateSet({});
  const [testing, setTesting]   = useStateSet(false);
  const [testResult, setTestResult]       = useStateSet(null);
  const [editTestResult, setEditTestResult] = useStateSet(null);
  const [, forceUpdate] = React.useReducer(x => x + 1, 0);
  const updForm     = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const updEditForm = (k, v) => setEditForm(f => ({ ...f, [k]: v }));

  // 页面加载时将已有日志源注册到服务端
  React.useEffect(() => { _registerLogSources(mockLogSources); }, []);

  const active    = mockLogSources.filter(s => s.status === 'active').length;
  const error     = mockLogSources.filter(s => s.status === 'error').length;
  const totalLogs = mockLogSources.reduce((s, e) => s + (e.logCount || 0), 0);

  // 通过服务端桥接做真实测试（支持 AK/SK 签名）
  const doTest = async (f, setResult) => {
    // 本地文件：通过查询接口验证可读性
    if (f.platform === 'local-file') {
      if (!f.filePath) { setResult({ ok:false, msg:'请填写文件路径' }); return; }
      setTesting(true); setResult(null);
      try {
        // 临时注册，查询，再删除
        const tmpId = 'test-local-' + Date.now();
        await fetch('/api/log-source/register', { method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify([{ ...f, id: tmpId }]) });
        const r = await fetch('/api/log-source/query', { method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ source_id: tmpId, query:'*', limit:1 }) });
        fetch(`/api/log-source/register/${encodeURIComponent(tmpId)}`, { method:'DELETE' }).catch(()=>{});
        const d = await r.json();
        setResult({ ok: !!d.ok, msg: d.ok ? `文件读取成功，共 ${d.total||0} 条日志` : (d.msg || '读取失败') });
      } catch(e) {
        setResult({ ok:false, msg:'测试失败：' + e.message });
      } finally { setTesting(false); }
      return;
    }
    if (!f.url) { setResult({ ok:false, msg:'请填写连接地址' }); return; }
    setTesting(true); setResult(null);
    try {
      const r = await fetch('/api/log-source/test', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify(f),
      });
      const d = await r.json();
      setResult({ ok: !!d.ok, msg: d.msg || (d.ok?'连接成功':'连接失败') });
    } catch(e) {
      setResult({ ok:false, msg:'测试请求失败：' + e.message });
    } finally { setTesting(false); }
  };

  const handleAdd = () => {
    if (!form.name) { alert('请填写日志源名称'); return; }
    const newSrc = { id:'log-'+Date.now(), ...form, status:'active', lastSeen:new Date().toISOString(), logCount:0 };
    mockLogSources.push(newSrc);
    _saveLogSources(mockLogSources);
    _registerLogSources([newSrc]);
    forceUpdate();
    setAddOpen(false); setForm({ ...BLANK }); setTestResult(null);
  };

  const openEdit = (src) => {
    setEditSrc(src);
    setEditForm({ ...BLANK, ...src });
    setEditTestResult(null);
  };

  const handleEditSave = () => {
    if (!editForm.name) { alert('请填写日志源名称'); return; }
    Object.assign(editSrc, editForm);
    _saveLogSources(mockLogSources);
    _registerLogSources([editSrc]);
    setEditSrc(null); forceUpdate();
  };

  const handleDelete = (src) => {
    const idx = mockLogSources.findIndex(s => s.id === src.id);
    if (idx >= 0) mockLogSources.splice(idx, 1);
    _saveLogSources(mockLogSources);
    _unregisterLogSource(src.id);
    forceUpdate();
  };


  const fmtTotal = (n) => {
    if (!n) return '0';
    if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return n.toString();
  };

  return (
    <>
      <UI.Card style={{ padding:0, overflow:'hidden' }}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)' }}>
          <SetStat label="日志源总数" value={mockLogSources.length} />
          <SetStat label="正常连接"   value={active}   tone="success"/>
          <SetStat label="异常连接"   value={error}    tone="destructive"/>
          <SetStat label="累计日志量" value={fmtTotal(totalLogs)} sub="原始日志条数"/>
        </div>
      </UI.Card>

      <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:8 }}>
        <div style={{ fontSize:14, fontWeight:600 }}>日志接入源 · {mockLogSources.length}</div>
        <div style={{ display:'flex', gap:8 }}>
          <UI.Button leftIcon={<Icons.Refresh size={14}/>} onClick={() => forceUpdate()}>刷新状态</UI.Button>
          <UI.Button variant="brand" leftIcon={<Icons.Plus size={14}/>} onClick={() => setAddOpen(true)}>添加日志源</UI.Button>
        </div>
      </div>

      <UI.Card style={{ padding:0, overflow:'hidden' }}>
        <div style={{
          display:'grid', gridTemplateColumns:'1.5fr 160px 100px 130px 130px 100px',
          gap:12, padding:'10px 16px',
          background:'var(--muted-2)', borderBottom:'1px solid var(--border)',
          fontSize:11, color:'var(--muted-foreground)', fontWeight:500,
          textTransform:'uppercase', letterSpacing:'0.04em',
        }}>
          <span>日志源</span><span>平台</span><span>状态</span>
          <span>最后活动</span><span>日志总量</span>
          <span style={{ textAlign:'right' }}>操作</span>
        </div>
        {mockLogSources.length === 0 ? (
          <div style={{ padding:'48px 0', textAlign:'center', color:'var(--muted-foreground)' }}>
            <Icons.Database size={28} style={{ display:'block', margin:'0 auto 10px', opacity:0.25 }}/>
            <div style={{ fontSize:13 }}>暂无日志接入源，点击「添加日志源」开始接入</div>
          </div>
        ) : mockLogSources.map((s, i) => (
          <LogSourceRow key={s.id} source={s} divider={i < mockLogSources.length - 1}
            onEdit={() => openEdit(s)} onDelete={() => handleDelete(s)}/>
        ))}
      </UI.Card>

      {/* Add modal */}
      <UI.Modal open={addOpen} onClose={() => { setAddOpen(false); setTestResult(null); }}
        title="添加日志接入源" description="配置新的日志接入源，AI 引擎将自动索引和分析日志数据" width={560}
        footer={<>
          <UI.Button onClick={() => doTest(form, setTestResult)} disabled={testing}
            leftIcon={<Icons.Activity size={13}/>}>
            {testing ? '测试中...' : (form.platform === 'local-file' ? '验证文件' : '测试连接')}
          </UI.Button>
          <UI.Button onClick={() => { setAddOpen(false); setTestResult(null); }}>取消</UI.Button>
          <UI.Button variant="brand" leftIcon={<Icons.Plus size={13}/>} onClick={handleAdd}>添加</UI.Button>
        </>}>
        <LogFormFields f={form} upd={updForm} tr={testResult}/>
      </UI.Modal>

      {/* Edit modal */}
      {editSrc && (
        <UI.Modal open onClose={() => setEditSrc(null)}
          title={`编辑日志源 · ${editSrc.name}`} description="修改日志接入源配置信息" width={560}
          footer={<>
            <UI.Button onClick={() => doTest(editForm, setEditTestResult)} disabled={testing}
              leftIcon={<Icons.Activity size={13}/>}>
              {testing ? '测试中...' : (editForm.platform === 'local-file' ? '验证文件' : '测试连接')}
            </UI.Button>
            <UI.Button onClick={() => setEditSrc(null)}>取消</UI.Button>
            <UI.Button variant="brand" leftIcon={<Icons.Check size={13}/>} onClick={handleEditSave}>保存</UI.Button>
          </>}>
          <LogFormFields f={editForm} upd={updEditForm} tr={editTestResult}/>
        </UI.Modal>
      )}

      {/* 上传本地日志 */}
      <LogUploadCard/>
    </>
  );
}

function LogSourceRow({ source, divider, onEdit, onDelete }) {
  const cfg = LOG_TYPE_CONFIG[source.type] || { iconKey:'Database', label: source.type || 'API' };
  const Icon = Icons[cfg.iconKey] || Icons.Database;
  const platformLabel = LOG_PLATFORM_MAP[source.platform]?.label || source.platform || cfg.label;
  const statusMeta = {
    active:   { tone:'success',     label:'正常' },
    inactive: { tone:'neutral',     label:'休眠' },
    error:    { tone:'destructive', label:'异常' },
  }[source.status] || { tone:'neutral', label:'未知' };

  const fmtRel = (t) => {
    if (!t) return '从未';
    const diff = new Date() - new Date(t);
    const min = Math.floor(diff / 60000), hr = Math.floor(diff / 3600000);
    if (min < 1) return '刚刚';
    if (min < 60) return `${min} 分钟前`;
    if (hr < 24) return `${hr} 小时前`;
    return new Date(t).toLocaleDateString('zh-CN');
  };

  const fmtCount = (n) => {
    if (!n) return '0';
    if (n >= 1e9) return (n / 1e9).toFixed(1) + 'B';
    if (n >= 1e6) return (n / 1e6).toFixed(1) + 'M';
    if (n >= 1e3) return (n / 1e3).toFixed(1) + 'K';
    return n.toString();
  };

  const [rowTest, setRowTest] = useStateSet('idle');

  const handleTest = async () => {
    setRowTest('testing');
    if (!source.url) { alert('该日志源未配置连接地址，请先编辑'); setRowTest('idle'); return; }
    try {
      const r = await fetch('/api/log-source/test', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(source),
      });
      const d = await r.json();
      setRowTest(d.ok ? 'ok' : 'error');
    } catch {
      setRowTest('error');
    }
    setTimeout(() => setRowTest('idle'), 3000);
  };

  const [pulling, setPulling] = useStateSet(false);

  const handlePull = async () => {
    setPulling(true);
    try {
      const r = await fetch('/api/log-source/pull', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(source),
      });
      const d = await r.json();
      if (d.ok) {
        source.lastSeen = new Date().toISOString();
        source.logCount = (source.logCount || 0) + (d.count || 0);
        alert(`✓ ${d.msg}`);
      } else {
        alert('拉取失败：' + d.msg);
      }
    } catch(e) {
      alert('拉取请求失败：' + e.message);
    } finally {
      setPulling(false);
    }
  };

  const [confirmDel, setConfirmDel] = useStateSet(false);

  const testIcon = rowTest === 'testing' ? <Icons.Loader size={13} className="spin"/>
    : rowTest === 'ok'    ? <Icons.Check    size={13} style={{ color:'#16a34a' }}/>
    : rowTest === 'error' ? <Icons.Activity size={13} style={{ color:'#dc2626' }}/>
    : <Icons.Activity size={13}/>;

  return (
    <div className="hover-row" style={{
      display:'grid', gridTemplateColumns:'1.5fr 160px 100px 130px 130px 100px',
      gap:12, padding:'12px 16px', alignItems:'center',
      borderBottom: divider ? '1px solid var(--border)' : 'none',
      transition:'background .12s',
    }}>
      <div style={{ display:'flex', alignItems:'center', gap:10 }}>
        <div style={{ width:30, height:30, borderRadius:7, background:'var(--muted)',
          display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0 }}>
          <Icon size={15}/>
        </div>
        <div>
          <div style={{ fontSize:13, fontWeight:500 }}>{source.name}</div>
          <div className="mono" style={{ fontSize:11, color:'var(--muted-foreground)' }}>
            {source.url || source.id}
          </div>
        </div>
      </div>
      <div style={{ minWidth:0, overflow:'hidden' }}>
        <UI.Badge variant="muted" style={{ fontSize:10.5 }}>{platformLabel}</UI.Badge>
      </div>
      <UI.Badge tone={statusMeta.tone}>
        <UI.Dot tone={statusMeta.tone} size={6} pulse={source.status === 'active'}/> {statusMeta.label}
      </UI.Badge>
      <span style={{ fontSize:12, color:'var(--muted-foreground)' }}>{fmtRel(source.lastSeen)}</span>
      <span className="mono" style={{ fontSize:12.5, fontWeight:500 }}>{fmtCount(source.logCount)}</span>
      <div style={{ display:'flex', justifyContent:'flex-end', alignItems:'center', gap:4 }}>
        {confirmDel ? (
          <>
            <span style={{ fontSize:11, color:'var(--destructive)', whiteSpace:'nowrap' }}>确认删除?</span>
            <UI.Button size="sm" onClick={() => { onDelete(); setConfirmDel(false); }}
              style={{ fontSize:11, background:'var(--destructive)', color:'#fff', borderColor:'var(--destructive)', height:26, padding:'0 8px' }}>
              删除
            </UI.Button>
            <UI.Button variant="ghost" size="sm" onClick={() => setConfirmDel(false)}
              style={{ fontSize:11, height:26, padding:'0 8px' }}>
              取消
            </UI.Button>
          </>
        ) : (
          <UI.DropdownMenu
            align="end" minWidth={140}
            trigger={<UI.Button variant="ghost" size="icon-sm"><Icons.More size={14}/></UI.Button>}
            items={[
              { label: pulling ? '拉取中...' : '拉取日志', icon: pulling ? <Icons.Loader size={13} className="spin"/> : <Icons.Download size={13}/>, onSelect: handlePull, disabled: pulling },
              { label: '测试连接', icon: testIcon, onSelect: handleTest, disabled: rowTest === 'testing' },
              { label: '编辑', icon: <Icons.Edit size={13}/>, onSelect: onEdit },
              '---',
              { label: '删除', icon: <Icons.Trash size={13}/>, tone: 'destructive', onSelect: () => setConfirmDel(true) },
            ]}
          />
        )}
      </div>
    </div>
  );
}

/* ─── AI Engine Tab ─── */
function AIEngineTab() {
  // ── storage helpers ──
  const loadLlmCfg    = () => { try { return JSON.parse(localStorage.getItem('sm_llm_config')||'{}'); } catch { return {}; } };
  const loadPrivLlms  = () => { try { return JSON.parse(localStorage.getItem('sm_private_llms')||'[]'); } catch { return []; } };
  // ── state ──
  const [cfg,      setCfg]      = useStateSet(loadLlmCfg);
  const [cfgSaved, setCfgSaved] = useStateSet(false);
  const [privLlms, setPrivLlms] = useStateSet(loadPrivLlms);

  const EMPTY_LLM = { id:'', name:'', url:'', authType:'bearer', apiKey:'', username:'', password:'', headerName:'Authorization', headerValue:'', model:'' };
  const [llmModal,   setLlmModal]   = useStateSet(null);
  const [llmTesting, setLlmTesting] = useStateSet(false);
  const [llmTestRes, setLlmTestRes] = useStateSet(null);

  // ── ALL_PROVIDERS (static + private) ──
  const ALL_PROVIDERS = [
    ...LLM_PROVIDERS,
    ...privLlms.map(p => ({ id:`private:${p.id}`, name:`⚡ ${p.name}（私有）`, url:p.url, models: p.model ? [p.model] : [] })),
    { id:'custom', name:'自定义 API 地址', url:'', models:[] },
  ];
  const provider = ALL_PROVIDERS.find(p => p.id === (cfg.provider||'deepseek')) || ALL_PROVIDERS[0];
  const upd = (k,v) => setCfg(c => ({...c,[k]:v}));

  const saveCfg = () => {
    localStorage.setItem('sm_llm_config', JSON.stringify(cfg));
    syncLlmToServer(cfg);
    setCfgSaved(true); setTimeout(()=>setCfgSaved(false),2000);
  };

  // ── private LLM helpers ──
  const savePrivLlms = arr => { setPrivLlms(arr); localStorage.setItem('sm_private_llms', JSON.stringify(arr)); };
  const setAsCurrent = llm => {
    const nc = { provider:`private:${llm.id}`, model:llm.model||'', apiKey:llm.apiKey||'', url:llm.url };
    setCfg(nc); localStorage.setItem('sm_llm_config', JSON.stringify(nc));
    syncLlmToServer(nc);
    setCfgSaved(true); setTimeout(()=>setCfgSaved(false),2000);
  };
  const saveLlmModal = () => {
    const d = llmModal.data; if (!d.name||!d.url) return;
    const entry = {...d, id: d.id||`plm_${Date.now()}`};
    if (llmModal.mode==='add') savePrivLlms([...privLlms, entry]);
    else savePrivLlms(privLlms.map(p=>p.id===entry.id?entry:p));
    setLlmModal(null); setLlmTestRes(null);
  };
  const testLlm = async llm => {
    setLlmTesting(true); setLlmTestRes(null);
    try {
      const headers = {'Content-Type':'application/json'};
      if (llm.authType==='bearer') headers['Authorization'] = `Bearer ${llm.apiKey}`;
      else if (llm.authType==='basic') headers['Authorization'] = 'Basic ' + btoa(`${llm.username||''}:${llm.password||''}`);
      else if (llm.authType==='custom-header' && llm.headerName) headers[llm.headerName] = llm.headerValue||'';
      const r = await fetch(llm.url, { method:'POST', headers,
        body: JSON.stringify({ model:llm.model||'gpt-3.5-turbo', messages:[{role:'user',content:'hi'}], max_tokens:5 }) });
      if (r.ok||r.status===400||r.status===422) setLlmTestRes({ok:true, msg:`连通 (HTTP ${r.status})`});
      else setLlmTestRes({ok:false, msg:`HTTP ${r.status}`});
    } catch(e) { setLlmTestRes({ok:false, msg:e.message}); }
    setLlmTesting(false);
  };

  const AUTH_LABELS = { bearer:'Bearer Token', basic:'HTTP Basic', none:'无认证', 'custom-header':'自定义请求头' };

  return (
    <div style={{ maxWidth:660, display:'flex', flexDirection:'column', gap:16 }}>

      {/* ── Card 1: AI 大模型配置 ── */}

        <div style={{ fontSize:14, fontWeight:600, marginBottom:4, display:'inline-flex', alignItems:'center', gap:8 }}>
          <Icons.Brain size={15}/> AI 大模型配置
        </div>
        <div style={{ fontSize:12, color:'var(--muted-foreground)', marginBottom:20 }}>
          配置用于事件自动调查的大语言模型，支持国内外主流供应商及私有部署
        </div>
        <div style={{ display:'flex', flexDirection:'column', gap:14 }}>
          <div>
            <label style={{ fontSize:12, fontWeight:500, color:'var(--muted-foreground)', display:'block', marginBottom:5 }}>供应商</label>
            <UI.Select value={cfg.provider||'deepseek'} onChange={v=>{ upd('provider',v); upd('model',''); upd('url',''); }}
              options={ALL_PROVIDERS.map(p=>({ value:p.id, label:p.name }))}/>
          </div>
          {(provider.id==='custom') && (
            <div>
              <label style={{ fontSize:12, fontWeight:500, color:'var(--muted-foreground)', display:'block', marginBottom:5 }}>API 地址</label>
              <UI.Input placeholder="https://your-server/v1/chat/completions" value={cfg.url||''} onChange={e=>upd('url',e.target.value)}/>
            </div>
          )}
          <div>
            <label style={{ fontSize:12, fontWeight:500, color:'var(--muted-foreground)', display:'block', marginBottom:5 }}>模型</label>
            {provider.models&&provider.models.length>0 ? (
              <UI.Select value={cfg.model||''} onChange={v=>upd('model',v)}
                options={[{value:'',label:'默认模型'},...provider.models.map(m=>({value:m,label:m}))]}/>
            ) : (
              <UI.Input placeholder="输入模型名称，如 gpt-4o" value={cfg.model||''} onChange={e=>upd('model',e.target.value)}/>
            )}
          </div>
          <div>
            <label style={{ fontSize:12, fontWeight:500, color:'var(--muted-foreground)', display:'block', marginBottom:5 }}>API Key</label>
            <UI.Input placeholder="sk-..." value={cfg.apiKey||''} onChange={e=>upd('apiKey',e.target.value)}
              style={{ fontFamily:'JetBrains Mono,monospace' }}/>
          </div>
          <div style={{ display:'flex', alignItems:'center', gap:10, marginTop:6 }}>
            <UI.Button variant="brand" onClick={saveCfg} leftIcon={<Icons.Check size={13}/>}>
              {cfgSaved?'已保存':'保存配置'}

            {cfg.apiKey && <UI.Badge tone="success"><UI.Dot tone="success" size={6} pulse/> 已配置 · {provider.name}</UI.Badge>}
          </div>
        </div>

      {/* ── Card 2: 私有模型管理 ── */}
      <UI.Card style={{ padding:'20px 24px' }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:4 }}>
          <div style={{ fontSize:14, fontWeight:600, display:'inline-flex', alignItems:'center', gap:8 }}>
            <Icons.Cpu size={15}/> 私有模型管理
          </div>
          <UI.Button size="sm" onClick={()=>setLlmModal({mode:'add',data:{...EMPTY_LLM}})} leftIcon={<Icons.Plus size={12}/>}>添加</UI.Button>
        </div>
        <div style={{ fontSize:12, color:'var(--muted-foreground)', marginBottom:16 }}>
          管理企业内部部署的大语言模型，支持 Bearer Token、HTTP Basic、自定义请求头等认证方式，添加后出现在供应商下拉列表
        </div>

        {privLlms.length===0 ? (
          <div style={{ padding:'22px 0', textAlign:'center', color:'var(--muted-foreground)', fontSize:12 }}>
            暂无私有模型配置 — 点击「添加」新建
          </div>
        ) : privLlms.map(llm => (
          <div key={llm.id} style={{ border:'1px solid var(--border)', borderRadius:8, padding:'12px 14px', marginBottom:10 }}>
            <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
              <div style={{ display:'flex', alignItems:'center', gap:8, minWidth:0 }}>
                <Icons.Cpu size={13}/>
                <span style={{ fontWeight:600, fontSize:13 }}>{llm.name}</span>
                {llm.model && <span style={{ fontSize:11, color:'var(--muted-foreground)', fontFamily:'monospace' }}>{llm.model}</span>}
              </div>
              <div style={{ display:'flex', gap:6, flexShrink:0 }}>
                <UI.Button size="sm" variant="ghost" onClick={()=>setAsCurrent(llm)}>设为当前</UI.Button>
                <UI.Button size="sm" variant="ghost" onClick={()=>setLlmModal({mode:'edit',data:{...llm}})}>编辑</UI.Button>
                <UI.Button size="sm" variant="ghost" onClick={()=>savePrivLlms(privLlms.filter(p=>p.id!==llm.id))}
                  style={{ color:'var(--destructive)' }}><Icons.Trash size={12}/></UI.Button>

            <div style={{ fontSize:11, color:'var(--muted-foreground)', marginTop:5, fontFamily:'monospace',
              overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{llm.url}</div>
            <div style={{ fontSize:11, color:'var(--muted-foreground)', marginTop:2 }}>
              认证：{AUTH_LABELS[llm.authType]||llm.authType}
            </div>

        ))}

        {llmModal && (
          <UI.Modal open={true} onClose={()=>{ setLlmModal(null); setLlmTestRes(null); }}
            title={llmModal.mode==='add'?'添加私有模型':'编辑私有模型'} width={500}>
            <div style={{ display:'flex', flexDirection:'column', gap:12 }}>
              <huntHelpers.Field label="名称">
                <UI.Input placeholder="如：内网 Qwen2.5" value={llmModal.data.name}
                  onChange={e=>setLlmModal(m=>({...m,data:{...m.data,name:e.target.value}}))}/>
              </huntHelpers.Field>
              <huntHelpers.Field label="API 地址（兼容 OpenAI 格式）">
                <UI.Input placeholder="http://10.0.0.1:8080/v1/chat/completions" value={llmModal.data.url}
                  onChange={e=>setLlmModal(m=>({...m,data:{...m.data,url:e.target.value}}))}/>
              </huntHelpers.Field>
              <huntHelpers.Field label="模型名称">
                <UI.Input placeholder="如 qwen2.5-72b-instruct" value={llmModal.data.model}
                  onChange={e=>setLlmModal(m=>({...m,data:{...m.data,model:e.target.value}}))}/>
              </huntHelpers.Field>
              <huntHelpers.Field label="认证方式">
                <UI.Select value={llmModal.data.authType} onChange={v=>setLlmModal(m=>({...m,data:{...m.data,authType:v}}))}
                  options={[{value:'bearer',label:'Bearer Token'},{value:'basic',label:'HTTP Basic Auth'},
                    {value:'none',label:'无认证'},{value:'custom-header',label:'自定义请求头'}]}/>
              </huntHelpers.Field>
              {llmModal.data.authType==='bearer' && (
                <huntHelpers.Field label="API Key">
                  <UI.Input placeholder="sk-..." value={llmModal.data.apiKey}
                    onChange={e=>setLlmModal(m=>({...m,data:{...m.data,apiKey:e.target.value}}))}
                    style={{ fontFamily:'monospace' }}/>
                </huntHelpers.Field>
              )}
              {llmModal.data.authType==='basic' && (<>
                <huntHelpers.Field label="用户名">
                  <UI.Input value={llmModal.data.username||''}
                    onChange={e=>setLlmModal(m=>({...m,data:{...m.data,username:e.target.value}}))}/>
                </huntHelpers.Field>
                <huntHelpers.Field label="密码">
                  <UI.Input type="password" value={llmModal.data.password||''}
                    onChange={e=>setLlmModal(m=>({...m,data:{...m.data,password:e.target.value}}))}/>
                </huntHelpers.Field>
              </>)}
              {llmModal.data.authType==='custom-header' && (<>
                <huntHelpers.Field label="请求头名称">
                  <UI.Input placeholder="X-API-Key" value={llmModal.data.headerName||''}
                    onChange={e=>setLlmModal(m=>({...m,data:{...m.data,headerName:e.target.value}}))}/>
                </huntHelpers.Field>
                <huntHelpers.Field label="请求头值">
                  <UI.Input value={llmModal.data.headerValue||''}
                    onChange={e=>setLlmModal(m=>({...m,data:{...m.data,headerValue:e.target.value}}))}
                    style={{ fontFamily:'monospace' }}/>
                </huntHelpers.Field>
              </>)}
              {llmTestRes && (
                <div style={{ padding:'8px 12px', borderRadius:6, fontSize:12,
                  background:llmTestRes.ok?'#f0fdf4':'var(--destructive-soft)',
                  color:llmTestRes.ok?'#15803d':'var(--destructive)',
                  border:`1px solid ${llmTestRes.ok?'#bbf7d0':'#fca5a5'}` }}>
                  {llmTestRes.ok?'✓ ':'✗ '}{llmTestRes.msg}
                </div>
              )}
              <div style={{ display:'flex', gap:8, justifyContent:'space-between', marginTop:4 }}>
                <UI.Button variant="ghost" onClick={()=>testLlm(llmModal.data)} disabled={llmTesting||!llmModal.data.url}>
                  {llmTesting?'测试中...':'测试连接'}
                </UI.Button>
                <div style={{ display:'flex', gap:8 }}>
                  <UI.Button variant="ghost" onClick={()=>{ setLlmModal(null); setLlmTestRes(null); }}>取消</UI.Button>
                  <UI.Button variant="brand" onClick={saveLlmModal} disabled={!llmModal.data.name||!llmModal.data.url}>保存</UI.Button>
                </div>
              </div>
            </div>
          </UI.Modal>
        )}
      </UI.Card>

    </div>
  );
}

/* ─── Investigation Test Tab ─── */
function InvestigationTestTab() {
  const [question, setQuestion]   = useStateSet('');
  const [loading, setLoading]     = useStateSet(false);
  const [phase, setPhase]         = useStateSet('');
  const [rawData, setRawData]     = useStateSet(null);
  const [aiText, setAiText]       = useStateSet('');
  const [error, setError]         = useStateSet('');
  const [dataSource, setDataSource] = useStateSet('resend');

  const getLlmCfg = () => { try { return JSON.parse(localStorage.getItem('sm_llm_config')||'{}'); } catch { return {}; } };
  const getResendKey = () => {
    try {
      const srvs = JSON.parse(localStorage.getItem('sm_mcp_servers')||'null');
      if (srvs) { const s = srvs.find(x=>x.id==='secmind-email-logs'); return s ? s.apiKey||'' : ''; }
      return JSON.parse(localStorage.getItem('sm_mcp_config')||'{}').resendApiKey || '';
    } catch { return ''; }
  };

  const getAliyunCfg = () => {
    try {
      const srvs = JSON.parse(localStorage.getItem('sm_mcp_servers')||'null');
      if (srvs) {
        const s = srvs.find(x=>x.id==='secmind-aliyun-mail');
        return s ? { accessKeyId:s.accessKeyId||'', accessKeySecret:s.accessKeySecret||'', mode:s.mode||'directmail' } : {};
      }
      return {};
    } catch { return {}; }
  };

  const EMAIL_TOOLS = [
    { type:'function', function:{ name:'list_emails', description:'列出最近收到/发出的邮件，可指定数量和分页',
      parameters:{ type:'object', properties:{ limit:{type:'integer',description:'返回数量，默认10，最多100'}, offset:{type:'integer',description:'分页偏移，默认0'} } } } },
    { type:'function', function:{ name:'get_email', description:'按邮件ID查询单封邮件的完整原子字段和原始数据',
      parameters:{ type:'object', required:['email_id'], properties:{ email_id:{type:'string',description:'Resend邮件UUID'} } } } },
    { type:'function', function:{ name:'query_email_security', description:'查询指定邮件的SPF/DKIM/DMARC认证结果、发件IP、SES垃圾邮件裁决，用于钓鱼/伪造分析',
      parameters:{ type:'object', required:['email_id'], properties:{ email_id:{type:'string'} } } } },
    { type:'function', function:{ name:'extract_email_urls', description:'提取邮件HTML和纯文本正文中的所有URL，用于检测钓鱼链接',
      parameters:{ type:'object', required:['email_id'], properties:{ email_id:{type:'string'} } } } },
    { type:'function', function:{ name:'search_emails_by_sender', description:'按发件人邮箱地址或域名过滤邮件列表',
      parameters:{ type:'object', properties:{ sender_email:{type:'string',description:'完整发件人邮箱'}, sender_domain:{type:'string',description:'发件人域名'}, limit:{type:'integer',default:20} } } } },
    { type:'function', function:{ name:'batch_security_audit', description:'批量分析最近邮件的安全状况，汇总SPF/DKIM/DMARC失败数量和垃圾邮件裁决，快速发现异常',
      parameters:{ type:'object', properties:{ limit:{type:'integer',description:'审计邮件数，默认20，最多100'} } } } },
    { type:'function', function:{ name:'get_email_body', description:'获取邮件完整正文内容（text或html格式）',
      parameters:{ type:'object', required:['email_id'], properties:{ email_id:{type:'string'}, format:{type:'string',enum:['text','html'],default:'text'} } } } },
  ];

  const ALIYUN_TOOLS = [
    { type:'function', function:{ name:'list_mail_logs', description:'列出阿里云邮件日志，支持时间范围、发件人、收件人、状态过滤',
      parameters:{ type:'object', properties:{
        start_time:{type:'string',description:'开始时间，ISO8601格式，如 2026-01-01T00:00:00Z'},
        end_time:{type:'string',description:'结束时间，ISO8601格式'},
        sender:{type:'string',description:'发件人邮箱过滤'},
        to_address:{type:'string',description:'收件人邮箱过滤'},
        status:{type:'string',description:'邮件状态过滤，如 delivered/failed/bounced'},
        page_size:{type:'integer',description:'每页数量，默认20，最多100'},
      } } } },
    { type:'function', function:{ name:'get_mail_detail', description:'按邮件ID获取单封邮件完整原子字段，包含SPF/DKIM/DMARC认证结果',
      parameters:{ type:'object', required:['mail_id'], properties:{ mail_id:{type:'string',description:'阿里云邮件ID'} } } } },
    { type:'function', function:{ name:'query_mail_security', description:'查询邮件SPF/DKIM/DMARC认证结果、垃圾邮件评分、防病毒结果，用于钓鱼/伪造分析',
      parameters:{ type:'object', required:['mail_id'], properties:{ mail_id:{type:'string'} } } } },
    { type:'function', function:{ name:'extract_mail_urls', description:'提取邮件HTML正文中的所有URL，用于检测钓鱼链接和恶意跳转',
      parameters:{ type:'object', required:['mail_id'], properties:{ mail_id:{type:'string'} } } } },
    { type:'function', function:{ name:'search_by_sender', description:'按发件人邮箱或发件域名搜索邮件列表',
      parameters:{ type:'object', properties:{ sender:{type:'string',description:'发件人完整邮箱'}, domain:{type:'string',description:'发件人域名'}, page_size:{type:'integer',default:20} } } } },
    { type:'function', function:{ name:'get_mail_statistics', description:'获取邮件投递统计，包括成功率、退信率、垃圾邮件命中数量等',
      parameters:{ type:'object', properties:{ start_time:{type:'string'}, end_time:{type:'string'} } } } },
    { type:'function', function:{ name:'batch_security_audit', description:'批量分析最近邮件的安全状况，汇总SPF/DKIM/DMARC失败、垃圾邮件评分、防病毒命中情况，快速发现异常',
      parameters:{ type:'object', properties:{ page_size:{type:'integer',description:'审计邮件数，默认20，最多100'} } } } },
    { type:'function', function:{ name:'analyze_outbound', description:'分析外发邮件，检测异常发件行为、高频发送、批量群发等外发异常',
      parameters:{ type:'object', properties:{ start_time:{type:'string'}, page_size:{type:'integer'} } } } },
    { type:'function', function:{ name:'query_domain_config', description:'查询域名的SPF/DKIM/DMARC记录配置状态，用于检查域名安全配置',
      parameters:{ type:'object', properties:{ domain:{type:'string',description:'要检查的发件域名'} } } } },
  ];

  const callTool = async (toolName, args, cfg) => {
    if (cfg.source === 'aliyun') {
      const resp = await fetch('/mcp/aliyun-mail/call', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ tool:toolName, args, accessKeyId:cfg.accessKeyId, accessKeySecret:cfg.accessKeySecret, mode:cfg.mode }),
      });
      const data = await resp.json();
      if (!data.ok) throw new Error(data.error || '工具调用失败');
      return data.result;
    } else {
      const resp = await fetch('/mcp/email/call', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ tool:toolName, args, apiKey:cfg.apiKey }),
      });
      const data = await resp.json();
      if (!data.ok) throw new Error(data.error || '工具调用失败');
      return data.result;
    }
  };

  const ask = async () => {
    const q = question.trim();
    if (!q) return;
    const llm = getLlmCfg();
    const resendKey = getResendKey();
    const aliyunCfg = getAliyunCfg();
    const isAliyun  = dataSource === 'aliyun';

    if (!llm.apiKey) { setError('请先在「AI 引擎」页配置大模型 API Key'); return; }
    if (isAliyun) {
      if (!aliyunCfg.accessKeyId || !aliyunCfg.accessKeySecret)
        { setError('请先配置阿里云 AccessKey ID 和 Secret'); return; }
    } else {
      if (!resendKey) { setError('请先配置 Resend API Key'); return; }
    }

    setLoading(true); setError(''); setRawData(null); setAiText('');
    const prov = LLM_PROVIDERS.find(p => p.id === (llm.provider || 'deepseek')) || LLM_PROVIDERS[0];
    const apiUrl = llm.provider === 'custom' ? llm.url : prov.url;
    const model  = llm.model || prov.models[0] || '';

    const callLlm = async (msgs, tools, stream = false) => {
      const body = { messages:msgs, temperature:0.1, max_tokens:4096, stream };
      if (model) body.model = model;
      if (tools) body.tools = tools;
      const r = await fetch(apiUrl, {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${llm.apiKey}` },
        body: JSON.stringify(body),
      });
      if (!r.ok) {
        let msg = `LLM 错误 ${r.status}`;
        try { const e = await r.json(); msg = e.error?.message || msg; } catch {}
        throw new Error(msg);
      }
      return r;
    };

    // 根据数据源选择工具集、系统提示和调用配置
    const TOOLS = isAliyun ? ALIYUN_TOOLS : EMAIL_TOOLS;
    const toolCfg = isAliyun
      ? { source:'aliyun', ...aliyunCfg }
      : { source:'resend', apiKey:resendKey };
    const modeLabel = isAliyun
      ? (aliyunCfg.mode==='enterprise' ? '阿里云企业邮箱网关' : '阿里云 DirectMail')
      : 'Resend 事务型邮件';
    const SYS = isAliyun
      ? `你是一名专业的邮件安全分析师，负责分析${modeLabel}日志。可使用的工具包括：查询邮件列表、获取邮件详情、安全认证分析（SPF/DKIM/DMARC）、URL提取、发件人搜索、批量安全审计、外发分析、域名配置检查等。请根据用户问题选择合适工具，仅回答邮件日志相关问题，其他问题请婉拒。字段说明：aliyun_spam_score垃圾邮件评分，aliyun_antivirus_result防病毒结果，aliyun_rule_action规则动作，aliyun_quarantine_id隔离ID。`
      : `你是一名专业的邮件安全分析师，负责分析 Resend 事务型邮件日志，检测钓鱼邮件、发件人伪造、恶意链接等威胁。请根据用户问题选择合适的邮件查询工具，仅回答邮件日志相关问题，其他问题请婉拒。`;

    try {
      const messages = [
        { role:'system', content: SYS },
        { role:'user',   content: q },
      ];

      // Round 1：LLM 选择工具
      setPhase('thinking');
      const r1   = await callLlm(messages, TOOLS, false);
      const r1j  = await r1.json();
      const choice    = r1j.choices?.[0];
      const toolCalls = choice?.message?.tool_calls || [];

      if (toolCalls.length === 0) {
        setRawData([]);
        setAiText(choice?.message?.content || '无回答');
        return;
      }

      messages.push(choice.message);

      // Round 2：执行工具
      setPhase('fetching');
      const results = [];
      for (const tc of toolCalls) {
        let args = {};
        try { args = JSON.parse(tc.function.arguments || '{}'); } catch {}
        let result, isError = false;
        try { result = await callTool(tc.function.name, args, toolCfg); }
        catch(e) { result = { error: e.message }; isError = true; }
        results.push({ name: tc.function.name, args, result, isError });
        messages.push({ role:'tool', tool_call_id: tc.id, content: JSON.stringify(result) });
      }
      setRawData(results);

      // Round 3：流式解读
      setPhase('interpreting');
      messages.push({ role:'user', content:'请用中文对上述邮件日志数据做安全分析，清晰说明发现的情况和风险点。' });
      const r2  = await callLlm(messages, null, true);
      const rdr = r2.body.getReader(), dec = new TextDecoder();
      let full = '', buf = '';
      while (true) {
        const { done, value } = await rdr.read();
        if (done) break;
        buf += dec.decode(value, { stream:true });
        const lines = buf.split('\n'); buf = lines.pop();
        for (const line of lines) {
          const t = line.trim();
          if (!t || !t.startsWith('data:')) continue;
          const d = t.slice(5).trim();
          if (d === '[DONE]') continue;
          try { const j = JSON.parse(d); const delta = j.choices?.[0]?.delta?.content||''; if(delta){full+=delta;setAiText(full);} } catch {}
        }
      }
      setAiText(full);

    } catch(e) {
      setError(e.message);
    } finally {
      setLoading(false); setPhase('');
    }
  };

  const llm = getLlmCfg();
  const resendKeyDisplay = getResendKey();
  const aliyunCfgDisplay = getAliyunCfg();
  const hasLlm     = !!llm.apiKey;
  const hasResend  = !!resendKeyDisplay;
  const hasAliyun  = !!(aliyunCfgDisplay.accessKeyId && aliyunCfgDisplay.accessKeySecret);
  const isAliyun   = dataSource === 'aliyun';
  const hasMcp     = isAliyun ? hasAliyun : hasResend;
  const prov = LLM_PROVIDERS.find(p => p.id === (llm.provider||'deepseek')) || LLM_PROVIDERS[0];
  const PHASES = { thinking:'大模型分析问题中...', fetching:'查询邮件日志中...', interpreting:'生成安全解读中...' };

  return (
    <div style={{ maxWidth:860, display:'flex', flexDirection:'column', gap:16 }}>
      <div>
        <div style={{ fontWeight:600, fontSize:15 }}>邮件日志调查</div>
        <div style={{ fontSize:12, color:'var(--muted-foreground)', marginTop:2 }}>
          用自然语言提问，AI 自动调用邮件工具查询日志并给出安全分析
        </div>
      </div>

      {/* 状态徽章 */}
      <div style={{ display:'flex', gap:8, flexWrap:'wrap', alignItems:'center' }}>
        <UI.Badge tone={hasLlm?'success':'warning'}>
          <UI.Dot tone={hasLlm?'success':'warning'} size={6}/>&nbsp;{hasLlm?`AI · ${prov.name}`:'AI 引擎未配置'}
        </UI.Badge>
        <UI.Badge tone={hasResend?'success':'neutral'}>
          <UI.Dot tone={hasResend?'success':'neutral'} size={6}/>&nbsp;{hasResend?'Resend 已配置':'Resend 未配置'}
        </UI.Badge>
        <UI.Badge tone={hasAliyun?'success':'neutral'}>
          <UI.Dot tone={hasAliyun?'success':'neutral'} size={6}/>&nbsp;{hasAliyun?'阿里云邮件已配置':'阿里云邮件未配置'}
        </UI.Badge>
      </div>

      {/* 数据源切换 */}
      <div style={{ display:'flex', gap:0, border:'1px solid var(--border)', borderRadius:7, overflow:'hidden', alignSelf:'flex-start' }}>
        {[{id:'resend',label:'Resend'},{id:'aliyun',label:'阿里云邮件'}].map(opt=>(
          <button key={opt.id} onClick={()=>!loading&&setDataSource(opt.id)} style={{
            padding:'6px 16px', fontSize:12, fontWeight: dataSource===opt.id?600:400,
            background: dataSource===opt.id?'var(--primary)':'var(--background)',
            color: dataSource===opt.id?'var(--primary-foreground)':'var(--muted-foreground)',
            border:'none', cursor: loading?'not-allowed':'pointer', transition:'all 0.15s',
          }}>{opt.label}</button>
        ))}
      </div>

      {/* 问题输入 */}
      <UI.Card style={{ padding:'16px 18px' }}>
        <label style={{ fontSize:12, fontWeight:500, color:'var(--muted-foreground)', display:'block', marginBottom:8 }}>
          <Icons.Mail size={12} style={{ marginRight:5, verticalAlign:'middle' }}/>
          提问（{isAliyun?'阿里云邮件日志':'Resend 邮件日志'}相关）
        </label>
        <textarea
          value={question} onChange={e => setQuestion(e.target.value)}
          onKeyDown={e => { if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)) ask(); }}
          disabled={loading}
          placeholder={isAliyun
            ? '示例：\n· 最近有哪些 SPF 或 DKIM 验证失败的邮件？\n· 帮我批量分析最近邮件的安全状况，重点看垃圾邮件评分\n· 查询来自某域名的所有邮件\n· 检查我们域名的 SPF/DKIM/DMARC 配置是否正确'
            : '示例：\n· 最近有哪些 SPF 或 DKIM 验证失败的邮件？\n· 帮我分析最近20封邮件的安全状况\n· 查询来自 tutanota.com 域名的所有邮件\n· 最近有没有包含可疑 URL 的邮件？'}
          style={{
            width:'100%', height:120, resize:'vertical', padding:'10px 12px',
            border:'1px solid var(--border)', borderRadius:6, fontSize:13,
            fontFamily:'inherit', background: loading?'var(--muted)':'var(--background)',
            color:'var(--foreground)', outline:'none', lineHeight:1.6, boxSizing:'border-box',
          }}
        />
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:10 }}>
          <span style={{ fontSize:11, color:'var(--muted-foreground)' }}>Ctrl+Enter 发送</span>
          <UI.Button variant="brand" onClick={ask} disabled={loading||!question.trim()}
            leftIcon={loading?null:<Icons.Search size={13}/>}>
            {loading
              ? <><span style={{ width:12,height:12,border:'2px solid rgba(255,255,255,0.3)',borderTopColor:'#fff',borderRadius:'50%',display:'inline-block',animation:'spin 0.8s linear infinite' }}/>&nbsp;{PHASES[phase]||'处理中...'}</>
              : '查询'}
          </UI.Button>
        </div>
      </UI.Card>

      {error && (
        <div style={{ background:'var(--destructive-soft)', color:'var(--destructive)', border:'1px solid #fca5a5', borderRadius:6, padding:'9px 13px', fontSize:12 }}>
          ⚠ {error}
        </div>
      )}

      {loading && (
        <div style={{ display:'flex', alignItems:'center', gap:10, padding:'9px 14px', background:'var(--brand-soft)', borderRadius:8, border:'1px solid var(--brand-light)' }}>
          <div style={{ width:7,height:7,borderRadius:'50%',background:'var(--brand)',animation:'pulse-dot 1.2s ease-in-out infinite' }}/>
          <span style={{ fontSize:12, fontWeight:500, color:'var(--brand-emphasis)' }}>{PHASES[phase]||'处理中...'}</span>
        </div>
      )}

      {/* 原始日志 */}
      {rawData !== null && rawData.length > 0 && (
        <UI.Card style={{ padding:'16px 18px' }}>
          <div style={{ fontSize:12, fontWeight:600, marginBottom:10, display:'flex', alignItems:'center', gap:6, color:'var(--muted-foreground)' }}>
            <Icons.Database size={13}/> 原始日志
            <UI.Badge tone="neutral" style={{ fontSize:10, padding:'1px 6px' }}>{rawData.length} 次工具调用</UI.Badge>
          </div>
          {rawData.map((tr, i) => (
            <div key={i} style={{ marginBottom: i<rawData.length-1?12:0 }}>
              <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:4 }}>
                <span style={{ fontSize:11, fontWeight:600, color:'var(--brand)', fontFamily:'monospace' }}>{tr.name}()</span>
                {tr.isError && <UI.Badge tone="destructive">错误</UI.Badge>}
              </div>
              <pre style={{
                background:'var(--muted)', borderRadius:6, padding:'10px 12px', fontSize:11,
                overflowX:'auto', whiteSpace:'pre-wrap', wordBreak:'break-all',
                maxHeight:280, overflowY:'auto', margin:0, lineHeight:1.5, border:'1px solid var(--border)',
              }}>{JSON.stringify(tr.result, null, 2)}</pre>
            </div>
          ))}
        </UI.Card>
      )}

      {/* AI 解读 */}
      {(aiText || (loading && phase==='interpreting')) && (
        <UI.Card style={{ padding:'16px 18px' }}>
          <div style={{ fontSize:12, fontWeight:600, marginBottom:10, display:'flex', alignItems:'center', gap:6, color:'var(--muted-foreground)' }}>
            <Icons.Brain size={13}/> AI 安全解读
            {loading && phase==='interpreting' && <span style={{ width:6,height:6,borderRadius:'50%',background:'var(--brand)',animation:'pulse-dot 1.2s ease-in-out infinite',display:'inline-block' }}/>}
          </div>
          <div style={{ fontSize:13.5, lineHeight:1.85, color:'var(--foreground)', whiteSpace:'pre-wrap', wordBreak:'break-word' }}>
            {aiText || '正在生成...'}
          </div>
        </UI.Card>
      )}

      {/* 空态 */}
      {!loading && rawData===null && !error && (
        <div style={{ padding:'48px 0', textAlign:'center', color:'var(--muted-foreground)' }}>
          <Icons.Mail size={32} style={{ opacity:0.3 }}/>
          <div style={{ marginTop:12, fontSize:13 }}>在上方输入邮件相关的问题后点击「查询」</div>
          {(!hasLlm||!hasMcp) && (
            <div style={{ marginTop:8, fontSize:12, color:'var(--warning)' }}>
              {!hasLlm && '请先在「AI 引擎」页完成大模型配置。'}
              {hasLlm && !hasMcp && (isAliyun
                ? '请先配置阿里云 AccessKey ID 和 Secret'
                : '请先配置 Resend API Key')}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

/* ─── Users Tab ─── */
const USER_ROLES = [
  { value:'admin',    label:'管理员',   tone:'critical' },
  { value:'analyst',  label:'安全分析师', tone:'info'  },
  { value:'readonly', label:'只读',     tone:'neutral'  },
];
const ROLE_PERMS = {
  admin:    ['查看所有事件', '执行调查', '处置告警', '管理数据源', '管理用户', '修改系统配置'],
  analyst:  ['查看所有事件', '执行调查', '处置告警'],

  { id:'u1', name:'admin', displayName:'系统管理员', role:'admin',    status:'active',   email:'admin@secmind.local',    createdAt:'2026-01-01' },
];

// Permission matrix definition ─ default values per role; locked=true means admin-only & not editable
const PERM_MATRIX = [
  { section:'事件管理', perms:[
    { key:'event.view',   label:'查看事件列表',    default:{ admin:true,  analyst:true,  readonly:true  }, locked:{ admin:true } },
    { key:'event.detail', label:'查看事件详情',    default:{ admin:true,  analyst:true,  readonly:true  }, locked:{ admin:true } },
    { key:'event.edit',   label:'创建 / 修改事件', default:{ admin:true,  analyst:true,  readonly:false }, locked:{ admin:true } },
    { key:'event.delete', label:'删除事件',        default:{ admin:true,  analyst:false, readonly:false }, locked:{ admin:true } },
  ]},
  { section:'调查与分析', perms:[
    { key:'inv.run',    label:'执行 AI 调查',  default:{ admin:true, analyst:true,  readonly:false }, locked:{ admin:true } },
    { key:'inv.report', label:'查看调查报告',  default:{ admin:true, analyst:true,  readonly:true  }, locked:{ admin:true } },
    { key:'inv.export', label:'导出调查报告',  default:{ admin:true, analyst:true,  readonly:false }, locked:{ admin:true } },
    { key:'inv.action', label:'执行处置动作',  default:{ admin:true, analyst:true,  readonly:false }, locked:{ admin:true } },
  ]},
  { section:'数据源管理', perms:[
    { key:'ds.view',   label:'查看数据源配置',    default:{ admin:true, analyst:false, readonly:false }, locked:{ admin:true } },
    { key:'ds.edit',   label:'添加 / 修改数据源', default:{ admin:true, analyst:false, readonly:false }, locked:{ admin:true } },
    { key:'ds.delete', label:'删除数据源',         default:{ admin:true, analyst:false, readonly:false }, locked:{ admin:true } },
  ]},
  { section:'系统设置', perms:[
    { key:'sys.view',    label:'查看系统设置',      default:{ admin:true, analyst:false, readonly:false }, locked:{ admin:true } },
    { key:'sys.ai',      label:'修改 AI 引擎配置',  default:{ admin:true, analyst:false, readonly:false }, locked:{ admin:true } },
    { key:'sys.users',   label:'管理用户与权限',    default:{ admin:true, analyst:false, readonly:false }, locked:{ admin:true } },
    { key:'sys.storage', label:'修改存储配置',      default:{ admin:true, analyst:false, readonly:false }, locked:{ admin:true } },
  ]},
];
// Build a flat default perm map { roleValue: { permKey: bool } }
const DEFAULT_PERM_STATE = USER_ROLES.reduce((acc, r) => {
  acc[r.value] = {};
  PERM_MATRIX.forEach(sec => sec.perms.forEach(p => { acc[r.value][p.key] = p.default[r.value] ?? false; }));
  return acc;
}, {});

// Inline toggle switch used by the permission matrix
function PermToggle({ checked, disabled, onChange }) {
  return (
    <button onClick={() => !disabled && onChange(!checked)} disabled={disabled} style={{
      width:36, height:20, borderRadius:10, border:'none', padding:0,
      cursor: disabled ? 'default' : 'pointer', flexShrink:0,
      background: checked ? '#2563eb' : 'var(--muted-2, #e5e7eb)',
      position:'relative', transition:'background .15s',
      opacity: disabled ? 0.45 : 1, outline:'none',
    }}>
      <span style={{
        position:'absolute', top:2, left: checked ? 18 : 2, width:16, height:16,
        borderRadius:'50%', background:'#fff', transition:'left .15s', display:'block',
        boxShadow:'0 1px 3px rgba(0,0,0,.18)',
      }}/>
    </button>
  );
}

function UsersTab() {
  const load = () => { try { return JSON.parse(localStorage.getItem('sm_users') || 'null') || INIT_USERS; } catch { return INIT_USERS; } };
  const [users, setUsers]   = useStateSet(load);
  const [modal, setModal]   = useStateSet(null); // null | { mode:'add'|'edit', data:{} }
  const BLANK = { id:'', name:'', displayName:'', email:'', role:'analyst', status:'active' };

  // Permission matrix state
  const loadPerms = () => { try { return JSON.parse(localStorage.getItem('sm_perms') || 'null') || DEFAULT_PERM_STATE; } catch { return DEFAULT_PERM_STATE; } };
  const [perms, setPerms]       = useStateSet(loadPerms);
  const [permSaved, setPermSaved] = useStateSet(false); // brief save-success flash

  const save = arr => { setUsers(arr); localStorage.setItem('sm_users', JSON.stringify(arr)); };
  const openAdd  = ()    => setModal({ mode:'add',  data:{ ...BLANK } });
  const openEdit = user  => setModal({ mode:'edit', data:{ ...user } });
  const saveModal = () => {
    const d = modal.data;
    if (!d.name || !d.displayName) return;
    if (modal.mode === 'add') {
      save([...users, { ...d, id:'u_'+Date.now(), createdAt: new Date().toISOString().slice(0,10) }]);
    } else {
      save(users.map(u => u.id === d.id ? d : u));
    }
    setModal(null);
  };

  const roleOf  = r => USER_ROLES.find(x => x.value === r) || USER_ROLES[1];
  const activeCount   = users.filter(u => u.status === 'active').length;
  const adminCount    = users.filter(u => u.role === 'admin').length;

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:16 }}>

      {/* Stats */}
      <UI.Card style={{ padding:0, overflow:'hidden' }}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)' }}>
          <SetStat label="用户总数"   value={users.length} />
          <SetStat label="启用中"     value={activeCount}  tone="success"/>
          <SetStat label="管理员"     value={adminCount}   tone="info"/>
          <SetStat label="角色类型"   value={USER_ROLES.length} sub="种权限角色"/>
        </div>
      </UI.Card>

      {/* User list */}
      <UI.Card style={{ padding:0, overflow:'hidden' }}>
        <div style={{
          display:'flex', alignItems:'center', justifyContent:'space-between',
          padding:'12px 16px', borderBottom:'1px solid var(--border)',
        }}>
          <div style={{ fontSize:13, fontWeight:600, display:'inline-flex', alignItems:'center', gap:8 }}>
            <Icons.User size={14}/> 用户列表
          </div>
          <UI.Button size="sm" onClick={openAdd} leftIcon={<Icons.Plus size={12}/>}>添加用户</UI.Button>
        </div>

        {/* Header row */}
        <div style={{
          display:'grid', gridTemplateColumns:'2fr 1fr 1fr 160px 80px',
          gap:12, padding:'9px 16px',
          background:'var(--muted-2)', borderBottom:'1px solid var(--border)',
          fontSize:11, color:'var(--muted-foreground)', fontWeight:500,
          textTransform:'uppercase', letterSpacing:'0.04em',
        }}>
          <span>用户</span><span>角色</span><span>权限</span><span>邮箱</span><span style={{ textAlign:'right' }}>操作</span>
        </div>

        {users.length === 0 ? (
          <div style={{ padding:'32px 0', textAlign:'center', color:'var(--muted-foreground)', fontSize:12 }}>
            暂无用户 — 点击「添加用户」新建
          </div>
        ) : users.map((user, i) => {
          const rm = roleOf(user.role);
          return (
            <div key={user.id} className="hover-row" style={{
              display:'grid', gridTemplateColumns:'2fr 1fr 1fr 160px 80px',
              gap:12, padding:'11px 16px', alignItems:'center',
              borderBottom: i < users.length-1 ? '1px solid var(--border)' : 'none',
              transition:'background .12s',
            }}>
              {/* 用户信息 */}
              <div style={{ display:'flex', alignItems:'center', gap:10 }}>
                <div style={{
                  width:30, height:30, borderRadius:'50%', flexShrink:0,
                  background:'var(--muted)', border:'1px solid var(--border)',
                  display:'flex', alignItems:'center', justifyContent:'center',
                  fontSize:12, fontWeight:600, color:'var(--muted-foreground)',
                }}>
                  {(user.displayName || user.name).slice(0,1).toUpperCase()}
                </div>
                <div>
                  <div style={{ fontSize:13, fontWeight:500 }}>{user.displayName}</div>
                  <div style={{ fontSize:11, color:'var(--muted-foreground)', fontFamily:'monospace' }}>@{user.name}</div>
                </div>
              </div>
              {/* 角色 */}
              <UI.Badge tone={rm.tone}>{rm.label}</UI.Badge>
              {/* 权限数 */}
              <span style={{ fontSize:12.5, fontWeight:500 }}>
                {(ROLE_PERMS[user.role]||[]).length} <span style={{ fontSize:11, color:'var(--muted-foreground)', fontWeight:400 }}>项</span>
              </span>
              {/* 邮箱 */}
              <span style={{ fontSize:11.5, color:'var(--muted-foreground)', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{user.email||'—'}</span>
              {/* 操作 */}
              <div style={{ display:'flex', justifyContent:'flex-end', gap:6 }}>
                <UI.Button size="sm" variant="ghost" onClick={()=>openEdit(user)}>编辑</UI.Button>
                <UI.Button size="sm" variant="ghost"
                  onClick={()=>save(users.filter(u=>u.id!==user.id))}
                  style={{ color:'var(--destructive)' }}>
                  删除
                </UI.Button>
              </div>
            </div>
          );
        })}
      </UI.Card>

      {/* 角色权限说明 */}

          <Icons.Shield size={14}/> 角色权限说明

        <div style={{ display:'flex', flexDirection:'column', gap:0 }}>
          {USER_ROLES.map((r, i) => (

              display:'flex', alignItems:'flex-start', gap:14, padding:'12px 0',

              <div style={{ display:'flex', flexWrap:'wrap', gap:6 }}>

        </div>
      </UI.Card>

      {/* 权限配置矩阵 */}

        <div style={{
          display:'flex', alignItems:'center', justifyContent:'space-between',
          padding:'12px 20px', borderBottom:'1px solid var(--border)',
        }}>
          <div>
            <div style={{ fontSize:13, fontWeight:600, display:'inline-flex', alignItems:'center', gap:8 }}>
              <Icons.Lock size={14}/> 权限配置
            </div>

            </div>
          </div>
          <div style={{ display:'flex', gap:8, alignItems:'center' }}>
            {permSaved && (

            <UI.Button size="sm" variant="ghost" onClick={() => {

              setPermSaved(false);
            }}>重置默认</UI.Button>

              localStorage.setItem('sm_perms', JSON.stringify(perms));

          <table style={{ width:'100%', borderCollapse:'collapse' }}>
            <thead>
              <tr style={{ background:'var(--muted-2)' }}>

                }}>功能模块 / 权限项</th>

                  <th key={r.value} style={{
                    padding:'10px 24px', textAlign:'center', fontSize:11, fontWeight:500,

                ))}
              </tr>
            </thead>
            <tbody>
              {PERM_MATRIX.map((sec, si) => (
                <React.Fragment key={si}>

                  <tr style={{ background:'var(--muted-2, #f4f4f5)' }}>

                      padding:'7px 20px', fontSize:11.5, fontWeight:600,

                      borderBottom:'1px solid var(--border)',
                      transition:'background .1s',
                    }}>
                      <td style={{ padding:'11px 20px', fontSize:13 }}>{perm.label}</td>
                      {USER_ROLES.map(r => {
                        const isLocked = !!(perm.locked?.[r.value]);

                        return (
                          <td key={r.value} style={{ padding:'11px 24px', textAlign:'center' }}>

                                  [r.value]: { ...(prev[r.value] || {}), [perm.key]: v },
                                }))}
                              />

                                <Icons.Lock size={11} style={{ color:'var(--muted-foreground)', opacity:0.5, flexShrink:0 }}/>

                      })}
                    </tr>
                  ))}
                </React.Fragment>
              ))}

          </table>

          background:'var(--muted-2)', display:'flex', gap:24, flexWrap:'wrap',

          {USER_ROLES.map(r => {
            const total = PERM_MATRIX.reduce((s, sec) => s + sec.perms.length, 0);

            return (

                <UI.Badge tone={r.tone}>{r.label}</UI.Badge>
                <span style={{ fontSize:12, color:'var(--muted-foreground)' }}>
                  已开启 <strong style={{ color:'var(--foreground)' }}>{enabled}</strong> / {total} 项权限
                </span>
              </div>
            );
          })}
        </div>
      </UI.Card>

      {/* Add/Edit Modal */}
      {modal && (
        <UI.Modal open={true} onClose={()=>setModal(null)}

          <div style={{ display:'flex', flexDirection:'column', gap:12 }}>

              <UI.Input placeholder="如：zhangsan" value={modal.data.name}
                onChange={e=>setModal(m=>({...m,data:{...m.data,name:e.target.value.replace(/\s/g,'')}}))}
                disabled={modal.mode==='edit'}/>
            </huntHelpers.Field>
            <huntHelpers.Field label="显示名称">
              <UI.Input placeholder="如：张三" value={modal.data.displayName}
                onChange={e=>setModal(m=>({...m,data:{...m.data,displayName:e.target.value}}))}/>
            </huntHelpers.Field>
            <huntHelpers.Field label="邮箱">
              <UI.Input placeholder="zhangsan@company.com" value={modal.data.email||''}
                onChange={e=>setModal(m=>({...m,data:{...m.data,email:e.target.value}}))}/>
            </huntHelpers.Field>
            <huntHelpers.Field label="角色">
              <UI.Select value={modal.data.role}

<script type="text/babel">
/* App entrypoint with simple hash router. */

const { useState: useStateApp, useEffect: useEffectApp } = React;

function parseRoute() {
  const hash = window.location.hash.replace(/^#\/?/, '') || 'dashboard';
  const [page, ...rest] = hash.split('/');
  return { page, params: rest };
}

function App() {
  const [route, setRoute] = useStateApp(parseRoute());

  useEffectApp(() => {
    const onHash = () => setRoute(parseRoute());
    window.addEventListener('hashchange', onHash);
    return () => window.removeEventListener('hashchange', onHash);
  }, []);

  // 【关键】App 启动时把 localStorage 里的日志源全部同步注册到服务端
  // 服务端 logSourceRegistry 是内存存储，每次服务端重启都需要前端重新推送
  useEffectApp(() => {
    if (mockLogSources && mockLogSources.length > 0) {
      _registerLogSources(mockLogSources);
    }
    if (mockAlertSources && mockAlertSources.length > 0) {
      // 告警源也同步（如果有 _registerAlertSources 函数的话）
      try { if (typeof _registerAlertSources === 'function') _registerAlertSources(mockAlertSources); } catch {}
    }
  }, []);

  const navigate = (path) => {
    window.location.hash = '#/' + path;
  };

  let page = null;
  let breadcrumb = ['工作区'];

  switch (route.page) {
    case 'dashboard':
      page = <DashboardPage onNavigate={navigate}/>;
      breadcrumb = ['工作区', '调查看板'];
      break;
    case 'events':
      if (route.params[0]) {
        const eventId = route.params[0];
        if (route.params[1] === 'action-graph') {
          page = <ActionGraphPage eventId={eventId} onNavigate={navigate}/>;
          breadcrumb = ['工作区', '事件中心', eventId, '处置流程'];
        } else {
          page = <EventDetailPage key={eventId} eventId={eventId} onNavigate={navigate}/>;
          breadcrumb = ['工作区', '事件中心', eventId];
        }
      } else {
        page = <EventsPage onNavigate={navigate}/>;
        breadcrumb = ['工作区', '事件中心'];
      }
      break;
    case 'hunting':
      page = <HuntingPage onNavigate={navigate}/>;
      breadcrumb = ['工作区', '主动狩猎'];
      break;
    case 'investigation':
      page = <InvestigationPage onNavigate={navigate}/>;
      breadcrumb = ['工作区', '调查助手'];
      break;
    case 'skillmap':
      page = <CapabilityMapPage onNavigate={navigate}/>;
      breadcrumb = ['工作区', '能力地图'];
      break;
    case 'knowledge':
      page = <KnowledgePage onNavigate={navigate}/>;
      breadcrumb = ['工作区', '知识库'];
      break;
    case 'settings':
      page = <SettingsPage onNavigate={navigate}/>;
      breadcrumb = ['工作区', '设置'];
      break;
    default:
      page = <DashboardPage onNavigate={navigate}/>;
      breadcrumb = ['工作区', '调查看板'];
  }

  // Determine which nav item is current
  const currentNav = route.page === 'events' ? 'events' : route.page;

  return (
    <Shell.AppShell current={currentNav} breadcrumb={breadcrumb} onNavigate={navigate}>
      {page}
    </Shell.AppShell>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);

</script>

function buildSystemPrompt() {
  return `你是 Secmind AI 安全运营分析助手，拥有完整的安全告警调查原子能力知识图谱。

${ATOMIC_KNOWLEDGE}

## ⚠️ 独立研判原则（最高优先级，严格遵守）

你是独立的安全分析师，**不是告警系统的复读机**。告警只是触发调查的线索，不是最终结论。必须严格遵守以下原则：

1. **【区分告警声称 vs 证据支持】** 每个结论必须明确区分来源：
   - "告警声称：..." → 告警系统/规则引擎给出的判断
   - "日志证据显示：..." → 你从实际数据中提取到的字段与值
   - 两者不一致时，以日志证据为准，并明确指出差异

2. **【主动质疑告警结论】** 告警存在误报可能，你必须：
   - 用实际日志字段值验证告警声称的行为是否真实发生
   - 对每个告警结论给出"支持"或"不支持"的明确判断
   - 若日志不足以验证，明确写"当前日志无法确认，需补充XXX数据源"

3. **【基于字段值推理，不凭印象】** 每个分析结论必须引用：
   - 具体字段名 + 字段值（如：load_average=14.76, cpu_count=8）
   - 具体阈值或基线（如：阈值=1.5×8CPU=12，实际超出14.76/12=123%）
   - 拒绝使用"可能""据告警显示"等无数据支撑的模糊表述

4. **【量化评估，给出比率】** 尽量将威胁程度数字化：
   - 超出阈值的倍数/百分比（如：负载超标23%）
   - 时间维度（持续了多久？趋势上升/下降？）
   - 频率（告警30天内第几次？是否异常聚集？）

5. **【列出替代解释】** 对任何可疑行为，必须同时考虑：
   - 恶意场景：攻击者可能正在做什么
   - 正常场景：运维/业务原因导致的误报可能
   - 明确说明你倾向哪种解释，以及理由

6. **【标注置信度】** 每步结论末尾附上：置信度（高/中/低）及简短判断依据
   - 高：有直接日志字段值支撑
   - 中：有间接证据或部分字段
   - 低：依赖告警声称，缺乏日志验证

7. **【缺乏数据时诚实说明】** 若无日志/外部数据，仅基于告警字段分析时：
   - 明确标注"仅基于告警字段，未获取XXX日志"
   - 给出的结论降级为"疑似"而非"确认"
   - 提出需要验证的具体问题清单

## 调查指令

收到告警与日志后，执行以下步骤：
1. 识别攻击场景（钓鱼/入侵/数据泄露/勒索/挖矿/性能异常等），先列出2-3种可能场景再筛选
2. 制定调查规划：列出需要依次调用的原子能力步骤（仅规划，不含结果）
3. 按规划逐步执行，每步从日志提取具体字段值、与基线/阈值对比、得出有证据支持的发现
4. 综合所有证据给出研判结论，并明确标注哪些结论有直接证据、哪些是推断

## 关键输出规则

- **ai_reasoning_path**：只写调查规划，列出将要执行的步骤和调用的原子能力，不写任何分析结果或结论。格式：①步骤名称[能力编号] → ②步骤名称[能力编号] → ...
- **investigation_analysis.path**：按步骤逐一执行，每步标题必须与 ai_reasoning_path 规划的步骤一一对应，格式严格如下（每步之间空一行）：
  【步骤N：步骤标题[原子能力编号]】
  关键日志：从日志中提取的原始片段或字段值
  结论：本步骤的分析发现

## 输出格式（严格 JSON，无其他文字）

{

function buildUserPrompt(alertText, logText) {
  let p = '请基于以下信息进行独立安全研判。\n\n';
  p += '**重要提醒**：告警内容仅供参考，你必须用实际日志字段值验证每个结论，区分"告警声称"与"证据支持"，给出有数据依据的独立判断。不要复述告警说了什么，要分析数据证明了什么。\n\n';
  if (alertText.trim()) p += `### 告警信息（仅作触发线索，需独立验证）\n\`\`\`\n${alertText.trim()}\n\`\`\`\n\n`;
  if (logText.trim())   p += `### 相关日志（主要分析依据，以此为准）\n\`\`\`\n${logText.trim()}\n\`\`\`\n\n`;
  if (!logText.trim())  p += '**注意**：当前无相关日志，仅基于告警字段分析，所有结论置信度降级为"低"或"疑似"，并在每步结论中注明"缺乏日志验证"。\n\n';
  p += '严格输出 JSON 格式报告：';
  return p;
}

// ---- Step parser & card ----
function parseSteps(pathText) {
  if (!pathText) return [];
  const parts = pathText.split(/(?=【步骤\d)/);
  return parts.map(p => p.trim()).filter(Boolean).map(p => {
    const titleMatch = p.match(/【([^】]+)】/);
    const body = p.replace(/【[^】]+】\s*/, '').trim();
    // 支持 "查询：xxx\n关键日志：..." 和旧格式
    const logMatch   = body.match(/关键日志[:：]([\s\S]*?)(?=\n结论[:：]|$)/);
    const queryMatch = body.match(/查询[:：]([^\n]*)/);
    const conclMatch = body.match(/结论[:：]([\s\S]*?)$/);
    const rawTitle   = titleMatch ? titleMatch[1] : '步骤';
    return {
      title: rawTitle
        .replace(/^步骤\d+[：:]\s*/, '')
        .replace(/\[[\w\-\.]+\]\s*$/, '')
        .trim() || rawTitle,
      query: queryMatch ? queryMatch[1].trim() : '',
      log: logMatch ? logMatch[1].trim() : '',
      conclusion: conclMatch ? conclMatch[1].trim() : body,
    };
  });
}

function StepCards({ pathText }) {
  const steps = parseSteps(pathText);
  if (!steps.length) return <Field label="调查步骤" value={pathText} />;
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:10 }}>
      {steps.map((step, i) => (
        <div key={i} style={{ border:'1px solid var(--border)', borderRadius:8, overflow:'hidden', animation:'fadeSlideIn .25s ease' }}>
          <div style={{ background:'var(--brand-soft)', padding:'7px 13px', fontWeight:600, fontSize:12, color:'var(--brand-emphasis)', borderBottom:'1px solid var(--border)', display:'flex', alignItems:'center', gap:6 }}>
            <span style={{ background:'var(--brand)', color:'#fff', borderRadius:4, fontSize:11, padding:'1px 6px', fontWeight:700 }}>{i + 1}</span>
            {step.title}
          </div>
          <div style={{ padding:'10px 13px', display:'flex', flexDirection:'column', gap:8 }}>
            {step.log && (
              <div>
                <div style={{ fontSize:10.5, fontWeight:600, color:'var(--muted-foreground)', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:4 }}>关键日志</div>
                <div style={{ background:'var(--muted-2)', border:'1px solid var(--border)', borderRadius:5, padding:'7px 10px', fontSize:12, fontFamily:'JetBrains Mono,monospace', whiteSpace:'pre-wrap', lineHeight:1.6 }}>{step.log}</div>
              </div>
            )}
            {step.conclusion && (
              <div>
                <div style={{ fontSize:10.5, fontWeight:600, color:'var(--muted-foreground)', textTransform:'uppercase', letterSpacing:'0.05em', marginBottom:4 }}>结论</div>
                <div style={{ fontSize:13, lineHeight:1.65, whiteSpace:'pre-wrap' }}>{step.conclusion}</div>
              </div>
            )}
          </div>
        </div>
      ))}
    </div>
  );
}

// ---- File upload helper ----
const ALLOWED_EXTS = ['.txt','.log','.json','.csv','.xml','.md','.yaml','.yml','.tsv','.ini','.conf','.out','.syslog'];

function readTextFile(file) {
  return new Promise((resolve, reject) => {
    const ext = '.' + (file.name.split('.').pop() || '').toLowerCase();
    if (!ALLOWED_EXTS.includes(ext)) {
      reject(new Error('不支持的格式，仅限：' + ALLOWED_EXTS.join(' ')));
      return;
    }
    const reader = new FileReader();
    reader.onload = e => resolve({ text: e.target.result, name: file.name });
    reader.onerror = () => reject(new Error('文件读取失败'));
    reader.readAsText(file, 'utf-8');
  });
}

function UploadArea({ label, hint, value, onChange, fileName, onFileLoad, onClear }) {

      alert(e.message);

    <div>

  );

// ---- Partial JSON extractor for streaming ----
function parsePartialJson(raw) {
  // Try complete parse first
  const block = raw.match(/\{[\s\S]*\}/);
  if (block) { try { return JSON.parse(block[0]); } catch {} }

  const out = {};

  const findEnd = (str, start) => {
    let d = 0;
    for (let i = start; i < str.length; i++) {
      if (str[i] === '{') d++;
      else if (str[i] === '}') { if (--d === 0) return i; }
    }
    return -1;
  };

  // Extract completed KV string pairs from a fragment
  const extractKV = (frag) => {
    const obj = {};
    const re = /"([^"\\]+)":\s*"((?:[^"\\]|\\.)*)"/g;
    let m;
    while ((m = re.exec(frag)) !== null) {
      obj[m[1]] = m[2].replace(/\\n/g,'\n').replace(/\\t/g,'\t').replace(/\\"/g,'"').replace(/\\\\/g,'\\');
    }
    return obj;
  };

  // Extract a string value (possibly mid-stream / incomplete)
  const extractStr = (str, afterIdx) => {
    const ci = str.indexOf(':', afterIdx);
    if (ci === -1) return null;
    const q = str.indexOf('"', ci + 1);
    if (q === -1) return null;
    let val = '';
    for (let i = q + 1; i < str.length; i++) {
      if (str[i] === '\\') {
        if (i + 1 < str.length) {
          const c = str[i + 1];
          val += c==='n'?'\n': c==='t'?'\t': c==='"'?'"': c==='\\'?'\\': c;
          i++;
        }
        continue;
      }
      if (str[i] === '"') return val; // complete
      val += str[i];
    }
    return val || null; // incomplete but non-empty
  };

  // Named nested sections
  for (const key of ['event_basic','event_summary','investigation_analysis','threat_path','impact','final_conclusion','disposition']) {
    const ki = raw.indexOf(`"${key}"`);
    if (ki === -1) continue;
    const bi = raw.indexOf('{', ki + key.length + 2);
    if (bi === -1) continue;
    const ei = findEnd(raw, bi);
    const frag = ei !== -1 ? raw.slice(bi, ei + 1) : raw.slice(bi);
    if (ei !== -1) { try { out[key] = JSON.parse(frag); continue; } catch {} }

    // Partial section: extract completed short KV pairs
    const partial = extractKV(frag);

    // Also stream long string fields progressively even if section not closed
    for (const lk of ['path','timeline','immediate','week_tracking','long_term','qualitative_conclusion','evidence','affected_assets','description','summary','affected_info','impact_range']) {
      if (partial[lk]) continue;
      const lki = frag.indexOf(`"${lk}"`);
      if (lki === -1) continue;
      const v = extractStr(frag, lki + lk.length + 2);
      if (v && v.length > 2) partial[lk] = v;
    }

    if (Object.keys(partial).length) out[key] = partial;
  }

  // Top-level string fields (ai_reasoning_path)
  for (const key of ['ai_reasoning_path']) {
    const ki = raw.indexOf(`"${key}"`);
    if (ki === -1) continue;
    const v = extractStr(raw, ki + key.length + 2);
    if (v && v.length > 2) out[key] = v;
  }

  return out;
}

// ---- Main Page ----
function InvestigationPage() {
  const [alertText, setAlertText]   = useState('');
  const [alertFile, setAlertFile]   = useState('');
  const [logText, setLogText]       = useState('');
  const [logFile, setLogFile]       = useState('');
  const [result, setResult]           = useState(null);
  const [loading, setLoading]         = useState(false);
  const [streamResult, setStreamResult] = useState(null);
  const [streamPhase, setStreamPhase] = useState('');
  const [error, setError]           = useState('');
  const [showSettings, setShowSettings] = useState(false);
  const [llmConfig, setLlmConfig]   = useState(() => {
    try {
      const cfg = JSON.parse(localStorage.getItem('sm_llm_config') || '{}');
      // 应用启动时同步到服务端（server.js 重启后 llmCfg 会丢失）
      if (cfg.apiKey) syncLlmToServer(cfg);
      return cfg;
    } catch { return {}; }
  });

  const saveLlmConfig = (cfg) => {
    setLlmConfig(cfg);
    localStorage.setItem('sm_llm_config', JSON.stringify(cfg));
    syncLlmToServer(cfg);
  };

  const investigate = async () => {
    if (!llmConfig.apiKey) { setShowSettings(true); return; }
    if (!alertText.trim() && !logText.trim()) { setError('请至少输入或上传告警信息/日志内容'); return; }
    setLoading(true); setError(''); setResult(null); setStreamResult(null); setStreamPhase('connecting');
    try {
      const prov = LLM_PROVIDERS.find(p => p.id === (llmConfig.provider || 'deepseek')) || LLM_PROVIDERS[0];
      const model = llmConfig.model || prov.models[0] || '';
      const body = {
        messages: [
          { role:'system', content: buildSystemPrompt() },
          { role:'user',   content: buildUserPrompt(alertText, logText) }
        ],
        temperature: 0.2,
        max_tokens: 4096,
        stream: true,
      };
      if (model) body.model = model;
      if (['deepseek','qwen','kimi','glm'].includes(prov.id)) {
        body.response_format = { type: 'json_object' };
      }

      const resp = await fetch(prov.url, {
        method: 'POST',
        headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${llmConfig.apiKey}` },
        body: JSON.stringify(body),
      });

      if (!resp.ok) {
        let msg = `API 错误 ${resp.status}`;
        try { const e = await resp.json(); msg = e.error?.message || e.message || msg; } catch {}
        throw new Error(msg);
      }

      setStreamPhase('streaming');
      const reader = resp.body.getReader();
      const decoder = new TextDecoder('utf-8');
      let fullText = '';
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete last line
        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed || !trimmed.startsWith('data:')) continue;
          const data = trimmed.slice(5).trim();
          if (data === '[DONE]') continue;
          try {
            const json = JSON.parse(data);
            // support both content delta and reasoning_content (deepseek-reasoner)
            const delta = json.choices?.[0]?.delta?.content
                       || json.choices?.[0]?.delta?.reasoning_content
                       || '';
            if (delta) {
              fullText += delta;
              setStreamResult(parsePartialJson(fullText));
            }
          } catch {}
        }
      }

      setStreamPhase('parsing');
      let content = fullText;
      const fence = content.match(/```(?:json)?\s*([\s\S]+?)\s*```/);
      if (fence) content = fence[1];
      // find first { ... } block in case model wraps with prose
      const jsonBlock = content.match(/\{[\s\S]+\}/);
      if (jsonBlock) content = jsonBlock[0];
      try { setResult(JSON.parse(content.trim())); }
      catch { setResult({ raw: fullText }); }
    } catch(e) {
      setError(e.message);
    } finally {
      setLoading(false);
      setStreamPhase('');
      setStreamResult(null);
    }
  };

  const prov = LLM_PROVIDERS.find(p => p.id === (llmConfig.provider || 'deepseek')) || LLM_PROVIDERS[0];
  const hasKey = !!llmConfig.apiKey;

  return (
    <div style={{ display:'flex', height:'100%', overflow:'hidden' }}>

      {/* ---- Left input panel ---- */}
      <div style={{ width:380, flexShrink:0, borderRight:'1px solid var(--border)', display:'flex', flexDirection:'column', padding:'20px 18px', gap:14, overflowY:'auto' }}>

        <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:8 }}>
          <div>
            <div style={{ fontWeight:600, fontSize:14 }}>调查助手</div>
            <div style={{ fontSize:12, color:'var(--muted-foreground)', marginTop:2, lineHeight:1.4 }}>输入或上传告警与日志，AI 依据原子能力知识图谱自动编排调查</div>
          </div>
          <button className="btn btn-sm" style={{ flexShrink:0 }} onClick={() => setShowSettings(true)}>
            ⚙ {hasKey ? prov.name : '接入模型'}
            {hasKey && <span style={{ width:6, height:6, borderRadius:'50%', background:'var(--brand)', flexShrink:0, display:'inline-block' }}/>}
          </button>
        </div>

        <UploadArea
          label="告警信息" hint="alert"
          value={alertText} onChange={setAlertText}
          fileName={alertFile}
          onFileLoad={(txt, name) => { setAlertText(txt); setAlertFile(name); }}
          onClear={() => { setAlertText(''); setAlertFile(''); }}
        />

        <UploadArea
          label="相关日志" hint="log"
          value={logText} onChange={setLogText}
          fileName={logFile}
          onFileLoad={(txt, name) => { setLogText(txt); setLogFile(name); }}
          onClear={() => { setLogText(''); setLogFile(''); }}
        />

        {error && (
          <div style={{ background:'var(--destructive-soft)', color:'var(--destructive)', border:'1px solid #fca5a5', borderRadius:6, padding:'8px 12px', fontSize:12, lineHeight:1.5 }}>
            ⚠ {error}
          </div>
        )}

        <button className="btn btn-primary" style={{ height:40, fontSize:14, fontWeight:600 }}
          onClick={investigate} disabled={loading}>
          {loading
            ? <><span style={{ width:14,height:14,border:'2px solid rgba(255,255,255,0.3)',borderTopColor:'#fff',borderRadius:'50%',display:'inline-block',animation:'spin 0.8s linear infinite' }}/> 推理中...</>
            : <><Icons.Search size={14}/> 开始调查</>}
        </button>

        <details style={{ fontSize:12 }}>
          <summary style={{ cursor:'pointer', color:'var(--muted-foreground)', fontWeight:500, userSelect:'none' }}>📊 原子能力覆盖范围</summary>
          <div style={{ background:'var(--muted)', border:'1px solid var(--border)', borderRadius:6, padding:'9px 11px', fontSize:11, lineHeight:2, marginTop:6, color:'var(--muted-foreground)' }}>
            第〇章：告警基本面（0.1-0.5）<br/>
            第一章：邮件安全（1.1-1.4）<br/>
            第二章：身份认证（2.1-2.7）<br/>
            第三章：终端/EDR（3.1-3.8）<br/>
            第四章：边界网络（4.1-4.4）<br/>
            第五/七章：应用与数据（5.1-7.1）<br/>
            第六章：云原生（6.1-6.4）<br/>
            第八/九章：威胁情报与沙箱（8.1-9.2）<br/>
            第十一/十二章：计算辅助（11.1-12.3）
          </div>
        </details>
      </div>

      {/* ---- Right result panel ---- */}
      <div style={{ flex:1, overflowY:'auto', padding:24 }}>
        {!result && !loading && (
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', height:'100%', color:'var(--muted-foreground)', gap:14, textAlign:'center' }}>
            <Icons.Search size={42} strokeWidth={1}/>
            <div>
              <div style={{ fontSize:14, fontWeight:500, marginBottom:4 }}>输入告警后点击「开始调查」</div>
              <div style={{ fontSize:12 }}>AI 将依据 42 项原子能力知识图谱自动编排调查路径<br/>输出完整的 SecMind 格式研判报告</div>
            </div>
            {!hasKey && (
              <button className="btn btn-primary" onClick={() => setShowSettings(true)}>
                <Icons.Settings size={13}/> 先接入大模型
              </button>
            )}
          </div>
        )}

        {loading && (
          <div style={{ height:'100%', display:'flex', flexDirection:'column' }}>
            {/* Status bar */}
            <div style={{ display:'flex', alignItems:'center', gap:10, padding:'9px 14px', background:'var(--brand-soft)', borderRadius:8, border:'1px solid var(--brand-light)', marginBottom:16, flexShrink:0 }}>
              <div style={{ width:7, height:7, borderRadius:'50%', background:'var(--brand)', animation:'pulse-dot 1.2s ease-in-out infinite', flexShrink:0 }}/>
              <span style={{ fontSize:12, fontWeight:500, color:'var(--brand-emphasis)' }}>
                {streamPhase === 'connecting' && '正在连接模型...'}
                {streamPhase === 'streaming'  && 'AI 正在依据原子能力知识图谱推理，报告实时生成中...'}
                {streamPhase === 'parsing'    && '正在解析结构化报告...'}
              </span>
            </div>
            {/* Progressive result or waiting */}
            {streamResult && Object.keys(streamResult).length > 0 ? (
              <div style={{ flex:1, overflowY:'auto' }}>
                <InvestigationResult result={streamResult} providerName={prov.name} />
              </div>
            ) : (
              <div style={{ flex:1, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:10, color:'var(--muted-foreground)' }}>
                <div style={{ width:28, height:28, border:'2px solid var(--border)', borderTopColor:'var(--brand)', borderRadius:'50%', animation:'spin 0.8s linear infinite' }}/>
                <span style={{ fontSize:12 }}>等待模型响应...</span>
              </div>
            )}
          </div>
        )}

        {result && !loading && (
          <InvestigationResult result={result} providerName={prov.name} />
        )}
      </div>

      {showSettings && (
        <LLMSettingsModal config={llmConfig} onSave={saveLlmConfig} onClose={() => setShowSettings(false)}/>
      )}
    </div>
  );
}
</script>
</body>
</html>
