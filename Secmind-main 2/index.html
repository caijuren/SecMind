<html lang="zh-CN">

<style>
  :root {
    --background: #ffffff;
    --foreground: #0a0a0a;
    --muted: #f5f5f5;
    --muted-2: #fafafa;
    --muted-foreground: #71717a;
    --border: #e4e4e7;
    --border-strong: #d4d4d8;
    --input: #e4e4e7;
    --ring: #18181b;
    --accent: #f4f4f5;
    --accent-foreground: #0a0a0a;
    --primary: #0a0a0a;
    --primary-foreground: #fafafa;
    --destructive: #dc2626;
    --destructive-soft: #fef2f2;
    --warning: #d97706;
    --warning-soft: #fffbeb;
    --success: #16a34a;
    --success-soft: #f0fdf4;
    --info: #2563eb;
    --info-soft: #eff6ff;
    /* Brand — #22C55E green */
    --brand-50:  #f0fdf4;
    --brand-100: #dcfce7;
    --brand-200: #bbf7d0;
    --brand-300: #86efac;
    --brand-400: #4ade80;
    --brand-500: #22c55e;
    --brand-600: #16a34a;
    --brand-700: #15803d;
    --brand-800: #166534;
    --brand-900: #14532d;
    --brand: #22c55e;
    --brand-soft: #f0fdf4;
    --brand-emphasis: #16a34a;
    --radius: 6px;
    /* Shadows */
    --shadow-xs: 0 1px 2px rgba(16, 24, 40, 0.04);
    --shadow-sm: 0 1px 2px rgba(16, 24, 40, 0.05), 0 1px 3px rgba(16, 24, 40, 0.04);
    --shadow-md: 0 2px 4px -1px rgba(16, 24, 40, 0.05), 0 4px 8px -2px rgba(16, 24, 40, 0.06);
    --shadow-lg: 0 4px 8px -2px rgba(16, 24, 40, 0.06), 0 12px 24px -4px rgba(16, 24, 40, 0.08);
    --shadow-pop: 0 8px 16px -4px rgba(16, 24, 40, 0.1), 0 0 0 1px rgba(16, 24, 40, 0.04);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--background);
    color: var(--foreground);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  button { font-family: inherit; }
  a { color: inherit; text-decoration: none; }

  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--border-strong); }

  /* Atomic helpers */
  .card { background: #fff; border: 1px solid var(--border); border-radius: 10px; box-shadow: var(--shadow-sm); }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    height: 32px; padding: 0 12px;
    border-radius: var(--radius); border: 1px solid var(--border);
    background: #fff; color: var(--foreground);
    font-size: 13px; font-weight: 500; cursor: pointer; user-select: none;
    transition: background .12s ease, border-color .12s ease, box-shadow .12s ease;
    white-space: nowrap;
    box-shadow: var(--shadow-xs);
  }
  .btn:hover { background: var(--muted); }
  .btn-primary { background: var(--primary); color: var(--primary-foreground); border-color: var(--primary); box-shadow: var(--shadow-sm); }
  .btn-primary:hover { background: #27272a; border-color: #27272a; }
  .btn-brand { background: var(--primary); color: var(--primary-foreground); border-color: var(--primary); box-shadow: var(--shadow-sm); }
  .btn-brand:hover { background: #27272a; border-color: #27272a; }
  .btn-ghost { border-color: transparent; background: transparent; box-shadow: none; }
  .btn-ghost:hover { background: var(--muted); }
  .btn-sm { height: 28px; padding: 0 10px; font-size: 12px; gap: 4px; }
  .btn-icon { width: 32px; padding: 0; }
  .btn-icon-sm { width: 28px; height: 28px; padding: 0; }

  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    height: 20px; padding: 0 8px;
    border-radius: 4px; border: 1px solid var(--border);
    background: #fff; color: var(--foreground);
    font-size: 11px; font-weight: 500; line-height: 1;
    white-space: nowrap;
  }
  .badge-muted { background: var(--muted); border-color: var(--border); color: var(--muted-foreground); }
  .badge-solid { background: var(--foreground); color: var(--primary-foreground); border-color: var(--foreground); }

  .input, .select, .textarea {
    display: inline-flex; align-items: center;
    height: 34px; padding: 0 12px;
    background: #fff; color: var(--foreground);
    border: 1px solid var(--border); border-radius: var(--radius);
    font-size: 13px; font-family: inherit;
    outline: none; transition: border-color .12s, box-shadow .12s;
    width: 100%;
  }
  .textarea { height: auto; padding: 8px 12px; resize: vertical; min-height: 80px; }
  .input:focus, .select:focus, .textarea:focus { border-color: var(--foreground); box-shadow: 0 0 0 3px rgba(0,0,0,.06); }

  .switch {
    position: relative; display: inline-block; width: 32px; height: 18px;
    background: var(--border); border-radius: 999px; cursor: pointer;
    transition: background .15s;
  }
  .switch.on { background: var(--foreground); }
  .switch::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 14px; height: 14px; background: #fff; border-radius: 50%;
    transition: left .15s;
  }
  .switch.on::after { left: 16px; }

  .hover-row:hover { background: var(--muted-2); }
  .divider { height: 1px; background: var(--border); border: 0; margin: 0; }

  /* Animation */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spin { animation: spin 1.2s linear infinite; }
  @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: .35; } }
  .pulse-dot { animation: pulse-dot 1.5s ease-in-out infinite; }
  @keyframes popIn { from { opacity: 0; transform: translateY(-2px); } to { opacity: 1; transform: none; } }

  /* Page transitions — disabled to avoid screenshot-tool conflicts */
  .fade-in { opacity: 1; }
  @keyframes fadeSlideIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
  @keyframes blink { 0%,80%,100% { opacity:0; } 40% { opacity:1; } }
</style>

<script type="text/babel">
/* Lightweight shadcn-style primitives. */
const { useState, useRef, useEffect } = React;

function cx(...args) { return args.filter(Boolean).join(' '); }

// Card
const Card = ({ className, children, style }) => (
  <div className={cx('card', className)} style={style}>{children}</div>
);

// Button
const Button = ({ variant='default', size='md', className, leftIcon, rightIcon, children, ...rest }) => {
  const cls = cx('btn',
    variant === 'primary' && 'btn-primary',
    variant === 'ghost' && 'btn-ghost',
    variant === 'brand' && 'btn-brand',
    variant === 'icon' && 'btn-icon',
    size === 'sm' && 'btn-sm',
    size === 'icon-sm' && 'btn-icon-sm',
    className
  );
  return <button className={cls} {...rest}>{leftIcon}{children}{rightIcon}</button>;
};

// Badge — variants: default, muted, solid, tone (success/warning/destructive/info)
const tonePalette = {
  critical:    { fg:'#b91c1c', bg:'#fef2f2', bd:'#fecaca' },
  high:        { fg:'#c2410c', bg:'#fff7ed', bd:'#fed7aa' },
  medium:      { fg:'#a16207', bg:'#fefce8', bd:'#fde68a' },
  low:         { fg:'#15803d', bg:'#f0fdf4', bd:'#bbf7d0' },
  info:        { fg:'#1d4ed8', bg:'#eff6ff', bd:'#bfdbfe' },
  neutral:     { fg:'#3f3f46', bg:'#fafafa', bd:'#e4e4e7' },
  purple:      { fg:'#6d28d9', bg:'#f5f3ff', bd:'#ddd6fe' },

  const cls = cx('badge', variant === 'muted' && 'badge-muted', variant === 'solid' && 'badge-solid', className);

// Textarea
const Textarea = ({ className, ...rest }) => <textarea className={cx('textarea', className)} {...rest} />;

// Popover — anchored floating panel
const Popover = ({ open, onClose, anchorRef, children, align='start', offset=4, minWidth }) => {
  const [pos, setPos] = useState({ top:0, left:0, width:0 });
  useEffect(() => {
    if (!open || !anchorRef.current) return;
    const update = () => {
      const r = anchorRef.current.getBoundingClientRect();
      const left = align === 'end' ? r.right : r.left;
      setPos({ top: r.bottom + offset, left, width: r.width });
    };
    update();
    window.addEventListener('scroll', update, true);
    window.addEventListener('resize', update);
    return () => {
      window.removeEventListener('scroll', update, true);
      window.removeEventListener('resize', update);
    };
  }, [open, align, offset]);

  useEffect(() => {
    if (!open) return;
    const onDoc = (e) => {
      if (anchorRef.current && anchorRef.current.contains(e.target)) return;
      const pop = document.getElementById('__pop_panel_active');
      if (pop && pop.contains(e.target)) return;
      onClose && onClose();
    };
    const onKey = (e) => { if (e.key === 'Escape') onClose && onClose(); };
    document.addEventListener('mousedown', onDoc);
    document.addEventListener('keydown', onKey);
    return () => {
      document.removeEventListener('mousedown', onDoc);
      document.removeEventListener('keydown', onKey);
    };
  }, [open, onClose]);

  if (!open) return null;
  return ReactDOM.createPortal(
    <div id="__pop_panel_active" style={{
      position:'fixed', top:pos.top, left:pos.left,
      transform: align === 'end' ? 'translateX(-100%)' : 'none',
      minWidth: minWidth || pos.width,
      background:'#fff', border:'1px solid var(--border)', borderRadius:8,
      boxShadow:'var(--shadow-pop)', zIndex:60,
      padding:4, animation:'popIn .12s ease-out',
    }}>{children}</div>,
    document.body
  );
};

// DropdownMenu — popover with items
const DropdownMenu = ({ trigger, items, align='start', minWidth=180 }) => {
  const [open, setOpen] = useState(false);
  const anchorRef = useRef(null);
  return (
    <>
      <span ref={anchorRef} onClick={() => setOpen(o => !o)} style={{ display:'inline-flex' }}>
        {trigger}
      </span>
      <Popover open={open} onClose={() => setOpen(false)} anchorRef={anchorRef} align={align} minWidth={minWidth}>
        {items.map((it, i) => it === '---' ? (
          <div key={i} style={{ height:1, background:'var(--border)', margin:'4px 0' }} />
        ) : (
          <button key={i}
            onClick={() => { it.onSelect && it.onSelect(); setOpen(false); }}
            disabled={it.disabled}
            style={{
              width:'100%', display:'flex', alignItems:'center', gap:8,
              padding:'7px 10px', background:'transparent', border:0, cursor: it.disabled ? 'not-allowed' : 'pointer',
              borderRadius:5, fontSize:13, color: it.tone === 'destructive' ? '#b91c1c' : 'var(--foreground)',
              opacity: it.disabled ? 0.5 : 1, textAlign:'left',
              fontFamily:'inherit',
            }}
            onMouseEnter={e => { if (!it.disabled) e.currentTarget.style.background = 'var(--muted)'; }}
            onMouseLeave={e => { e.currentTarget.style.background = 'transparent'; }}
          >
            {it.icon && <span style={{ color: it.tone === 'destructive' ? '#b91c1c' : 'var(--muted-foreground)', display:'inline-flex' }}>{it.icon}</span>}
            <span style={{ flex:1 }}>{it.label}</span>
            {it.kbd && <UI.Kbd>{it.kbd}</UI.Kbd>}
          </button>
        ))}
      </Popover>
    </>
  );
};

// Select — custom (replaces native)
const Select = ({ value, onChange, options, placeholder, className, width, size='md' }) => {

          height:h, padding:'0 10px 0 12px',
          background:'#fff', border:'1px solid var(--border)', borderRadius:'var(--radius)',
          fontFamily:'inherit', fontSize:13, color: current ? 'var(--foreground)' : 'var(--muted-foreground)',
          cursor:'pointer', width: width || 'auto', boxShadow:'var(--shadow-xs)',
          transition:'border-color .12s, box-shadow .12s',
        }}
        onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--border-strong)'; }}
        onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--border)'; }}
      >

// Tabs

<script type="text/babel">
/* Lightweight inline SVG charts — area, bar, donut. Minimalist Dribbble style. */

// Area chart with two series
function AreaChart({ data, height=160, accent='#0a0a0a' }) {
  if (!data || data.length === 0) return null;
  const W = 600, H = height;
  const padL = 28, padR = 8, padT = 8, padB = 22;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const maxY = Math.max(...data.flatMap(d => [d.newEvents, d.closedEvents])) * 1.15;
  const minY = 0;
  const x = i => padL + (i / (data.length - 1)) * innerW;
  const y = v => padT + innerH - ((v - minY) / (maxY - minY)) * innerH;
  const lineA = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${x(i)} ${y(d.newEvents)}`).join(' ');
  const areaA = `${lineA} L ${x(data.length-1)} ${y(0)} L ${x(0)} ${y(0)} Z`;
  const lineB = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${x(i)} ${y(d.closedEvents)}`).join(' ');

  const ticks = 4;
  const yTicks = Array.from({ length: ticks + 1 }, (_, i) => Math.round((maxY / ticks) * i));

  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} preserveAspectRatio="none" style={{ display:'block' }}>
      <defs>
        <linearGradient id="areaFill" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor={accent} stopOpacity="0.12" />
          <stop offset="100%" stopColor={accent} stopOpacity="0" />
        </linearGradient>
      </defs>
      {/* horizontal grid + Y labels */}
      {yTicks.map((t, i) => (
        <g key={i}>
          <line x1={padL} x2={W - padR} y1={y(t)} y2={y(t)} stroke="#f4f4f5" strokeWidth="1" />
          <text x={padL - 6} y={y(t) + 3} fontSize="10" fill="#a1a1aa" textAnchor="end" fontFamily="JetBrains Mono, monospace">{t}</text>
        </g>
      ))}
      <path d={areaA} fill="url(#areaFill)" />
      <path d={lineA} fill="none" stroke={accent} strokeWidth="1.75" />
      <path d={lineB} fill="none" stroke="#a1a1aa" strokeWidth="1.5" strokeDasharray="3 3" />
      {/* X labels */}
      {data.map((d, i) => (
        <text key={i} x={x(i)} y={H - 6} fontSize="10" fill="#a1a1aa" textAnchor="middle" fontFamily="JetBrains Mono, monospace">{d.date}</text>
      ))}
      {/* dots */}
      {data.map((d, i) => (
        <circle key={i} cx={x(i)} cy={y(d.newEvents)} r="2.5" fill="#fff" stroke={accent} strokeWidth="1.5" />
      ))}
    </svg>
  );
}

// Horizontal bar list — labels left, bar right
function HorizontalBars({ data, accent='#0a0a0a', barHeight=10, rowGap=12 }) {
  const max = Math.max(...data.map(d => d.value));
  return (
    <div style={{ display:'flex', flexDirection:'column', gap:rowGap }}>
      {data.map((d, i) => (
        <div key={i} style={{ display:'grid', gridTemplateColumns:'80px 1fr 36px', alignItems:'center', gap:12 }}>
          <span style={{ fontSize:12, color:'var(--muted-foreground)' }}>{d.name}</span>
          <div style={{ position:'relative', height:barHeight, background:'var(--muted)', borderRadius:3 }}>
            <div style={{ width: `${(d.value/max)*100}%`, height:'100%', background: accent, borderRadius:3, transition:'width .3s' }} />
          </div>
          <span className="mono" style={{ fontSize:12, color:'var(--foreground)', textAlign:'right', fontWeight:500 }}>{d.value}</span>
        </div>
      ))}
    </div>
  );
}

// Donut
function Donut({ data, size=120, thickness=14, centerLabel, centerValue }) {
  const total = data.reduce((s, d) => s + d.value, 0) || 1;
  const radius = (size - thickness) / 2;
  const cx = size / 2, cy = size / 2;
  const circumference = 2 * Math.PI * radius;
  let offset = 0;
  return (
    <div style={{ position:'relative', width:size, height:size }}>
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{ transform:'rotate(-90deg)' }}>
        <circle cx={cx} cy={cy} r={radius} fill="none" stroke="var(--muted)" strokeWidth={thickness} />
        {data.map((d, i) => {
          const len = (d.value / total) * circumference;
          const el = (
            <circle key={i}
              cx={cx} cy={cy} r={radius} fill="none"
              stroke={d.color} strokeWidth={thickness}
              strokeDasharray={`${len} ${circumference - len}`}
              strokeDashoffset={-offset}
            />
          );
          offset += len;
          return el;
        })}
      </svg>
      {(centerLabel || centerValue) && (
        <div style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', flexDirection:'column' }}>
          {centerValue && <div style={{ fontSize:22, fontWeight:600, letterSpacing:'-0.02em' }}>{centerValue}</div>}
          {centerLabel && <div style={{ fontSize:11, color:'var(--muted-foreground)' }}>{centerLabel}</div>}
        </div>
      )}
    </div>
  );
}

// Sparkline
function Sparkline({ data, width=80, height=24, color='#0a0a0a' }) {
  if (!data || data.length === 0) return null;
  const max = Math.max(...data), min = Math.min(...data);
  const range = max - min || 1;
  const x = i => (i / (data.length - 1)) * width;
  const y = v => height - ((v - min) / range) * height;
  const path = data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${x(i)} ${y(d)}`).join(' ');
  return (
    <svg width={width} height={height} style={{ display:'block' }}>
      <path d={path} fill="none" stroke={color} strokeWidth="1.5" />
    </svg>
  );
}

window.Charts = { AreaChart, HorizontalBars, Donut, Sparkline };

</script>

function DualLineChart({ data, height=200 }) {
  const W = 640, H = height;
  const padL = 30, padR = 12, padT = 12, padB = 26;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const maxY = 1500;
  const x = i => padL + (i / (data.length - 1)) * innerW;
  const y = v => padT + innerH - (v / maxY) * innerH;
  const linePath = (key) => data.map((d, i) => `${i === 0 ? 'M' : 'L'} ${x(i)} ${y(d[key])}`).join(' ');
  const yTicks = [0, 300, 600, 900, 1200, 1500];
  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" height={H} style={{ display:'block' }}>
      <defs>
        <linearGradient id="brandFill" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor="#22c55e" stopOpacity="0.08"/>
          <stop offset="100%" stopColor="#22c55e" stopOpacity="0"/>
        </linearGradient>
      </defs>
      {yTicks.map((t, i) => (
        <g key={i}>
          <line x1={padL} x2={W - padR} y1={y(t)} y2={y(t)} stroke="#f4f4f5" strokeWidth="1"/>
          <text x={padL - 6} y={y(t) + 3} fontSize="10" fill="#a1a1aa" textAnchor="end" fontFamily="JetBrains Mono, monospace">{t.toLocaleString()}</text>
        </g>
      ))}
      <path d={`${linePath('created')} L ${x(data.length-1)} ${y(0)} L ${x(0)} ${y(0)} Z`} fill="url(#brandFill)"/>
      <path d={linePath('created')} fill="none" stroke="#22c55e" strokeWidth="1.5"/>
      <path d={linePath('closed')} fill="none" stroke="#ef4444" strokeWidth="1.5"/>
      {data.map((d, i) => i % 3 === 0 ? (
        <text key={i} x={x(i)} y={H - 8} fontSize="10" fill="#a1a1aa" textAnchor="middle" fontFamily="JetBrains Mono, monospace">{d.label}</text>
      ) : null)}
    </svg>
  );
}

function generateTrend() {
  const out = [];
  const labels = ['Nov 14','Nov 17','Nov 20','Nov 23','Nov 26','Nov 29','Dec 02','Dec 05','Dec 08','Dec 11','Dec 14'];
  for (let i = 0; i < 33; i++) {
    const idx = Math.floor(i / 3);
    let created = 20 + Math.random() * 30;
    let closed  = 15 + Math.random() * 25;
    if (i >= 14 && i <= 16) { created = 700 + i * 150; closed = 200 + i * 80; }
    if (i === 15) { created = 1380; closed = 1200; }
    if (i > 16) { created = 30 + Math.random() * 80; closed = 25 + Math.random() * 90; }
    out.push({ created: Math.round(created), closed: Math.round(closed), label: labels[idx] || '' });
  }
  return out;
}

<script type="text/babel">
/* Events List — 事件中心 v2 */

const { useState: useStateEvents, useMemo: useMemoEvents } = React;

/* Category tab definitions */
const EVENT_CATEGORY_TABS = [
  { key:'all',           label:'全部事件',   filter: () => true },
  { key:'pending_human', label:'需人工介入',  filter: e => e.investigationStatus === 'pending_human' },
  { key:'attention',     label:'引起注意',    filter: e => (e.priority === 'critical' || e.priority === 'high') && e.investigationStatus !== 'closed' },
  { key:'uninvestigated',label:'未调查事件',  filter: e => e.processStatus === 'pending' },
];

function EventsPage({ onNavigate }) {
  const [category, setCategory] = useStateEvents('all');
  const [q, setQ] = useStateEvents('');
  const [priority, setPriority] = useStateEvents('all');
  const [scene, setScene] = useStateEvents('all');
  const [timeRange, setTimeRange] = useStateEvents('24h');
  const [view, setView] = useStateEvents('list');
  const [page, setPage] = useStateEvents(1);
  const PAGE_SIZE = 20;
  const [, forceUpdate] = React.useReducer(x => x + 1, 0);

  React.useEffect(() => {
    window.__eventsStore = {
      ignore: (id) => {
        const e = mockEvents.find(ev => ev.id === id);
        if (e) { e.investigationStatus = 'ignored'; _saveEvents(); forceUpdate(); }
      },
      push: (event) => {
        mockEvents.unshift(event);
        _saveEvents();
        forceUpdate();
      },
    };

    /* Poll backend for webhook events every 5 s */
    const poll = setInterval(async () => {
      try {
        const r = await fetch('/webhook/events');
        if (!r.ok) return;
        const { events } = await r.json();
        if (events && events.length > 0) {
          events.forEach(e => mockEvents.unshift(e));
          _saveEvents();
          forceUpdate();
        }
      } catch { /* server offline — silently skip */ }
    }, 5000);

    return () => clearInterval(poll);
  }, []);

  const catTab = EVENT_CATEGORY_TABS.find(t => t.key === category) || EVENT_CATEGORY_TABS[0];

  const filtered = useMemoEvents(() => {
    const arr = mockEvents.filter(e => {
      if (!catTab.filter(e)) return false;
      if (q) {
        const k = q.toLowerCase();
        const match = e.title.toLowerCase().includes(k)
          || e.id.toLowerCase().includes(k)
          || e.entities.some(en => en.value.toLowerCase().includes(k));
        if (!match) return false;
      }
      if (priority !== 'all' && e.priority !== priority) return false;
      if (scene !== 'all' && e.sceneCategory !== scene) return false;
      return true;
    });
    // 置顶事件排在最前
    return [...arr.filter(e => e._pinned), ...arr.filter(e => !e._pinned)];
  }, [q, priority, scene, category]);

  const allEvents = mockEvents;
  const counts = {
    all:           allEvents.length,
    pending_human: allEvents.filter(e => e.investigationStatus === 'pending_human').length,
    attention:     allEvents.filter(e => (e.priority === 'critical' || e.priority === 'high') && e.investigationStatus !== 'closed').length,
    uninvestigated:allEvents.filter(e => e.processStatus === 'pending').length,
    critical: filtered.filter(e => e.priority === 'critical').length,
    high:     filtered.filter(e => e.priority === 'high').length,
    medium:   filtered.filter(e => e.priority === 'medium').length,
    low:      filtered.filter(e => e.priority === 'low').length,
  };

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
      <UI.SectionTitle
        title="事件中心"
        subtitle="管理和处置 AI 调查后的安全事件"
        action={
          <div style={{ display:'flex', gap:8 }}>
            <UI.Button leftIcon={<Icons.Refresh size={14}/>} onClick={() => forceUpdate()}>刷新</UI.Button>
          </div>
        }
      />

      {/* Category tabs */}
      <div style={{ display:'flex', gap:4, padding:'2px 0' }}>
        {EVENT_CATEGORY_TABS.map(tab => {
          const active = category === tab.key;
          return (
            <button
              key={tab.key}
              onClick={() => setCategory(tab.key)}
              style={{
                display:'inline-flex', alignItems:'center', gap:8,
                height:36, padding:'0 14px',
                background: '#fff',
                color: active ? '#0a0a0a' : 'var(--muted-foreground)',
                border: active ? '1px solid #0a0a0a' : '1px solid var(--border)',
                borderRadius:8, cursor:'pointer',
                fontSize:13, fontWeight: active ? 600 : 400,
                transition:'all .12s',
              }}
              onMouseEnter={e => { if (!active) e.currentTarget.style.background = 'var(--muted-2)'; }}
              onMouseLeave={e => { if (!active) e.currentTarget.style.background = '#fff'; }}
            >
              {tab.label}
              <span style={{
                display:'inline-flex', alignItems:'center', justifyContent:'center',
                minWidth:20, height:18, padding:'0 5px',
                borderRadius:9, fontSize:11, fontWeight:600,
                background: active ? '#0a0a0a' : 'var(--muted)',
                color: active ? '#fff' : 'var(--muted-foreground)',
              }}>{counts[tab.key]}</span>
            </button>
          );
        })}
      </div>

      {/* Summary stats strip */}
      <UI.Card style={{ padding:0, overflow:'hidden' }}>
        <div style={{ display:'grid', gridTemplateColumns:'repeat(5, 1fr)' }}>
          <StatStripCell label="本次筛选" value={filtered.length} sub="条事件" />
          <StatStripCell label="紧急" value={counts.critical} tone="critical" />
          <StatStripCell label="高" value={counts.high} tone="high" />
          <StatStripCell label="中" value={counts.medium} tone="medium" />
          <StatStripCell label="低" value={counts.low} tone="low" />
        </div>
      </UI.Card>

      {/* Filter bar */}
      <UI.Card style={{ padding:'10px 12px' }}>
        <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
          <div style={{ flex:'1 1 240px', minWidth:200 }}>
            <UI.Input
              placeholder="搜索事件标题、ID 或实体（账号、IP、域名）…"
              value={q}
              onChange={e => setQ(e.target.value)}
              leftIcon={<Icons.Search size={14}/>}
            />
          </div>
          <UI.Select value={timeRange} onChange={setTimeRange} options={[
            { value:'1h',  label:'近 1 小时' },
            { value:'24h', label:'近 24 小时' },
            { value:'7d',  label:'近 7 天' },
            { value:'30d', label:'近 30 天' },
          ]} width={130} />
          <UI.Select value={priority} onChange={setPriority} options={[
            { value:'all', label:'全部优先级' },
            { value:'critical', label:'紧急' }, { value:'high', label:'高' },
            { value:'medium', label:'中' }, { value:'low', label:'低' },
          ]} width={130} />
          <UI.Select value={scene} onChange={setScene} options={[
            { value:'all', label:'全部场景' },
            ...Object.entries(SCENE_CONFIG).map(([k, v]) => ({ value:k, label:v.label })),
          ]} width={130} />
          <div style={{ flex:1 }} />
          <UI.Tabs value={view} onChange={setView} size="sm" items={[
            { value:'list', label:'列表', icon:<Icons.Activity size={13}/> },
            { value:'board', label:'看板', icon:<Icons.Dashboard size={13}/> },
          ]} />
        </div>
      </UI.Card>

      {/* List view */}
      {view === 'list' && (
        <UI.Card style={{ padding:0, overflow:'hidden' }}>
          <div style={{
            display:'grid',
            gridTemplateColumns:'180px 1fr 220px 130px 90px 40px',
            gap:12, padding:'10px 16px',
            background:'var(--muted-2)', borderBottom:'1px solid var(--border)',
            fontSize:11, color:'var(--muted-foreground)', fontWeight:500, textTransform:'uppercase', letterSpacing:'0.04em',
          }}>
            <span>事件 ID / 优先级</span>
            <span>事件</span>
            <span>关键实体</span>
            <span>调查状态</span>
            <span>负责人</span>
            <span></span>
          </div>
          {filtered.length === 0 ? (
            <div style={{ padding:48, textAlign:'center', color:'var(--muted-foreground)' }}>
              <Icons.Search size={20} style={{ opacity:0.4 }}/>
              <div style={{ fontSize:13, marginTop:8 }}>未找到匹配的事件</div>
            </div>
          ) : filtered.slice((page-1)*PAGE_SIZE, page*PAGE_SIZE).map((e, i, arr) => (
            <EventListRow key={e.id} event={e} onClick={() => onNavigate('events/' + e.id)} divider={i < arr.length - 1} />
          ))}
        </UI.Card>
      )}

      {/* Board view */}
      {view === 'board' && (
        <div style={{ display:'grid', gridTemplateColumns:'repeat(4, 1fr)', gap:12, alignItems:'flex-start' }}>
          {[
            { key:'investigating', label:'调查中', icon:<Icons.Loader size={14} className="spin"/> },
            { key:'pending_human', label:'需人工介入', icon:<Icons.User size={14}/> },
            { key:'completed',     label:'已完成',  icon:<Icons.Check size={14}/> },
            { key:'closed',        label:'已关闭',  icon:<Icons.Lock size={14}/> },
          ].map(col => {
            const items = filtered.filter(e => e.investigationStatus === col.key);
            return (
              <div key={col.key}>
                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'4px 4px 10px' }}>
                  <div style={{ display:'inline-flex', alignItems:'center', gap:6, fontSize:13, fontWeight:600 }}>
                    {col.icon}{col.label}

                  <UI.Badge variant="muted">{items.length}</UI.Badge>
                </div>
                <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
                  {items.length === 0 ? (
                    <div style={{ padding:20, textAlign:'center', fontSize:12, color:'var(--muted-foreground)', border:'1px dashed var(--border)', borderRadius:8 }}>暂无</div>
                  ) : items.map(e => (
                    <EventBoardCard key={e.id} event={e} onClick={() => onNavigate('events/' + e.id)} />
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}

      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', fontSize:12, color:'var(--muted-foreground)' }}>

function formatRel(ts) {
  const d = new Date(ts), now = new Date();
  const diff = now - d;
  const min = Math.floor(diff / 60000);
  const hr = Math.floor(diff / 3600000);
  if (min < 0) return d.toLocaleString('zh-CN');
  if (min < 60) return `${min} 分钟前`;
  if (hr < 24) return `${hr} 小时前`;
  return d.toLocaleDateString('zh-CN', { month:'2-digit', day:'2-digit' });
}

/* ─── Streaming AI Analysis Tab ─── */
function AIAnalysisTab({ event }) {
  const isInvestigating = event.investigationStatus === 'investigating';
  const items = buildAIAnalysisItems(event);
  const [revealCount, setRevealCount] = useStateDetail(isInvestigating ? 0 : items.length);
  const [done, setDone] = useStateDetail(!isInvestigating);
  const containerRef = useRefDetail(null);

  useEffectDetail(() => {
    if (!isInvestigating) { setRevealCount(items.length); setDone(true); return; }
    setRevealCount(0); setDone(false);
    const id = setInterval(() => {
      setRevealCount(n => {
        if (n >= items.length) { clearInterval(id); setDone(true); return n; }
        return n + 1;
      });
    }, 180);
    return () => clearInterval(id);
  }, [event.id]);

  const visible = items.slice(0, revealCount);
  const progress = items.length > 0 ? (revealCount / items.length) * 100 : 100;

  return (
    <div>
      {/* Streaming header bar */}
      {isInvestigating && (
        <div style={{
          display:'flex', alignItems:'center', gap:10, padding:'10px 14px',
          background:'var(--brand-soft)', border:'1px solid var(--brand-200)', borderRadius:8, marginBottom:16,
        }}>
          {!done
            ? <Icons.Loader size={14} className="spin" style={{ color:'var(--brand)' }}/>
            : <Icons.Check size={14} style={{ color:'var(--brand)' }}/>}
          <span style={{ fontSize:13, fontWeight:500, color:'var(--brand-emphasis)', flex:1 }}>
            {done ? 'AI 研判分析完成' : 'AI 实时分析中…'}
          </span>
          {!done && (
            <span style={{ fontSize:12, color:'var(--brand-emphasis)', fontFamily:'monospace' }}>
              {revealCount} / {items.length}
            </span>
          )}
          <div style={{ width:120, height:3, background:'var(--brand-200)', borderRadius:2, overflow:'hidden' }}>
            <div style={{ height:'100%', width:`${progress}%`, background:'var(--brand)', borderRadius:2, transition:'width .2s' }}/>
          </div>
        </div>
      )}

      <div ref={containerRef} style={{ display:'flex', flexDirection:'column', gap:0 }}>
        {visible.map((item, idx) => <AIItem key={idx} item={item} animate={isInvestigating && idx === revealCount - 1} />)}
        {isInvestigating && !done && (
          <div style={{ display:'flex', alignItems:'center', gap:6, padding:'12px 0', color:'var(--muted-foreground)', fontSize:12.5 }}>
            <span style={{ display:'inline-flex', gap:3 }}>
              <span style={{ animation:'blink 1.2s infinite', animationDelay:'0s' }}>●</span>
              <span style={{ animation:'blink 1.2s infinite', animationDelay:'0.4s' }}>●</span>
              <span style={{ animation:'blink 1.2s infinite', animationDelay:'0.8s' }}>●</span>
            </span>
            <span>AI 正在分析中…</span>
          </div>
        )}
      </div>
    </div>
  );
}

/* ─── 打字机效果文本：text 变化时从头开始逐字显示 ─── */
function TypewriterText({ text, speed = 18, className, style }) {
  const [displayed, setDisplayed] = React.useState('');
  const [done, setDone]           = React.useState(false);
  React.useEffect(() => {
    const t = text || '';
    setDisplayed('');
    setDone(false);
    if (!t) return;
    let i = 0;
    const id = setInterval(() => {
      i++;
      if (i >= t.length) {
        setDisplayed(t);
        setDone(true);
        clearInterval(id);
      } else {
        setDisplayed(t.slice(0, i));
      }
    }, speed);
    return () => clearInterval(id);
  }, [text, speed]);
  return (
    <span className={className} style={style}>
      {displayed}
      {!done && (text||'').length > 0 && (
        <span style={{ display:'inline-block', width:7, height:13, background:'var(--brand)', marginLeft:2, verticalAlign:'middle', animation:'blink 1s infinite' }}/>
      )}
    </span>
  );
}

  if (item.type === 'intel') {
    return (
      <div style={{ ...style, padding:'10px 0', borderBottom:'1px solid var(--border)' }}>

          {item.sources.map((s, i) => (

  if (item.type === 'final') {
    const toneMap = { critical:'#dc2626', high:'#d97706', medium:'#0284c7', low:'#71717a' };
    return (

      </div>

  if (item.type === 'remediation') {
    const levelColors = { immediate:{ bg:'#fef2f2', bd:'#fecaca', fg:'#dc2626', label:'立即执行' }, week:{ bg:'#fffbeb', bd:'#fde68a', fg:'#d97706', label:'7天跟踪' }, longterm:{ bg:'var(--muted-2)', bd:'var(--border)', fg:'var(--muted-foreground)', label:'长期建议' } };
    return (

                      <span>{it}</span>
                    </div>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  return null;
}

function highlightEntities(text, highlights) {
  if (!highlights || highlights.length === 0) return text;
  // Split text around highlighted entities and render inline code
  const parts = [];
  let remaining = text;
  const sorted = [...highlights].sort((a, b) => b.length - a.length);

  // Simple: just return text with no React element trick (avoids complex splitting)
  // We'll render highlighted items as inline code spans
  return (
    <span>
      {text.split(new RegExp(`(${sorted.map(h => h.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|')})`, 'g')).map((part, i) => {
        const isHighlight = highlights.some(h => h === part);
        return isHighlight
          ? <code key={i} className="mono" style={{ background:'var(--muted)', padding:'1px 4px', borderRadius:3, fontSize:'0.9em', color:'var(--foreground)' }}>{part}</code>
          : <span key={i}>{part}</span>;
      })}
    </span>
  );
}

/* ─── Investigation result cache (module-level, survives component remounts) ─── */
if (!window.__investigationResults) window.__investigationResults = {};
const INV_CACHE = window.__investigationResults;

/* ─── Main EventDetailPage ─── */
function EventDetailPage({ eventId, onNavigate }) {
  const event = mockEvents.find(e => e.id === eventId) || mockEvents[0];
  const report = mockReport;
  const [tab, setTab] = useStateDetail('ai_analysis');

  // Investigation state — initialise from cache so re-opening a done event skips re-investigation
  const [invResult, setInvResult] = useStateDetail(() => INV_CACHE[eventId] || null);
  const [invLoading, setInvLoading] = useStateDetail(false);
  const [invStreamResult, setInvStreamResult] = useStateDetail(null);
  const [invStreamPhase, setInvStreamPhase] = useStateDetail('');
  const [invError, setInvError] = useStateDetail('');
  const [invSteps, setInvSteps] = useStateDetail([]);
  // Ref starts true when cache hit — blocks auto-start
  const invStartedRef = useRefDetail(!!(INV_CACHE[eventId]));

  const llmConfig = React.useMemo(() => {
    try { return JSON.parse(localStorage.getItem('sm_llm_config') || '{}'); } catch { return {}; }
  }, []);

  const buildInvestigateText = (evt) => {
    const lines = ['【告警基本信息】'];
    lines.push(`标题: ${evt.title || ''}`);
    lines.push(`来源系统: ${evt.sourceSystem || '未知'}`);
    lines.push(`触发时间: ${evt.triggeredAt || ''}`);
    lines.push(`优先级: ${evt.priority || ''}`);
    lines.push(`场景分类: ${evt.sceneCategory || ''}`);
    lines.push(`事件ID: ${evt.id || evt.alertId || ''}`);
    if (evt.entities && evt.entities.length > 0) {
      lines.push('');
      lines.push('【关键实体 — 日志查询必须基于以下实体值精准过滤，禁止使用 * 通配符作为唯一条件】');
      evt.entities.forEach(e => lines.push(`- ${(e.type || '').toUpperCase()}: ${e.value}`));
    }
    lines.push('');
    lines.push('【原始告警详情】');
    lines.push(JSON.stringify(evt.rawData || {}, null, 2).slice(0, 2000));
    return lines.join('\n');
  };

  const startInvestigation = async (alertText) => {
    if (!llmConfig.apiKey) return;
    setInvLoading(true); setInvError(''); setInvResult(null); setInvStreamResult(null);
    setInvStreamPhase('connecting'); setInvSteps([]);

    // 同步最新 LLM 配置到服务端（防止服务重启后丢失）
    fetch('/api/config/llm', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(llmConfig) }).catch(()=>{});

    // 【安全网】调查前再同步一次日志源注册（防止服务端在会话中重启过、丢了 registry）
    // 必须等服务端确认 register 完成后再开始调查，避免 race condition
    try {
      if (mockLogSources && mockLogSources.length > 0) {
        await fetch('/api/log-source/register', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify(mockLogSources),
        });
      }
    } catch(e) { console.warn('[inv] 日志源同步失败:', e.message); }

    try {
      const resp = await fetch('/api/investigate/stream', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ alertText }),
      });

      if (!resp.ok) {
        let msg = `调查服务错误 ${resp.status}`;
        try { const e = await resp.json(); msg = e.error || e.message || msg; } catch {}
        throw new Error(msg);
      }

      const reader  = resp.body.getReader();
      const decoder = new TextDecoder('utf-8');
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          const trimmed = line.trim();
          if (!trimmed || trimmed.startsWith(':')) continue; // skip SSE comments / pings
          if (!trimmed.startsWith('data:')) continue;
          const raw = trimmed.slice(5).trim();
          try {
            const evt = JSON.parse(raw);
            // Handle each SSE event type
            switch (evt.type) {
              case 'phase':
                setInvStreamPhase(evt.message || evt.phase);
                break;
              case 'intent_matched':
                setInvStreamResult(prev => ({
                  ...(prev || {}),
                  event_basic:     evt.event_basic   || {},
                  event_summary:   evt.event_summary || {},
                  _intents:        evt.intents         || [],
                  _intent_details: evt.intent_details  || [],
                  _intent_reason:  evt.reason          || '',
                }));
                break;
              case 'capability_plan':
                setInvSteps((evt.steps || []).map(s => ({ ...s, status:'pending' })));
                // 同步存到流式结果，供"原子能力规划"section 实时展示
                setInvStreamResult(prev => ({
                  ...(prev || {}),
                  _initial_plan: evt.steps || [],
                }));
                break;
              case 'step_start':
                setInvSteps(prev => prev.map(s =>
                  s.step === evt.step ? { ...s, status:'running' } : s
                ));
                setInvStreamPhase(`正在执行 ${evt.name}（步骤 ${evt.step}）...`);
                break;
              case 'step_result':
                setInvSteps(prev => prev.map(s =>
                  s.step === evt.step
                    ? { ...s, status: evt.ok ? 'done' : 'skipped', count: evt.count || 0, summary: evt.summary, logs: evt.logs || [] }
                    : s
                ));
                break;
              case 'step_interpreting':
                // 标记某步骤进入 LLM 解读阶段（前端显示"解读中..."）
                setInvSteps(prev => prev.map(s =>
                  s.step === evt.step ? { ...s, interpreting: true } : s
                ));
                setInvStreamPhase(`正在解读步骤 ${evt.step} 的日志证据...`);
                break;
              case 'step_interpretation':
                // 收到 AI 解读结果 → 触发打字机动画
                setInvSteps(prev => prev.map(s =>
                  s.step === evt.step
                    ? { ...s, interpreting: false, interpretation: evt.interpretation || '',
                        key_findings: evt.key_findings || [], risk_level: evt.risk_level || 'none',
                        reasoning: evt.reasoning || '', observation: evt.observation || '',
                        finding_summary: evt.finding_summary || '',
                        interpretationArrived: true }
                    : s
                ));
                break;
              case 'react_eval':
                setInvStreamPhase(evt.sufficient ? '证据充分，正在生成报告...' : `补充调查: ${evt.reason || ''}`);
                break;
              case 'complete':
                INV_CACHE[eventId] = evt.result;
                setInvResult(evt.result);
                if (evt.result?._react_steps) {
                  // 把后端字段名（ai_interpretation）映射到前端字段名（interpretation），
                  // 保持 liveStepItems 在最终状态也能正常读取
                  setInvSteps(evt.result._react_steps.map(r => ({
                    ...r,
                    status: r.ok ? 'done' : 'skipped',
                    interpretation: r.ai_interpretation || r.summary || '',
                    interpretationArrived: !!r.ai_interpretation,
                    interpreting: false,
                  })));
                }
                break;
              case 'error':
                setInvError(evt.message || '调查过程发生错误');
                break;
              default:
                break;
            }
          } catch {}
        }
      }
    } catch(e) {
      setInvError(e.message);
    } finally {
      setInvLoading(false); setInvStreamPhase(''); setInvStreamResult(null);
    }
  };

  useEffectDetail(() => {
    if (!llmConfig.apiKey) return;
    if (invStartedRef.current) return;  // already done / in progress / cache hit
    // Belt-and-suspenders: check cache again in case ref init raced
    if (INV_CACHE[eventId]) {
      setInvResult(INV_CACHE[eventId]);
      invStartedRef.current = true;
      return;
    }
    invStartedRef.current = true;
    const alertText = buildInvestigateText(event);
    startInvestigation(alertText);
  }, []);

  const sceneCfg = SCENE_CONFIG[event.sceneCategory];
  const SceneIcon = Icons[sceneCfg.iconKey];
  const invDone = !!invResult;
  const prov = LLM_PROVIDERS.find(p => p.id === (llmConfig.provider || 'deepseek')) || LLM_PROVIDERS[0];

  return (
    <div style={{ display:'flex', flexDirection:'column', gap:20 }}>
      {/* Back link */}
      <button onClick={() => onNavigate('events')} className="btn btn-ghost btn-sm" style={{ alignSelf:'flex-start', paddingLeft:0 }}>
        <Icons.Back size={14}/> 返回事件列表
      </button>

      {/* Header */}
      <div style={{ display:'grid', gridTemplateColumns:'1fr auto', gap:16, alignItems:'flex-start' }}>
        <div style={{ display:'flex', gap:14, alignItems:'flex-start' }}>
          <div style={{
            width:44, height:44, borderRadius:10,
            background:'var(--muted)', display:'flex', alignItems:'center', justifyContent:'center',
            flexShrink:0,
          }}>
            <SceneIcon size={20}/>
          </div>
          <div style={{ minWidth:0 }}>
            <div style={{ display:'flex', flexWrap:'wrap', gap:6, alignItems:'center', marginBottom:8 }}>
              <UI.Badge tone={event.priority}><UI.Dot tone={event.priority} size={6}/> {PRIORITY_CONFIG[event.priority].label}优先级</UI.Badge>
              <UI.Badge variant="muted">{sceneCfg.label}</UI.Badge>
              <span className="mono" style={{ fontSize:11.5, color:'var(--muted-foreground)' }}>{event.id}</span>
              <span style={{ fontSize:11, color:'var(--muted-foreground)' }}>·</span>
              <span style={{ fontSize:11.5, color:'var(--muted-foreground)' }}>告警 ID: <span className="mono">{event.alertId}</span></span>
            </div>
            <h1 style={{ fontSize:18, fontWeight:600, margin:0, letterSpacing:'-0.01em' }}>{event.title}</h1>
            <div style={{ display:'flex', flexWrap:'wrap', gap:12, marginTop:8, fontSize:12, color:'var(--muted-foreground)' }}>
              <span style={{ display:'inline-flex', alignItems:'center', gap:4 }}><Icons.Clock size={12}/> {new Date(event.triggeredAt).toLocaleString('zh-CN')}</span>
              <span style={{ display:'inline-flex', alignItems:'center', gap:4 }}><Icons.Server size={12}/> {event.sourceSystem}</span>
              {event.assignee && (
                <span style={{ display:'inline-flex', alignItems:'center', gap:6 }}>
                  <UI.Avatar name={event.assignee.name} size={18} style={{ background:'#fef3c7', color:'#92400e', borderColor:'transparent' }}/>
                  {event.assignee.name}
                </span>
              )}
            </div>
          </div>
        </div>

        <div style={{ display:'flex', gap:8 }}>
          <UI.Button leftIcon={<Icons.Share size={14}/>}>分享</UI.Button>
          <UI.Button leftIcon={<Icons.Download size={14}/>} onClick={() => window.print()}>导出报告</UI.Button>
          <UI.Button leftIcon={<Icons.Activity size={14}/>} onClick={() => onNavigate(`events/${event.id}/action-graph`)}>调查可视化</UI.Button>
          <UI.Button variant="brand" leftIcon={<Icons.Refresh size={14}/>} onClick={() => {
            invStartedRef.current = false;
            setInvSteps([]);
            const alertText = buildInvestigateText(event);
            startInvestigation(alertText);
          }}>重新调查</UI.Button>
        </div>
      </div>

      {/* AI Conclusion banner */}
      <UI.Card style={{ padding:18, background:'#fff', borderColor:'var(--border)' }}>
        <div style={{ display:'flex', alignItems:'flex-start', gap:14 }}>
          <div style={{
            width:32, height:32, borderRadius:8,
            background: invLoading ? '#eff6ff' : invDone ? '#f0fdf4' : '#f4f4f5',
            color: invLoading ? '#2563eb' : invDone ? '#16a34a' : '#71717a',
            display:'flex', alignItems:'center', justifyContent:'center', flexShrink:0,
          }}>
            {invLoading ? <Icons.Loader size={16} className="spin"/> : invDone ? <Icons.Check size={16}/> : <Icons.Brain size={16}/>}
          </div>
          <div style={{ flex:1 }}>
            <div style={{ display:'flex', alignItems:'center', gap:8, marginBottom:6 }}>
              <UI.Badge variant="solid"><Icons.Brain size={11}/> AI 研判结论</UI.Badge>
              {invLoading && <UI.Badge tone="info">调查进行中</UI.Badge>}
              {invDone && (() => {
                const lv = invResult.event_summary?.level || invResult.investigation_analysis?.preliminary_verdict || '';
                return lv === '高危' ? <UI.Badge tone="destructive">高危威胁</UI.Badge>
                  : lv === '疑似' ? <UI.Badge tone="warning">疑似威胁</UI.Badge>
                  : lv ? <UI.Badge tone="success">{lv}</UI.Badge>
                  : <UI.Badge tone="success">调查完成</UI.Badge>;
              })()}
              {!invLoading && !invDone && !llmConfig.apiKey && <UI.Badge tone="warning">未配置模型</UI.Badge>}
            </div>
            <div style={{ fontSize:14.5, fontWeight:500, lineHeight:1.5 }}>
              {invLoading ? 'AI 正在对该事件进行深度调查分析，请稍候…'
                : invDone ? (invResult.final_conclusion?.summary || invResult.event_summary?.content || 'AI 调查完成，请查看下方各 Tab 详情')
                : !llmConfig.apiKey ? '请先在 设置 > AI引擎 中配置大模型 API Key'
                : '点击"重新调查"开始 AI 自动分析'}
            </div>
            {invError && <div style={{ fontSize:12, color:'var(--destructive)', marginTop:4 }}>错误：{invError}</div>}
          </div>
          <div style={{ display:'flex', gap:4 }}>
            <UI.Button variant="ghost" size="icon-sm" title="采纳结论"><Icons.ThumbUp size={14}/></UI.Button>
            <UI.Button variant="ghost" size="icon-sm" title="评论"><Icons.Message size={14}/></UI.Button>
          </div>
        </div>
      </UI.Card>

      {/* Tabs */}
      {(() => {
        const parsedForBadge = invDone ? parseSteps(invResult.investigation_analysis?.path || '') : [];
        const reactForBadge  = invDone ? (invResult._react_steps || []) : [];
        const ANOM_KW = ['异常', '恶意', '高危', '攻击', '入侵', '可疑', '失陷', '泄露', '告警'];
        const findingsBadge  = invDone ? parsedForBadge.filter((s, i) => {
          const rs = reactForBadge[i];
          const hasLog = !reactForBadge.length || (rs?.ok && (rs?.count||0) > 0);
          return hasLog && ANOM_KW.some(k => ((s.log||'')+(s.conclusion||'')).includes(k));
        }).length || null : null;
        const evidenceBadge  = invDone ? (reactForBadge.length || parsedForBadge.length) || null : null;
        const reasonBadge    = invDone ? parsedForBadge.length * 2 || null : null;
        const dis = invDone ? (invResult.disposition || {}) : {};
        const disCount = invDone ? [dis.immediate, dis.week_tracking, dis.long_term].filter(Boolean).length : 0;
        const aiCount  = invDone ? buildAIItemsFromResult(invResult, event).filter(i => i.type === 'field' || i.type === 'step').length : 0;
        const impCount = invDone ? Object.values(invResult.impact || {}).filter(Boolean).length : 0;
        return (
          <UI.Tabs value={tab} onChange={setTab} items={[
            { value:'ai_analysis', label:'实时AI研判', icon:<Icons.Brain size={13}/>, badge: invDone ? aiCount : null },
            { value:'findings',    label:'关键发现',   icon:<Icons.Target size={13}/>, badge: findingsBadge },
            { value:'evidence',    label:'证据库',     icon:<Icons.File size={13}/>,   badge: evidenceBadge },
            { value:'reasoning',   label:'推理轨迹',   icon:<Icons.Brain size={13}/>,  badge: reasonBadge },
            { value:'impact',      label:'影响评估',   icon:<Icons.Alert size={13}/>,  badge: invDone ? impCount : null },
            { value:'disposition', label:'处置建议',   icon:<Icons.Shield size={13}/>, badge: invDone ? disCount : null },
          ]} />
        );
      })()}

      {tab === 'ai_analysis' && (
        <UI.Card style={{ padding:'20px 24px' }}>
          <AIInvestigationTab
            event={event}
            invResult={invResult}
            invLoading={invLoading}
            invStreamResult={invStreamResult}
            invStreamPhase={invStreamPhase}
            invError={invError}
            invSteps={invSteps}
            llmConfig={llmConfig}
            prov={prov}
          />
        </UI.Card>
      )}
      {tab === 'findings'    && <InvFindingsTab invResult={invResult} event={event}/>}
      {tab === 'evidence'    && <InvEvidenceTab invResult={invResult}/>}
      {tab === 'reasoning'   && <InvReasoningTab invResult={invResult}/>}
      {tab === 'impact'      && <InvImpactTab invResult={invResult} event={event}/>}
      {tab === 'disposition' && <InvDispositionTab invResult={invResult} prov={prov}/>}
    </div>
  );
}

/* ─── 检查是否存在已激活的真实告警源 ─── */
function hasActiveAlertSource() {
  try {
    const arr = JSON.parse(localStorage.getItem('sm_alert_sources') || 'null');
    return Array.isArray(arr) && arr.some(s => s && s.status === 'active');
  } catch { return false; }
}

/* ─── 没有真实告警源时：从 event 对象本身构造"固定"的基础信息/摘要 ─── */
function buildFixedEventBasic(event, result) {
  // complete_time 只在调查真正完成（final report 含 investigation_analysis）后才显示
  const investigationDone = !!(result && result.investigation_analysis);
  return {
    source:        event.sourceSystem || '未知系统',
    type:          (SCENE_CONFIG[event.sceneCategory]?.label) || event.sceneCategory || '安全事件',
    id:            event.id || '',
    start_time:    event.triggeredAt || '',
    complete_time: result?.event_basic?.complete_time || (investigationDone ? new Date().toISOString() : ''),
  };
}
function buildFixedEventSummary(event) {
  const rd = event.rawData || {};
  return {
    time:            event.triggeredAt || '',
    title:           event.title || '',
    content:         rd.description || rd.message || rd.subject || event.title || '',
    security_policy: rd.alert_type || rd.threat_label || rd.policy_name || rd.rule_name || '',
    related_assets:  (event.entities || []).map(e => `${(e.type||'').toUpperCase()}:${e.value}`).join('、'),
  };
}

/* ─── Convert AI JSON result → AIItem items array ─── */
function buildAIItemsFromResult(result, event) {
  // result 可能为 null/空（用户刚进入事件、调查未开始时）
  // 也允许这种情况——事件基本信息和事件摘要是告警自带的，必须立即显示
  result = (result && !result.raw) ? result : {};
  const inv = result.investigation_analysis || {};
  const tp  = result.threat_path            || {};
  const imp = result.impact                 || {};
  const fin = result.final_conclusion       || {};
  const dis = result.disposition            || {};

  // 【需求】在没有有效告警源之前，事件基本信息和事件摘要都是固定的（除调查结果外）
  const noActiveAlertSrc = !hasActiveAlertSource();
  const b = noActiveAlertSrc ? buildFixedEventBasic(event, result) : (result.event_basic || {});
  const s = noActiveAlertSrc
    ? { ...buildFixedEventSummary(event), level: result.event_summary?.level || inv.preliminary_verdict || '' }
    : (result.event_summary || {});

  const lv = s.level || inv.preliminary_verdict || '';
  const lvTone = lv === '高危' ? 'critical' : lv === '疑似' ? 'high' : 'success';

  const items = [];

  // 【需求】意图匹配过程 — 放在"事件基本信息"上方
  const intentDetails = result._intent_details || (result._intents || []).map(id => ({ id, name:'', tactic:'', caps:[] }));
  const hasIntentInfo = intentDetails.length > 0 || result._intent_reason;
  if (hasIntentInfo) {
    items.push({ type:'section', label:'意图匹配' });
    items.push({ type:'intent_match', intents: intentDetails, reason: result._intent_reason || '' });
  }

  // 【需求】原子能力挑选与排序过程
  // 优先用 _initial_plan（首次规划）；若缓存的旧报告没有，回退到 _react_steps（含 ReAct 补充能力）
  const planSteps = result._initial_plan && result._initial_plan.length > 0
    ? result._initial_plan
    : (result._react_steps || []).map(rs => ({
        step: rs.step, capability: rs.capability, name: rs.name,
        intent: rs.intent || '', query: rs.query || '',
      }));
  if (planSteps.length > 0) {
    items.push({ type:'section', label:'原子能力规划' });
    items.push({ type:'capability_plan', steps: planSteps });
  }

  // 事件基本信息
  items.push({ type:'section', label:'事件基本信息' });
  if (b.source)         items.push({ type:'field', label:'事件来源',       value: b.source });
  if (b.type)           items.push({ type:'field', label:'事件类型',       value: b.type });
  if (b.id)             items.push({ type:'field', label:'事件 ID',        value: b.id, mono:true });
  if (b.start_time)     items.push({ type:'field', label:'事件开始时间',   value: b.start_time });
  if (b.complete_time)  items.push({ type:'field', label:'事件调查完成时间', value: b.complete_time });
  if (lv)               items.push({ type:'field', label:'调查结果',       value: lv, tone: lvTone });

  // 事件摘要
  items.push({ type:'section', label:'事件摘要' });
  if (s.time)             items.push({ type:'field', label:'事件发生时间', value: s.time });
  const priCfg = PRIORITY_CONFIG[event.priority];
  if (priCfg) items.push({ type:'field', label:'事件等级', value: priCfg.label, tone: event.priority });
  if (s.title)            items.push({ type:'field', label:'事件标题',     value: s.title });
  if (s.content)          items.push({ type:'field', label:'事件内容',     value: s.content });
  if (s.security_policy)  items.push({ type:'field', label:'触发安全策略', value: s.security_policy });
  if (s.related_assets)   items.push({ type:'field', label:'关联资产',     value: s.related_assets });

  // 事件调查流程（步骤）— 含每步的 AI 解读 + 关键发现 + 风险等级
  // 【关键】最终报告里要显示所有执行过的步骤（含 0 日志的、含失败的），
  //  否则用户会觉得"调查完成后步骤消失了"
  if (inv.path || (result._react_steps && result._react_steps.length > 0)) {
    items.push({ type:'section', label:'事件调查流程' });
    const steps = (typeof parseSteps === 'function') ? parseSteps(inv.path || '') : [];
    const reactSteps = result._react_steps || [];
    const total = Math.max(reactSteps.length, steps.length);
    for (let i = 0; i < total; i++) {
      const rs = reactSteps[i] || null;
      const ps = steps[i] || null;
      const logText = rs?.logs?.length > 0
        ? rs.logs.map(l => `${(l.timestamp||'').slice(0,19)} | ${l.source_ip||l.user||'-'} | ${(l.message||'').slice(0,160)}`).join('\n')
        : (ps?.log || '');
      const queryInfo = ps?.query || rs?.query;
      const title = rs ? `[${rs.capability}] ${rs.name}` : (ps?.title || `步骤 ${i+1}`);
      // AI 解读：优先用 _react_steps 中的 ai_interpretation，回退到 parseSteps 的 conclusion，再回退到 summary
      const interp = rs?.ai_interpretation || ps?.conclusion || rs?.summary || '';
      items.push({
        type: 'step', index: i + 1, title,
        content: queryInfo ? `查询条件：${queryInfo}` : '',
        log: logText,
        highlight: [],
        interpretation: interp,
        key_findings:   rs?.key_findings || [],
        risk_level:     rs?.risk_level || null,
        // 最终报告中不要打字机效果（不在调查进行中）
        typewriter: false, interpreting: false,
      });
    }
  }

  // 威胁路径还原 — 基于每步 AI 解读的关键发现，按时间轴排列
  if (tp.timeline || tp.intent_method) {
    items.push({ type:'section', label:'威胁路径还原' });
    if (tp.timeline) {
      // 优先用结构化 _events，否则解析文本：time | event | capability | risk_level
      const phases = Array.isArray(tp._events) && tp._events.length > 0
        ? tp._events.map((e, i) => ({
            id: `T${i+1}`, timestamp: (e.timestamp||'').slice(0,19),
            name: e.event || `事件${i+1}`, desc: e.capability || '',
            risk_level: e.risk_level || 'medium',
            merged: e._merged ? e._mergedFrom : 0,  // 合并节点显示徽标
          }))
        : tp.timeline.split('\n').filter(Boolean).map((line, i) => {
            const parts = line.split('|').map(p => p.trim());
            return {
              id: `T${i+1}`, timestamp: parts[0] || '',
              name: parts[1] || `事件${i+1}`, desc: parts[2] || '',
              risk_level: parts[3] || 'medium',
              merged: 0,
            };
          });
      if (phases.length > 0) items.push({ type:'timeline', phases });
    }
    if (tp.intent_method) items.push({ type:'field', label:'威胁意图 / 手段', value: tp.intent_method });
  }

  // ATT&CK
  if (tp.attack_technique) {
    items.push({ type:'section', label:'威胁方式（ATT&CK）' });
    const techs = tp.attack_technique.split(/[,，\n]/).map(t => t.trim()).filter(Boolean).map(id => ({
      id, name: id, tactic: ''
    }));
    items.push({ type:'attack', techniques: techs });
  }

  // 威胁情报
  if (tp.threat_intel) {
    items.push({ type:'section', label:'威胁情报来源' });
    items.push({ type:'intel', sources:[{ name: tp.threat_intel, match:'', confidence:'中' }] });
  }

  // 影响
  if (imp.affected_assets || imp.description || fin.impact_range) {
    items.push({ type:'section', label:'受影响描述' });
    if (imp.affected_assets) items.push({ type:'field', label:'受影响资产',   value: imp.affected_assets });
    if (imp.description)     items.push({ type:'field', label:'影响描述',     value: imp.description });
    if (fin.impact_range)    items.push({ type:'field', label:'影响范围',     value: fin.impact_range });
  }

  // 最终结论
  if (fin.summary) {
    items.push({ type:'section', label:'最终结论' });
    const finalItems = [];
    if (fin.summary)      finalItems.push({ label:'事件威胁定性', value: fin.summary });
    if (lv)               finalItems.push({ label:'事件级别',     value: lv, tone: lvTone });
    if (fin.affected_info)finalItems.push({ label:'受影响资产',   value: fin.affected_info });
    items.push({ type:'final', items: finalItems });
  }

  // 处置建议
  if (dis.immediate || dis.week_tracking || dis.long_term) {
    items.push({ type:'section', label:'处置建议' });
    const groups = [];
    if (dis.immediate)     groups.push({ level:'immediate', title:'立即执行',  items: dis.immediate.split('\n').filter(Boolean) });
    if (dis.week_tracking) groups.push({ level:'week',      title:'7 天跟踪',  items: dis.week_tracking.split('\n').filter(Boolean) });
    if (dis.long_term)     groups.push({ level:'longterm',  title:'长期建议',  items: dis.long_term.split('\n').filter(Boolean) });
    items.push({ type:'remediation', groups });
  }

  return items;
}

/* ─── ReAct 步骤进度面板 ─────────────────────────────────────────────────── */
function InvStepsPanel({ steps }) {
  if (!steps || steps.length === 0) return null;
  return (
    <div style={{ marginBottom:16 }}>
      <div style={{ fontSize:11.5, fontWeight:600, color:'var(--muted-foreground)', textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:8 }}>
        调查执行进度
      </div>
      <div style={{ display:'flex', flexDirection:'column', gap:4 }}>
        {steps.map((step, i) => {
          const isRunning = step.status === 'running';
          const isDone    = step.status === 'done';
          const isSkipped = step.status === 'skipped';
          const isPending = step.status === 'pending';
          return (
            <div key={i} style={{
              display:'flex', alignItems:'flex-start', gap:10, padding:'7px 12px',
              background: isRunning ? 'var(--brand-soft)' : isDone ? 'rgba(34,197,94,0.07)' : 'transparent',
              border: `1px solid ${isRunning ? 'var(--brand-200)' : isDone ? 'rgba(34,197,94,0.25)' : 'var(--border)'}`,
              borderRadius:6, transition:'all 0.2s',
            }}>
              <div style={{ flexShrink:0, marginTop:2, width:14, textAlign:'center' }}>
                {isRunning  && <Icons.Loader size={13} className="spin" style={{ color:'var(--brand)' }}/>}
                {isDone     && <span style={{ fontSize:13, color:'#22c55e' }}>✓</span>}
                {isSkipped  && <span style={{ fontSize:12, color:'var(--muted-foreground)' }}>—</span>}
                {isPending  && <span style={{ fontSize:12, color:'var(--muted-foreground)', opacity:0.35 }}>○</span>}
              </div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap' }}>
                  <span className="mono" style={{ fontSize:11, color:'var(--muted-foreground)', background:'var(--muted)', padding:'1px 5px', borderRadius:3 }}>{step.capability}</span>
                  <span style={{ fontSize:13, fontWeight: isRunning ? 600 : 500, color: isRunning ? 'var(--brand-emphasis)' : 'var(--foreground)' }}>{step.name}</span>
                  {step.intent && <span style={{ fontSize:11, color:'var(--muted-foreground)' }}>· {step.intent}</span>}
                  {isDone && step.count > 0 && <span style={{ fontSize:11, color:'#22c55e', fontFamily:'monospace' }}>{step.count} 条日志</span>}
                  {isSkipped && step.summary && <span style={{ fontSize:11, color:'var(--muted-foreground)' }}>{step.summary}</span>}
                </div>
                {isRunning && step.query && (
                  <div style={{ fontSize:11, color:'var(--muted-foreground)', marginTop:3, fontFamily:'monospace', overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>
                    查询: {step.query}
                  </div>
                )}
                {isDone && step.logs && step.logs.length > 0 && (
                  <div style={{ marginTop:4, fontSize:11, fontFamily:'monospace', color:'var(--muted-foreground)', background:'var(--muted)', borderRadius:4, padding:'4px 8px', maxWidth:'100%', wordBreak:'break-all', overflowWrap:'break-word', lineHeight:1.5 }}>
                    {(step.logs[0].timestamp||'').slice(0,19)} | {step.logs[0].source_ip || step.logs[0].user || '-'} | {(step.logs[0].message||'').slice(0,160)}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─── AI Investigation Tab (realtime) — uses original AIItem renderer ─── */
function AIInvestigationTab({ event, invResult, invLoading, invStreamResult, invStreamPhase, invError, invSteps, llmConfig, prov }) {
  // 【关键】事件基本信息 + 事件摘要是告警自带数据，进入事件立即显示
  // 即使没有任何 displayResult，也直接基于 event 构造所有可立即展示的字段
  const displayResult = invResult || invStreamResult || {};
  let items = buildAIItemsFromResult(displayResult, event);

  // 最终结果未到达前，过滤掉"调查结果/verdict"字段（它需要 LLM 研判才有）
  if (!invResult) {
    items = items.filter(item =>
      !(item.type === 'field' && item.label === '调查结果') && item.type !== 'verdict'
    );
  }

  const hasSteps = invSteps && invSteps.length > 0;
  const doneSteps = hasSteps ? invSteps.filter(s => s.status === 'done').length : 0;
  const totalLogs = hasSteps ? invSteps.reduce((a, s) => a + (s.count || 0), 0) : 0;

  // 【事件调查流程】调查进行中：将已完成的步骤按顺序追加，每步含 AI 解读（打字机效果）
  const liveStepItems = React.useMemo(() => {
    if (!invLoading || !hasSteps) return [];
    // 包含所有已完成的步骤（即使无日志也展示，便于用户看到整个流程的执行情况）
    const completed = invSteps.filter(s => s.status === 'done' || s.status === 'skipped');
    if (!completed.length) return [];
    const result = [{ type:'section', label:'事件调查流程' }];
    completed.forEach((step, i) => {
      const logText = (step.logs || []).map(l =>
        `${(l.timestamp||'').slice(0,19)} | ${l.source_ip||l.user||'-'} | ${(l.message||'').slice(0,160)}`
      ).join('\n');
      const hasLogs = (step.count || 0) > 0;
      result.push({
        type:'step', index: i + 1,
        title:`[${step.capability}] ${step.name}`,
        content:`查询条件：${step.query || '*'}`,
        log: hasLogs ? logText : '',
        highlight:[],
        interpretation: step.interpretation || (hasLogs ? '' : step.summary),
        interpreting:   !!step.interpreting,
        typewriter:     !!step.interpretationArrived,
        key_findings:   step.key_findings || [],
        risk_level:     step.risk_level || (hasLogs ? null : 'none'),
      });
    });
    return result;
  }, [invLoading, invSteps]);

  // 合并：基础信息 items（来自流式早期阶段）+ 进行中步骤
  // 只在 invLoading=true 且最终 invResult 还没有到达时，用 liveStepItems 补"事件调查流程"
  // 一旦 invResult 到达，buildAIItemsFromResult 已经从 _react_steps 完整构造了"事件调查流程"，
  // 此时不应再合并 liveStepItems（否则会出现两个相同的 section）
  const allItems = (invLoading && !invResult) ? [...items, ...liveStepItems] : items;

  return (
    <div>
      {/* Phase status bar */}
      {invLoading && (
        <div style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 14px', background:'var(--brand-soft)', border:'1px solid var(--brand-200)', borderRadius:8, marginBottom:12 }}>
          <Icons.Loader size={14} className="spin" style={{ color:'var(--brand)', flexShrink:0 }}/>
          <span style={{ fontSize:13, fontWeight:500, color:'var(--brand-emphasis)', flex:1 }}>
            {invStreamPhase || 'AI 正在调查分析...'}
          </span>
          {hasSteps && (
            <span style={{ fontSize:11.5, color:'var(--brand-emphasis)', fontFamily:'monospace', flexShrink:0 }}>
              {doneSteps}/{invSteps.length} 步 · {totalLogs} 条日志
            </span>
          )}
        </div>
      )}

      {/* Error */}
      {invError && (
        <div style={{ padding:'10px 14px', background:'var(--destructive-soft)', border:'1px solid #fca5a5', borderRadius:8, fontSize:12, color:'var(--destructive)', marginBottom:12 }}>
          ⚠ {invError}
        </div>
      )}

      {/* AI analysis result items (final + live steps) */}
      {allItems.length > 0 ? (
        <div style={{ display:'flex', flexDirection:'column', gap:0 }}>
          {allItems.map((item, idx) => <AIItem key={idx} item={item} animate={false}/>)}
          {invLoading && (
            <div style={{ display:'flex', alignItems:'center', gap:6, padding:'12px 0', color:'var(--muted-foreground)', fontSize:12.5 }}>
              <span style={{ display:'inline-flex', gap:3 }}>
                <span style={{ animation:'blink 1.2s infinite', animationDelay:'0s' }}>●</span>
                <span style={{ animation:'blink 1.2s infinite', animationDelay:'0.4s' }}>●</span>
                <span style={{ animation:'blink 1.2s infinite', animationDelay:'0.8s' }}>●</span>
              </span>
              <span>AI 正在综合分析中…</span>
            </div>
          )}
        </div>
      ) : invLoading && !hasSteps ? (
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:10, padding:'48px 0', color:'var(--muted-foreground)' }}>
          <div style={{ width:28, height:28, border:'2px solid var(--border)', borderTopColor:'var(--brand)', borderRadius:'50%', animation:'spin 0.8s linear infinite' }}/>
          <span style={{ fontSize:12 }}>等待 AI 响应...</span>
        </div>
