version: "3.8"

services:
  backend:
    build: .
    container_name: secmind-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://secmind:${POSTGRES_PASSWORD:?必须设置 POSTGRES_PASSWORD}@postgres:5432/secmind
      - SECRET_KEY=${SECRET_KEY:?请设置 SECRET_KEY 环境变量}
      - REDIS_URL=redis://:${REDIS_PASSWORD:?必须设置 REDIS_PASSWORD}@redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: secmind-postgres
    environment:
      POSTGRES_USER: secmind
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?必须设置 POSTGRES_PASSWORD}
      POSTGRES_DB: secmind
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secmind"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: secmind-redis
    expose:
      - "6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:?必须设置 REDIS_PASSWORD} --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: